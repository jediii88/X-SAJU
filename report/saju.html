<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
    // ─── SAJUX view.html: URL 파라미터 최우선 파싱 (head 최상단) ───
    var globalSajuData = null;  // 전역 선언 (최우선)
    (function(){
      var p = new URLSearchParams(location.search);
      if (!p.get('n') && !p.get('y')) return;

      // 만료 체크
      var exp = p.get('exp');
      if (exp && Date.now() > parseInt(exp)) {
        window.addEventListener('load', function(){
          document.body.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#080810;color:#888;text-align:center;padding:40px;">' +
            '<div><div style="font-size:48px;margin-bottom:16px;">⏰</div>' +
            '<div style="font-size:18px;color:#c7a76a;font-weight:700;margin-bottom:8px;">리포트 유효기간 만료</div>' +
            '<div style="font-size:13px;">PDF를 저장하지 않으셨다면 SAJUX에 문의해주세요.</div></div></div>';
        });
        return;
      }

      var name  = p.get('n')||'고객';
      var gRaw  = (p.get('g')||'male').toLowerCase();
      var cRaw  = (p.get('c')||'solar').toLowerCase();
      var year  = p.get('y')||'1988';
      var month = (p.get('mo')||'1').padStart(2,'0');
      var day   = (p.get('d')||'1').padStart(2,'0');
      var hour  = (p.get('h')||'12').padStart(2,'0');
      var min   = (p.get('mi')||'0').padStart(2,'0');
      var yun   = p.get('yun')==='1';
      var unk   = p.get('unk')==='1';

      window.__SAJUX_PARAMS__ = {
        name:name, gender:gRaw, cal:cRaw,
        birthDate: year+month+day,
        birthTime: unk?'1200':(hour+min),
        yundal:yun, unknown:unk
      };

      // 자동 실행: klc.min.js 로드 후 인라인 스크립트에서 처리
    })();
    </script>

        /* 아바타 헤더 (동물 이미지) */
        .avatar-header {

        /* 동물 아바타 스프라이트 & 필터 설정 */
        
        .avatar-circle {
            width: 110px;
            height: 110px;
            margin: 0 auto 10px;

            align-items: center;
            justify-content: center;
            background: transparent;

        /* 5행 컬러 필터 (Mix-blend 방식) */
        .avatar-circle.wood { position:relative; }
        .avatar-circle.wood::after { content:''; position:absolute; top:0;left:0;right:0;bottom:0; border-radius:50%; background:rgba(30,136,229,0.5); mix-blend-mode: multiply; pointer-events:none; }
        
        .avatar-circle.fire { position:relative; }
        .avatar-circle.fire::after { content:''; position:absolute; top:0;left:0;right:0;bottom:0; border-radius:50%; background:rgba(211,47,47,0.5); mix-blend-mode: multiply; pointer-events:none; }
        
        .avatar-circle.earth { position:relative; }
        .avatar-circle.earth::after { content:''; position:absolute; top:0;left:0;right:0;bottom:0; border-radius:50%; background:rgba(240,192,40,0.5); mix-blend-mode: multiply; pointer-events:none; }
        
        .avatar-circle.metal { position:relative; filter: grayscale(100%) contrast(1.2); }
        .avatar-circle.metal::after { content:''; position:absolute; top:0;left:0;right:0;bottom:0; border-radius:50%; background:rgba(255,255,255,0.2); mix-blend-mode: overlay; pointer-events:none; }

        .avatar-circle.water { position:relative; }
        .avatar-circle.water::after { content:''; position:absolute; top:0;left:0;right:0;bottom:0; border-radius:50%; background:rgba(30,30,30,0.7); mix-blend-mode: multiply; pointer-events:none; }

// 격국 판별 함수 — 월지 지장간이 천간에 투출했는지 확인
// ═══════════════════════════════════════════════════
window.getGeokGuk = function(pillars, dayStem, ec) {
    if(!pillars || !ec) return null;
    const mb = ec.getMonth()[1]; // 월지
    // 월지별 지장간 (정기가 가장 중요)
    const MONTH_JIJANG = {
        '子':['壬','癸'],'丑':['己','癸','辛'],'寅':['戊','丙','甲'],
        '卯':['甲','乙'],'辰':['乙','癸','戊'],'巳':['戊','庚','丙'],
        '午':['丙','己','丁'],'未':['己','乙','丁'],'申':['戊','壬','庚'],
        '酉':['庚','辛'],'戌':['辛','丁','戊'],'亥':['戊','甲','壬']
    };
    const jijang = MONTH_JIJANG[mb] || [];
    // 천간에 투출한 지장간 찾기
    const stems = pillars.map(p=>p.h[0]).filter(Boolean);
    let touchu = jijang.find(j => stems.includes(j));
    if(!touchu) touchu = jijang[jijang.length-1]; // 투출 없으면 월지 정기
    
    // 투출 천간의 십성을 격국명으로 변환
    const STEM_OH = {'甲':'wood','乙':'wood','丙':'fire','丁':'fire','戊':'earth','己':'earth','庚':'metal','辛':'metal','壬':'water','癸':'water'};
    const dayOh = STEM_OH[dayStem]||'earth';
    const touchuOh = STEM_OH[touchu]||'earth';
    
    // 오행 관계로 십성 판별
    const SIP_BASE = {
        wood:{wood:'비견',fire:'식신',earth:'편재',metal:'편관',water:'편인'},
        fire:{fire:'비견',earth:'식신',metal:'편재',water:'편관',wood:'편인'},
        earth:{earth:'비견',metal:'식신',water:'편재',wood:'편관',fire:'편인'},
        metal:{metal:'비견',water:'식신',wood:'편재',fire:'편관',earth:'편인'},
        water:{water:'비견',wood:'식신',fire:'편재',earth:'편관',metal:'편인'}
    };
    const baseSip = (SIP_BASE[dayOh]||{})[touchuOh]||'비겁';
    const dayYin = ['乙','丁','己','辛','癸'].includes(dayStem);
    const tYin = ['乙','丁','己','辛','癸'].includes(touchu);
    const yinDiff = dayYin !== tYin;
    
    let sipName = baseSip;
    if(baseSip==='비견') sipName = yinDiff?'겁재':'비견';
    else if(baseSip==='식신') sipName = yinDiff?'상관':'식신';
    else if(baseSip==='편재') sipName = yinDiff?'정재':'편재';
    else if(baseSip==='편관') sipName = yinDiff?'정관':'편관';
    else if(baseSip==='편인') sipName = yinDiff?'정인':'편인';
    
    const geokName = sipName + '격';
    const geokInfo = window.GEOKGUK_DB[geokName] || window.GEOKGUK_DB['비겁격'];
    
    // 성격/파격 판별 (간단 로직: 용신이 격국을 보조하는지)
    // 겁재/상관이 격국을 파괴하는지 확인
    const hasSangGwan = stems.some(s => {
        const sOh = STEM_OH[s];
        return (SIP_BASE[dayOh]||{})[sOh]==='식신' && ['乙','丁','己','辛','癸'].includes(dayStem) !== ['乙','丁','己','辛','癸'].includes(s);
    });
    const hasGwan = stems.some(s => {
        const sOh = STEM_OH[s];
        return (SIP_BASE[dayOh]||{})[sOh]==='편관'||(SIP_BASE[dayOh]||{})[sOh]==='비견';
    });
    
    return {
        geokName: geokName,
        touchu: touchu,
        sipName: sipName,
        info: geokInfo
    };
};

<div class="report-chapter">
  <h3 class="ch-title">성격 분석 — 당신이라는 사람</h3>
  <p class="ch-text">사주에서 성격은 선천적으로 새겨진 코드입니다. 일간의 오행이 당신의 기본 기질을 만들고, 신강·신약의 구조가 에너지를 어떻게 쓰느냐를 결정합니다. 이 코드를 정확히 아는 사람과 모르는 사람 사이에는, 같은 상황에서도 전혀 다른 결과가 나옵니다.</p>
  <p class="ch-text">당신의 강점은 태어날 때부터 새겨진 무기입니다. 이를 제대로 활용하는 것이 성공의 첫 번째 열쇠이며, 약점을 알고 보완하는 것이 두 번째 열쇠입니다. 분석 완료 후 당신의 일주에 맞는 개인화 성격 분석이 여기에 표시됩니다.</p>
</div>
<div class="report-chapter">
  <h3 class="ch-title">오행 분석 — 절대적 무기와 아킬레스건</h3>
  <p class="ch-text">당신의 사주 8글자에서 목·화·토·금·수 다섯 기운이 어떻게 분포되어 있느냐가 인생의 큰 흐름을 결정합니다. 한쪽으로 강하게 쏠린 기운이 당신의 절대적 무기이자 아킬레스건입니다.</p>
  <p class="ch-text">한 시대를 풍미한 인물들의 사주를 보면 오행이 중화된 경우보다 극단적으로 편중된 경우가 훨씬 많습니다. 편중된 에너지를 억누르는 것이 아니라, 그것을 가장 잘 활용할 수 있는 분야와 방식을 찾는 것이 핵심입니다. 분석 후 당신의 오행 분포와 상세 전략이 표시됩니다.</p>
</div>
<div class="report-chapter">
  <h3 class="ch-title">재물운 — 당신만의 금고를 여는 열쇠</h3>
  <p class="ch-text">명리학에서 재성은 단순히 통장 잔고가 아닙니다. 내가 세상을 통제하고 다루는 힘, 내 영향력이 미치는 영토의 크기입니다. 사주에서 재물을 바라보는 방식은 사람마다 완전히 다릅니다. 어떤 사람은 돈을 직접 쫓아야 하고, 어떤 사람은 가치를 높이면 돈이 저절로 따라옵니다.</p>
  <p class="ch-text">재성이 없는 무재 사주라도 걱정할 필요가 없습니다. 역사적으로 가장 큰 부를 이룬 사람들 중 무재 사주가 많습니다. 재성이 없으면 돈이 나를 따르는 구조가 아닌, 내 가치와 명성이 부를 끌어당기는 구조이기 때문입니다. 분석 후 당신만의 재물 전략이 표시됩니다.</p>
</div>
<div class="report-chapter">
  <h3 class="ch-title">대운 80년 — 인생의 계절 변화</h3>
  <p class="ch-text">대운은 10년마다 바뀌는 인생의 기후입니다. 봄이 오면 씨를 뿌리고, 여름이 오면 성장에 투자하고, 가을이 오면 수확하고, 겨울이 오면 내공을 다져야 합니다. 지금 어떤 계절인지 모른 채 살면, 겨울에 씨를 뿌리는 어리석음을 반복하게 됩니다.</p>
  <p class="ch-text">용신 기운의 대운에서는 공격적으로 확장하고, 기신 기운의 대운에서는 수비하며 내공을 쌓아야 합니다. 당신의 현재 대운이 어느 계절인지, 다음 대운은 무엇을 준비해야 하는지 — 분석 후 80년 전체 흐름이 표시됩니다.</p>
</div>
<div class="report-chapter">
  <h3 class="ch-title">세운 10년 — 해마다 바뀌는 날씨</h3>
  <p class="ch-text">세운은 그해의 날씨입니다. 같은 사람이라도 어떤 해에는 모든 것이 잘 풀리고, 어떤 해에는 버티는 것만으로도 벅찹니다. 이것은 운이 좋고 나쁜 것이 아니라, 그해의 기운과 당신의 원국이 어떻게 만나느냐의 문제입니다.</p>
  <p class="ch-text">용신 기운이 강한 해에는 중요한 결정과 행동을 집중하고, 기신 기운의 해에는 무리하게 확장하기보다 수비와 내공 축적에 집중해야 합니다. 올해부터 향후 10년간 어떤 해에 무엇을 해야 하는지 — 분석 후 연도별 전략이 표시됩니다.</p>
</div>
<div class="report-chapter">
  <h3 class="ch-title">월운 12개월 — 이달의 기운 파동</h3>
  <p class="ch-text">세운이 한 해의 날씨라면 월운은 그 안의 시간별 기상입니다. 같은 해 안에서도 어떤 달에는 기회가 쏟아지고, 어떤 달에는 예상치 못한 방해가 생깁니다. 중요한 계약, 첫 만남, 사업 시작의 타이밍을 잡을 때 월운을 아는 것이 결정적 우위가 됩니다.</p>
  <p class="ch-text">분석 후 올해 12개월의 기운 파동과 월별 전략이 표시됩니다. 언제 액셀을 밟고 언제 브레이크를 밟아야 하는지 — 달력처럼 활용하실 수 있습니다.</p>

function openHelp(key) {
    const data = HELP_DATA[key];
    if (data) {
        document.getElementById('help-title').innerHTML = data.title;
        document.getElementById('help-body').innerHTML = data.desc;
        const modal = document.getElementById('help-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.style.opacity = '1', 10);
    }
}

function closeHelp(e) {
    if (e && e.target !== document.getElementById('help-modal') && e.target.className !== 'modal-close') return;
    const modal = document.getElementById('help-modal');
    modal.style.opacity = '0';
    setTimeout(() => modal.style.display = 'none', 200);
}

        return map[ds] === gz[1] ? '천주귀인' : '';

    '수옥살': (gz, ec) => {
        const yb = ec.getYear()[1]; const db = ec.getDay()[1];

    '장성살': (gz, ec) => {

        return (map[yb]===gz[1] || map[db]===gz[1]) ? '장성살' : '';

    // ── 34. 복성귀인 — 일간 기준 ──

        const ds = ec.getDay()[0];
        const map = {"甲":"寅","乙":"丑","丙":"子","丁":"亥","戊":"戌","己":"酉","庚":"申","辛":"未","壬":"午","癸":"巳"};
        return map[ds] === gz[1] ? '복성귀인' : '';
    },
    // ── 35. 천주귀인2 (철새개금) — 일간+일지 조합 ──
    '철새개금': (gz, ec) => {

        return map[ds] === gz[1] ? '철새개금' : '';

};

function getSipseong(dayStem, target) {
    if (!dayStem || !target) return '';
    const t = target[0];
    const dIdx = WUXING_ORDER.indexOf(HAN_COLOR[dayStem]);
    const tIdx = WUXING_ORDER.indexOf(HAN_COLOR[t]);
    if (dIdx === -1 || tIdx === -1) return '';
    const diff = (tIdx - dIdx + 5) % 5;
    const same = isYang(dayStem) === isYang(t);
    return [["비견","겁재"],["식신","상관"],["편재","정재"],["편관","정관"],["편인","정인"]][diff][same ? 0 : 1];
}


function getGongmang(dayPillar) {
    const stems = ['갑','을','병','정','무','기','경','신','임','계'];
    const branches = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
    if (!dayPillar || dayPillar.length < 2) return '';
    // 한자→한글 변환 지원
    const HJ2KR_S = {'甲':'갑','乙':'을','丙':'병','丁':'정','戊':'무','己':'기','庚':'경','辛':'신','壬':'임','癸':'계'};
    const HJ2KR_B = {'子':'자','丑':'축','寅':'인','卯':'묘','辰':'진','巳':'사','午':'오','未':'미','申':'신','酉':'유','戌':'술','亥':'해'};
    const s0 = HJ2KR_S[dayPillar[0]] || dayPillar[0];
    const b0 = HJ2KR_B[dayPillar[1]] || dayPillar[1];
    const stemIdx = stems.indexOf(s0);
    const branchIdx = branches.indexOf(b0);
    if (stemIdx === -1 || branchIdx === -1) return '';
    
    // Calculate the branch offset relative to stem
    let offset = branchIdx - stemIdx;
    if (offset < 0) offset += 12;
    
    // The gongmang branches are the two preceding the group start
    // Groups are starting from Gap(0). The offset gives the starting group's branch.
    // Actually, simple formula: (branchIdx - stemIdx + 10) % 12 and +11
    const gm1 = branches[(offset + 10) % 12];
    const gm2 = branches[(offset + 11) % 12];
    return gm1 + gm2;
}

function buildRelationLines(pillars) {
    const stems = pillars.map(p => p.h[0]).filter(Boolean);
    const branches = pillars.map(p => p.h[1]).filter(Boolean);
    const lines = [];

    const stemCombine = [['甲','己','갑기합'],['乙','庚','을경합'],['丙','辛','병신합'],['丁','壬','정임합'],['戊','癸','무계합']];
    stemCombine.forEach(([a,b,label]) => { if (stems.includes(a) && stems.includes(b)) lines.push({type:'천간 합', label, chars:[a,b]}); });

    const branchSix = [['子','丑','자축합'],['寅','亥','인해합'],['卯','戌','묘술합'],['辰','酉','진유합'],['巳','申','사신합'],['午','未','오미합']];
    branchSix.forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push({type:'지지 합', label, chars:[a,b]}); });

    const branchChung = [['子','午','자오충'],['丑','未','축미충'],['寅','申','인신충'],['卯','酉','묘유충'],['辰','戌','진술충'],['巳','亥','사해충']];
    branchChung.forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push({type:'지지 충', label, chars:[a,b]}); });

    const branchHyung = [['子','卯','자묘형'],['寅','巳','인사형'],['巳','申','사신형'],['丑','戌','축술형'],['戌','未','술미형']];
    branchHyung.forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push({type:'지지 형', label, chars:[a,b]}); });

    if (branches.includes('寅') && branches.includes('卯') && branches.includes('辰')) lines.push({type:'방합', label:'인묘진 방합', chars:['寅','卯','辰']});
    if (branches.includes('巳') && branches.includes('午') && branches.includes('未')) lines.push({type:'방합', label:'사오미 방합', chars:['巳','午','未']});
    if (branches.includes('申') && branches.includes('酉') && branches.includes('戌')) lines.push({type:'방합', label:'신유술 방합', chars:['申','酉','戌']});
    if (branches.includes('亥') && branches.includes('子') && branches.includes('丑')) lines.push({type:'방합', label:'해자축 방합', chars:['亥','子','丑']});
    if (branches.includes('子') && branches.includes('辰')) lines.push({type:'반합', label:'자진 반합', chars:['子','辰']});
    
    if (!lines.length) lines.push({type:'없음', label:'특기할 합충형파해 구조 없음', chars:[]});
    return lines;
}

            // 기둥별 핵심 가중치 (월지 > 일지 > 시지/년지)
            let stemW = 1.0;

                    hl.push({ch: hsList[0], w: baseHw * 0.3}); // 여기

        wxData.forEach(w => {
            const col = WX_COLORS[w.key] || { fill: '#555', wave: '#444' };
            // 웨이브: SVG 단일 viewBox 안에서 animateTransform으로 처리

            const amp = 3;
            // 수위: amp 반영해서 실제로 fillH%처럼 보이게 보정

            var sc={}; sc[yong]=2;sc[hee]=1;sc[gi]=-2;sc[goo]=-1;

            function gb(s){return s>=3?'🌟 대길':s>=1?'✦ 길':s===0?'— 평':s>=-2?'⚠ 주의':'❌ 흉';}
            var curY3=new Date().getFullYear();var curM3=new Date().getMonth()+1;
            var h4='<div class="report-chapter"><h3 class="ch-title">월운 12개월 — 이달의 기운 완전 해부</h3><p class="ch-text">월운은 그달의 날씨입니다. 언제 액셀을 밟고 언제 브레이크를 밟아야 하는지 — 달력처럼 활용하십시오.</p>';

                var wlDesc=WL[jm4]||jm4+'월의 기운이 이달을 이끕니다.';

                h4+='<div style="margin-bottom:12px;padding:14px;background:rgba(255,255,255,'+(isThisM?'0.07':'0.03')+');border:1px solid '+(isThisM?'var(--gold)':'rgba(255,255,255,0.06)')+';border-radius:10px;">';
                h4+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:18px;font-weight:900;color:var(--gold);font-family:Noto Serif KR,serif;">'+gm4+jm4+'</span><span style="font-size:13px;color:#bbb;">'+m4+'월'+(isThisM?' <span style="font-size:10px;background:var(--gold);color:#000;padding:1px 6px;border-radius:6px;font-weight:700;">이달</span>':'')+'</span></div><span style="font-size:11px;font-weight:700;color:'+colm+';">'+gb(sm4)+'</span></div>';

            }
            h4+='</div>';
            var rc3=document.getElementById('report-container');
            if(rc3) rc3.insertAdjacentHTML('beforeend',h4);
        })();

        go(2);

        }
        // 완료 신호 (generateDeepReport가 동기 실행이므로 바로 전송)
        try { window.parent.postMessage({type:'SAJUX_REPORT_DONE', name: name}, '*'); } catch(e){}
