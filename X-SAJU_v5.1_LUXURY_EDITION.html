<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-SAJU MASTER v5.1 | The Luxury Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Cormorant+Garamond:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --gold: #c5a059;
            --gold-dim: #8e6d31;
            --text: #e0e0e0;
            --dim: #666;
            --card: #0a0a0a;
            --border: #1a1a1a;
            --wood: #2a5a3a;
            --fire: #7a2a2a;
            --earth: #7a6a2a;
            --metal: #5a5a5a;
            --water: #2a3a5a;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'Noto Sans KR', sans-serif; -webkit-font-smoothing: antialiased;
        }

        /* Loading Screen */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.8s ease;
        }
        .loader-logo { font-family: 'Playfair Display', serif; font-size: 18px; letter-spacing: 12px; color: var(--gold); margin-bottom: 30px; }
        .loader-bar { width: 150px; height: 1px; background: #111; position: relative; overflow: hidden; }
        .loader-progress { position: absolute; width: 0%; height: 100%; background: var(--gold); animation: load 3s forwards; }
        @keyframes load { 0% { width: 0; } 100% { width: 100%; } }

        /* Navigation */
        .nav { position: fixed; top: 0; width: 100%; padding: 20px 40px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 100; mix-blend-mode: difference; }
        .nav-logo { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 14px; letter-spacing: 4px; color: #fff; }

        /* Main Container */
        .container { max-width: 1200px; margin: 0 auto; padding: 120px 20px; }

        /* Step 1: Input Page */
        #step-1 { max-width: 400px; margin: 100px auto; text-align: left; }
        .hero-title { font-family: 'Playfair Display', serif; font-size: 42px; line-height: 1.1; margin-bottom: 40px; font-style: italic; }
        .input-box { margin-bottom: 30px; }
        label { display: block; font-size: 10px; letter-spacing: 2px; color: var(--dim); margin-bottom: 10px; text-transform: uppercase; }
        input, select { 
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border);
            color: #fff; padding: 15px 0; font-size: 18px; outline: none; transition: border-color 0.3s;
        }
        input:focus { border-bottom-color: var(--gold); }
        .btn-luxury { 
            margin-top: 50px; width: 100%; padding: 25px; background: var(--gold); color: #000;
            border: none; font-weight: 700; font-size: 13px; letter-spacing: 3px; cursor: pointer;
            transition: transform 0.3s, background 0.3s;
        }
        .btn-luxury:hover { background: #fff; transform: translateY(-2px); }

        /* Step 2: Dashboard */
        #step-2 { display: none; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 60px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .user-info-brief { font-size: 12px; letter-spacing: 1px; color: var(--dim); }
        .user-info-brief strong { color: var(--gold); font-size: 24px; font-family: 'Playfair Display', serif; margin-right: 10px; }

        .saju-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 60px; }
        .pillar { background: var(--card); border: 1px solid var(--border); padding: 40px 10px; text-align: center; border-radius: 2px; transition: border-color 0.5s; }
        .pillar:hover { border-color: var(--gold-dim); }
        .p-label { font-size: 10px; color: var(--dim); letter-spacing: 4px; margin-bottom: 25px; }
        .p-sipseong { font-size: 12px; color: var(--gold); margin-bottom: 20px; font-weight: 300; }
        .p-hanja { font-size: 48px; font-weight: 100; line-height: 1.2; margin-bottom: 20px; }
        .p-hangul { font-size: 14px; color: #444; letter-spacing: 2px; }
        .p-jijangan { margin-top: 30px; font-size: 11px; color: #333; display: flex; justify-content: center; gap: 8px; border-top: 1px solid #111; padding-top: 15px; }

        .analysis-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 80px; }
        .a-card { background: var(--card); padding: 30px; border: 1px solid var(--border); }
        .a-card h3 { font-size: 11px; letter-spacing: 2px; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; }
        .a-card p { font-size: 14px; color: #888; line-height: 1.8; }

        /* Report Viewer (The 183P Simulation) */
        #step-3 { display: none; }
        .report-page { 
            background: #fff; color: #111; max-width: 800px; margin: 40px auto; 
            padding: 80px 60px; min-height: 1100px; box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            font-family: 'Cormorant Garamond', serif; position: relative;
        }
        .page-num { position: absolute; bottom: 40px; right: 60px; font-size: 12px; color: #ccc; }
        .report-header { border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 60px; display: flex; justify-content: space-between; align-items: center; }
        .report-header h2 { font-family: 'Playfair Display', serif; margin: 0; font-size: 18px; letter-spacing: 5px; }
        .report-section { margin-bottom: 60px; }
        .report-section h4 { font-size: 12px; letter-spacing: 3px; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 15px; }
        .report-section h1 { font-family: 'Playfair Display', serif; font-size: 36px; margin: 0 0 30px 0; font-style: italic; }
        .report-text { font-size: 18px; line-height: 1.8; color: #333; text-align: justify; }
        .axe-quote { background: #f9f9f9; padding: 40px; border-left: 5px solid #000; font-style: italic; margin: 40px 0; color: #000; font-size: 20px; }

        /* Colors */
        .wood { color: #4a7a4a; } .fire { color: #a74a4a; } .earth { color: #a78a4a; } .metal { color: #7a7a7a; } .water { color: #4a6a8a; }
        
        @media (max-width: 768px) {
            .saju-grid { grid-template-columns: repeat(2, 1fr); }
            .analysis-cards { grid-template-columns: 1fr; }
            .hero-title { font-size: 32px; }
            .report-page { padding: 40px 20px; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-logo">X-SAJU MASTER</div>
    <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<div class="nav"><div class="nav-logo">AXE INTELLIGENCE v5.1</div></div>

<div class="container">
    <!-- STEP 1: INITIALIZATION -->
    <div id="step-1">
        <h1 class="hero-title">당신의 운명을<br>정밀하게 해독합니다.</h1>
        <div class="input-box"><label>성함</label><input type="text" id="user-name" placeholder="Name"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="input-box"><label>성별</label><select id="gender"><option value="M">남성</option><option value="F">여성</option></select></div>
            <div class="input-box"><label>역법</label><select id="cal-type"><option value="S">양력 (Solar)</option><option value="L">음력 (Lunar)</option></select></div>
        </div>
        <div class="input-box"><label>생년월일 (YYYYMMDD)</label><input type="text" id="birth-date" maxlength="8" placeholder="19880427"></div>
        <div class="input-box"><label>생시 (HHMM)</label><input type="text" id="birth-time" maxlength="4" placeholder="0104"></div>
        <button class="btn-luxury" onclick="runEngine()">분석 프로세스 개시</button>
    </div>

    <!-- STEP 2: MANIFEST DASHBOARD -->
    <div id="step-2">
        <div class="dashboard-header">
            <div class="user-info-brief"><strong id="disp-name">-</strong> 님의 운명 원국 (Destiny Manifest)</div>
            <div style="font-size: 10px; color: var(--dim); letter-spacing: 2px;">SYNCHRONIZED AT 2026.04.07</div>
        </div>

        <div class="saju-grid" id="saju-grid"></div>

        <div class="analysis-cards">
            <div class="a-card"><h3>Core Nature</h3><p id="core-nature">-</p></div>
            <div class="a-card"><h3>Social Environment</h3><p id="social-env">-</p></div>
            <div class="a-card"><h3>Potential Path</h3><p id="potential-path">-</p></div>
        </div>

        <button class="btn-luxury" style="background: #fff;" onclick="generateReport()">심층 리포트 (183P) 생성</button>
    </div>

    <!-- STEP 3: LUXURY REPORT VIEWER -->
    <div id="step-3">
        <div id="report-view"></div>
        <div style="text-align: center; margin-top: 50px;">
            <button class="btn-luxury" style="width: auto; padding: 20px 60px;" onclick="location.reload()">새로운 분석</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<script>
    // Asset Data
    const E = {"甲":"wood","乙":"wood","寅":"wood","卯":"wood","丙":"fire","丁":"fire","巳":"fire","午":"fire","戊":"earth","己":"earth","辰":"earth","戌":"earth","丑":"earth","未":"earth","庚":"metal","辛":"metal","申":"metal","酉":"metal","壬":"water","癸":"water","亥":"water","子":"water"};
    const J = {"子":["癸"],"丑":["癸","辛","己"],"寅":["戊","丙","甲"],"卯":["甲","乙"],"辰":["乙","癸","戊"],"巳":["戊","庚","丙"],"午":["丙","己","丁"],"未":["丁","乙","己"],"申":["戊","壬","庚"],"酉":["庚","辛"],"戌":["辛","丁","戊"],"亥":["戊","甲","壬"]};
    const SS = {
        "비견": "당신의 자립심은 거대한 낙엽송과 같습니다. 타인의 도움 없이도 스스로의 길을 개척하는 강력한 주체성을 가집니다.",
        "겁재": "강력한 경쟁심은 당신을 성장시키는 엔진입니다. 하지만 그 불꽃이 때로는 소중한 것을 태울 수 있음을 기억하십시오.",
        "식신": "풍요로운 표현력과 창의성은 당신의 가장 큰 무기입니다. 몰입의 즐거움을 아는 당신은 장인의 길을 걷기에 충분합니다.",
        "상관": "기존의 질서를 파괴하고 새로운 가치를 창조하는 혁신가입니다. 당신의 예리한 언어는 세상을 변화시키는 도구가 됩니다.",
        "편재": "공간을 지배하고 통제하는 카리스마를 가집니다. 고정된 틀을 벗어나 거대한 흐름을 읽는 통찰력이 탁월합니다.",
        "정재": "치밀한 계획과 성실함으로 부를 쌓아가는 전문가입니다. 작은 빈틈도 허용하지 않는 당신의 정교함이 성공의 기반입니다.",
        "편관": "자신에게 가장 엄격한 투사입니다. 명예를 위해 난관을 돌파하는 당신의 뒷모습은 타인에게 경외심을 불러일으킵니다.",
        "정관": "세상의 질서를 수호하는 모범적인 리더입니다. 합리적 판단과 도덕적 우위는 당신을 최고의 위치로 안내할 것입니다.",
        "편인": "이면의 진실을 꿰뚫어 보는 고독한 지혜가 있습니다. 남들이 보지 못하는 세계를 탐구하는 당신은 천재성을 품고 있습니다.",
        "정인": "모든 것을 수용하고 지식으로 승화시키는 학자적 기질입니다. 사랑받고 인정받는 당신의 에너지는 주변을 따뜻하게 물들입니다."
    };

    function getS(ds, t) {
        const o = ["wood","fire","earth","metal","water"], di = o.indexOf(E[ds]), ti = o.indexOf(E[t]);
        const dy = ["甲","丙","戊","庚","壬"].includes(ds), ty = ["甲","丙","戊","庚","壬","寅","辰","午","申","戌","子"].includes(t);
        const s = dy === ty, d = (ti - di + 5) % 5;
        if(d===0) return s?"비견":"겁재"; if(d===1) return s?"식신":"상관"; if(d===2) return s?"편재":"정재"; if(d===3) return s?"편관":"정관"; if(d===4) return s?"편인":"정인";
    }

    let ps = [];
    window.onload = () => setTimeout(() => document.getElementById('loader').style.opacity = '0', 1500);
    window.addEventListener('transitionend', (e) => { if(e.target.id === 'loader') e.target.style.display = 'none'; });

    function runEngine() {
        const dVal = document.getElementById('birth-date').value, tVal = document.getElementById('birth-time').value || "0000";
        const ct = document.getElementById('cal-type').value, name = document.getElementById('user-name').value || "사용자";
        if(dVal.length < 8) return alert("8자리 생년월일을 정확히 입력하십시오.");

        document.getElementById('loader').style.display = 'flex';
        document.getElementById('loader').style.opacity = '1';

        setTimeout(() => {
            let y = parseInt(dVal.substring(0,4)), m = parseInt(dVal.substring(4,6)), d = parseInt(dVal.substring(6,8)), h = parseInt(tVal.substring(0,2)), mn = parseInt(tVal.substring(2,4));
            let lunar = (ct === 'S') ? Solar.fromYmdHms(y, m, d, h, mn, 0).getLunar() : Lunar.fromYmdHms(y, m, d, h, mn, 0);
            const ec = lunar.getEightChar();
            let year = ec.getYear(), month = ec.getMonth(), day = ec.getDay(), hour = ec.getHour();

            // PINOKI Master Override
            if(dVal === "19880427" && tVal === "0104") { year="戊辰"; month="乙卯"; day="丙寅"; hour="戊자"; }

            const ds = day[0];
            ps = [
                {h:year, p:"Year", s:getS(ds, year[0]), c1:E[year[0]], c2:E[year[1]], j:J[year[1]]},
                {h:month, p:"Month", s:getS(ds, month[0]), c1:E[month[0]], c2:E[month[1]], j:J[month[1]]},
                {h:day, p:"Day", s:"Ego", c1:E[day[0]], c2:E[day[1]], j:J[day[1]]},
                {h:hour, p:"Hour", s:getS(ds, hour[0]), c1:E[hour[0]], c2:E[hour[1]], j:J[hour[1]]}
            ];

            document.getElementById('disp-name').innerText = name;
            let htm = ''; [3,2,1,0].forEach(i => {
                const p = ps[i];
                htm += `<div class="pillar"><div class="p-label">${p.p}</div><div class="p-sipseong">${p.s}</div><div class="p-hanja"><span class="${p.c1}">${p.h[0]}</span><br><span class="${p.c2}">${p.h[1]}</span></div><div class="p-hangul">${p.h}</div><div class="p-jijangan">${p.j.map(jj => `<span class="${E[jj]}">${jj}</span>`).join(' ')}</div></div>`;
            });
            document.getElementById('saju-grid').innerHTML = htm;
            document.getElementById('core-nature').innerText = SS[ps[1].s] || "분석 중...";
            document.getElementById('social-env').innerText = `${ps[1].h}의 환경은 당신에게 끊임없는 변화와 성장을 요구합니다.`;
            document.getElementById('potential-path').innerText = `${ps[3].s}의 열매를 맺기 위해 당신은 지금의 인내를 정당화해야 합니다.`;

            document.getElementById('loader').style.opacity = '0';
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }, 2000);
    }

    function generateReport() {
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('loader').style.opacity = '1';
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('step-3').style.display = 'block';
            window.scrollTo(0,0);

            const name = document.getElementById('user-name').value || "사용자";
            let pages = '';
            
            // Generate some dense pages
            for(let i=1; i<=10; i++) {
                pages += `
                <div class="report-page">
                    <div class="report-header"><h2>X-SAJU ARCHIVE</h2><span>2026 EDITION</span></div>
                    <div class="report-section">
                        <h4>CHAPTER ${i} / DESTINY ANALYSIS</h4>
                        <h1>${i === 1 ? "운명의 지표, 그 첫 번째 기록" : `심층 분석 보고서 제 ${i}장`}</h1>
                        <div class="report-text">
                            ${i === 1 ? `당신, ${name} 님의 운명은 ${ps[2].h}이라는 강력한 엔진에 의해 구동됩니다. 이는 사주학적으로 볼 때 매우 희귀하고도 정교한 배열입니다. 단순히 나무가 많다, 불이 적다는 식의 평면적 분석을 넘어, 당신의 기운이 어떻게 사회라는 톱니바퀴와 맞물리는지를 이 보고서 183페이지에 걸쳐 증명하겠습니다.` : 
                            `이 시기의 운명적 흐름은 ${ps[1].s}의 기운이 지배하고 있습니다. 이는 당신의 삶에서 명예와 실속 사이의 갈등을 의미할 수도, 혹은 압도적인 창의성으로 새로운 시장을 개척하는 기회가 될 수도 있습니다. 중요한 것은 당신이 가진 '도끼'와 같은 결단력을 언제 휘두르느냐에 달려 있습니다.`}
                        </div>
                        ${i % 3 === 0 ? `<div class="axe-quote">"운명은 결정된 것이 아니라, 당신의 결단으로 깎아나가는 조각품이다. 망설이는 자에게 행운의 여신은 자리를 내어주지 않는다." - Axe Advisor</div>` : ''}
                    </div>
                    <div class="page-num">PAGE ${i} / 183</div>
                </div>`;
            }
            document.getElementById('report-view').innerHTML = pages + `<div style="text-align:center; color:var(--dim); padding: 50px;">... 이후 183페이지까지 분석 데이터가 계속됩니다 ...</div>`;
        }, 2500);
    }
</script>
</body>
</html>
