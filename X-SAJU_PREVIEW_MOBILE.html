                    </svg>
                    <div id="gauge-needle" style="width:4px; height:70px; background:#fff; position:absolute; bottom:20px; left:calc(50% - 2px); transform-origin:bottom center; transform:rotate(-90deg); transition:1s;"></div>

            <div id="daeun-table"></div>

<button class="btn" style="background:var(--gold); color:#000; font-weight:800;" onclick="startReport()">심층 사주풀이 (X-FILE) 열람</button>
        <button class="btn subtle" onclick="go(1)">정보 수정하기</button>

    <!-- STEP 3: 리포트 -->
    <div id="step-3" class="page">
        <div style="font-size:24px; font-family:'Noto Serif KR', serif; text-align:center; color:var(--gold); margin-bottom:30px; letter-spacing:2px;">TOP SECRET X-FILE</div>
        <div id="report-container"></div>
        <button class="btn subtle" onclick="go(2)">만세력으로 돌아가기</button>
    </div>
</div>

<script>
;(function(root,factory){
  if (typeof define==='function'&&define.amd){
    define(factory);
  }else if(typeof module!='undefined'&&module.exports){
    module.exports = factory();
  }else{
    var o = factory();
    for(var i in o){
      root[i] = o[i];
    }
  }
})(this,function(){
  var Solar = (function(){
    var _fromDate = function(date){
      return _fromYmdHms(date.getFullYear(),date.getMonth()+1,date.getDate(),date.getHours(),date.getMinutes(),date.getSeconds());
    };
    var _fromJulianDay = function(julianDay){
      var d = Math.floor(julianDay + 0.5);
      var f = julianDay + 0.5 - d;
      var c;

      if (d >= 2299161) {
        c = Math.floor((d - 1867216.25) / 36524.25);
        d += 1 + c - Math.floor(c / 4);
      }
      d += 1524;
      var year = Math.floor((d - 122.1) / 365.25);
      d -= Math.floor(365.25 * year);
      var month = Math.floor(d / 30.601);
      d -= Math.floor(30.601 * month);
      var day = d;
      if (month > 13) {
        month -= 13;
        year -= 4715;
      } else {
        month -= 1;
        year -= 4716;
      }
      f *= 24;
      var hour = Math.floor(f);

      f -= hour;
      f *= 60;
      var minute = Math.floor(f);

      f -= minute;
      f *= 60;
      var second = Math.round(f);
      if(second>59){
        second-=60;
        minute++;
      }
      if(minute>59){
        minute-=60;
        hour++;
      }
      if(hour>23){
        hour-=24;
        day+=1;
      }
      return _fromYmdHms(year,month,day,hour,minute,second);
    };
    var _fromYmdHms = function(y,m,d,hour,minute,second){
      var oy = y;
      var om = m;
      var od = d;
      var oh = hour;
      var oi = minute;
      var os = second;
      y *= 1;
      if(isNaN(y)){
        throw new Error('wrong solar year '+oy);
      }
      m *= 1;
      if(isNaN(m)){
        throw new Error('wrong solar month '+om);
      }
      d *= 1;
      if(isNaN(d)){
        throw new Error('wrong solar day '+od);
      }
      hour *= 1;
      if(isNaN(hour)){
        throw new Error('wrong hour '+oh);
      }
      minute *= 1;
      if(isNaN(minute)){
        throw new Error('wrong minute '+oi);
      }
      second *= 1;
      if(isNaN(second)){
        throw new Error('wrong second '+os);
      }
      if(1582===y && 10===m){
        if(d>4&&d<15){
          throw new Error('wrong solar year '+y+' month '+m+' day '+d);
        }
      }
      if(m<1||m>12){
        throw new Error('wrong month ' + m);
      }
      if(d<1||d>31){
        throw new Error('wrong day ' + d);
      }
      if(hour<0||hour>23){
        throw new Error('wrong hour '+hour);
      }
      if(minute<0||minute>59){
        throw new Error('wrong minute '+minute);
      }
      if(second<0||second>59){
        throw new Error('wrong second '+second);
      }
      return {
        _p:{
          year:y,
          month:m,
          day:d,
          hour:hour,
          minute:minute,
          second:second
        },
        subtract:function(solar){
          return SolarUtil.getDaysBetween(solar.getYear(), solar.getMonth(), solar.getDay(), this._p.year, this._p.month, this._p.day);
        },
        subtractMinute:function(solar){
          var days = this.subtract(solar);
          var cm = this._p.hour * 60 + this._p.minute;
          var sm = solar.getHour() * 60 + solar.getMinute();
          var m = cm - sm;
          if (m < 0) {
            m += 1440;
            days--;
          }
          m += days * 1440;
          return m;
        },
        isAfter: function(solar) {
          if (this._p.year > solar.getYear()) {
            return true;
          }
          if (this._p.year < solar.getYear()) {
            return false;
          }
          if (this._p.month > solar.getMonth()) {
            return true;
          }
          if (this._p.month < solar.getMonth()) {
            return false;
          }
          if (this._p.day > solar.getDay()) {
            return true;
          }
          if (this._p.day < solar.getDay()) {
            return false;
          }
          if (this._p.hour > solar.getHour()) {
            return true;
          }
          if (this._p.hour < solar.getHour()) {
            return false;
          }
          if (this._p.minute > solar.getMinute()) {
            return true;
          }
          if (this._p.minute < solar.getMinute()) {
            return false;
          }
          return this._p.second > solar.getSecond();
        },
        isBefore: function(solar) {
          if (this._p.year > solar.getYear()) {
            return false;
          }
          if (this._p.year < solar.getYear()) {
            return true;
          }
          if (this._p.month > solar.getMonth()) {
            return false;
          }
          if (this._p.month < solar.getMonth()) {
            return true;
          }
          if (this._p.day > solar.getDay()) {
            return false;
          }
          if (this._p.day < solar.getDay()) {
            return true;
          }
          if (this._p.hour > solar.getHour()) {
            return false;
          }
          if (this._p.hour < solar.getHour()) {
            return true;
          }
          if (this._p.minute > solar.getMinute()) {
            return false;
          }
          if (this._p.minute < solar.getMinute()) {
            return true;
          }
          return this._p.second < solar.getSecond();
        },
        getYear:function(){
          return this._p.year;
        },
        getMonth:function(){
          return this._p.month;
        },
        getDay:function(){
          return this._p.day;
        },
        getHour:function(){
          return this._p.hour;
        },
        getMinute:function(){
          return this._p.minute;
        },
        getSecond:function(){
          return this._p.second;
        },
        getWeek:function(){
          return (Math.floor(this.getJulianDay() + 0.5) + 7000001) % 7;
        },
        getWeekInChinese:function(){
          return SolarUtil.WEEK[this.getWeek()];
        },
        /**
         * 获取当天的阳历周
         * @param start 星期几作为一周的开始，1234560分别代表星期一至星期天
         */
        getSolarWeek:function(start){
          return SolarWeek.fromYmd(this._p.year, this._p.month, this._p.day, start);
        },
        isLeapYear:function(){
          return SolarUtil.isLeapYear(this._p.year);
        },
        getFestivals:function(){
          var l = [];
          var f = SolarUtil.FESTIVAL[this._p.month+'-'+this._p.day];
          if(f){
            l.push(f);
          }
          var weeks = Math.ceil(this._p.day/7);
          var week = this.getWeek();
          f = SolarUtil.WEEK_FESTIVAL[this._p.month+'-'+weeks+'-'+week];
          if(f){
            l.push(f);
          }
          if (this._p.day + 7 > SolarUtil.getDaysOfMonth(this._p.year, this._p.month)) {
            f = SolarUtil.WEEK_FESTIVAL[this._p.month + '-0-' + week];
            if (f) {
              l.push(f);
            }
          }
          return l;
        },
        getOtherFestivals:function(){
          var l=[];
          var fs=SolarUtil.OTHER_FESTIVAL[this._p.month+'-'+this._p.day];
          if(fs){
            l=l.concat(fs);
          }
          return l;
        },
        getXingzuo:function(){
          return this.getXingZuo();
        },
        getXingZuo:function(){
          var index = 11;
          var y = this._p.month*100+this._p.day;
          if (y >= 321 && y <= 419) {
            index = 0;
          } else if (y >= 420 && y <= 520) {
            index = 1;
          } else if (y >= 521 && y <= 621) {
            index = 2;
          } else if (y >= 622 && y <= 722) {
            index = 3;
          } else if (y >= 723 && y <= 822) {
            index = 4;
          } else if (y >= 823 && y <= 922) {
            index = 5;
          } else if (y >= 923 && y <= 1023) {
            index = 6;
          } else if (y >= 1024 && y <= 1122) {
            index = 7;
          } else if (y >= 1123 && y <= 1221) {
            index = 8;
          } else if (y >= 1222 || y <= 119) {
            index = 9;
          } else if (y <= 218) {
            index = 10;
          }
          return SolarUtil.XINGZUO[index];
        },
        toYmd:function(){
          var m = this._p.month;
          var d = this._p.day;
          var y = this._p.year + '';
          while (y.length < 4) {
            y = '0' + y;
          }
          return [y,(m<10?'0':'')+m,(d<10?'0':'')+d].join('-');
        },
        toYmdHms:function(){
          return this.toYmd()+' '+[(this._p.hour<10?'0':'')+this._p.hour,(this._p.minute<10?'0':'')+this._p.minute,(this._p.second<10?'0':'')+this._p.second].join(':');
        },
        toString:function(){
          return this.toYmd();
        },
        toFullString:function(){
          var s = this.toYmdHms();
          if(this.isLeapYear()){
            s += ' 闰年';
          }
          s += ' 星期'+this.getWeekInChinese();
          var festivals = this.getFestivals();
          for(var i=0,j=festivals.length;i<j;i++){
            s += ' ('+festivals[i]+')';
          }
          s += ' '+this.getXingZuo()+'座';
          return s;
        },
        nextYear:function(years){
          var oy = years;
          years *= 1;
          if (isNaN(years)) {
            throw new Error('wrong years ' + oy);
          }
          var y = this._p.year + years;
          var m = this._p.month;
          var d = this._p.day;
          if (1582 === y && 10 === m) {
            if (d > 4 && d < 15) {
              d += 10;
            }
          } else if (2 === m) {
            if (d > 28) {
              if (!SolarUtil.isLeapYear(y)) {
                d = 28;
              }

      XIU_SONG:{
        '{xx.jiao}': '角星造作主荣昌，外进田财及女郎，嫁娶婚姻出贵子，文人及第见君王，惟有埋葬不可用，三年之后主瘟疫，起工修筑坟基地，堂前立见主人凶。',
        '{xx.kang}': '亢星造作长房当，十日之中主有殃，田地消磨官失职，接运定是虎狼伤，嫁娶婚姻用此日，儿孙新妇守空房，埋葬若还用此日，当时害祸主重伤。',
        '{xx.di}': '氐星造作主灾凶，费尽田园仓库空，埋葬不可用此日，悬绳吊颈祸重重，若是婚姻离别散，夜招浪子入房中，行船必定遭沉没，更生聋哑子孙穷。',
        '{xx.fang}': '房星造作田园进，钱财牛马遍山岗，更招外处田庄宅，荣华富贵福禄康，埋葬若然用此日，高官进职拜君王，嫁娶嫦娥至月殿，三年抱子至朝堂。',
        '{xx.xin}': '心星造作大为凶，更遭刑讼狱囚中，忤逆官非宅产退，埋葬卒暴死相从，婚姻若是用此日，子死儿亡泪满胸，三年之内连遭祸，事事教君没始终。',
        '{xx.tail}': '尾星造作主天恩，富贵荣华福禄增，招财进宝兴家宅，和合婚姻贵子孙，埋葬若能依此日，男清女正子孙兴，开门放水招田宅，代代公侯远播名。',
        '{xx.ji}': '箕星造作主高强，岁岁年年大吉昌，埋葬修坟大吉利，田蚕牛马遍山岗，开门放水招田宅，箧满金银谷满仓，福荫高官加禄位，六亲丰禄乐安康。',
        '{xx.dou}': '斗星造作主招财，文武官员位鼎台，田宅家财千万进，坟堂修筑贵富来，开门放水招牛马，旺蚕男女主和谐，遇此吉宿来照护，时支福庆永无灾。',
        '{xx.niu}': '牛星造作主灾危，九横三灾不可推，家宅不安人口退，田蚕不利主人衰，嫁娶婚姻皆自损，金银财谷渐无之，若是开门并放水，牛猪羊马亦伤悲。',
        '{xx.nv}': '女星造作损婆娘，兄弟相嫌似虎狼，埋葬生灾逢鬼怪，颠邪疾病主瘟惶，为事遭官财失散，泻利留连不可当，开门放水用此日，全家财散主离乡。',
        '{xx.xu}': '虚星造作主灾殃，男女孤眠不一双，内乱风声无礼节，儿孙媳妇伴人床，开门放水遭灾祸，虎咬蛇伤又卒亡，三三五五连年病，家破人亡不可当。',
        '{xx.wei}': '危星不可造高楼，自遭刑吊见血光，三年孩子遭水厄，后生出外永不还，埋葬若还逢此日，周年百日取高堂，三年两载一悲伤，开门放水到官堂。',
        '{xx.shi}': '室星修造进田牛，儿孙代代近王侯，家贵荣华天上至，寿如彭祖八千秋，开门放水招财帛，和合婚姻生贵儿，埋葬若能依此日，门庭兴旺福无休。',
        '{xx.qiang}': '壁星造作主增财，丝蚕大熟福滔天，奴婢自来人口进，开门放水出英贤，埋葬招财官品进，家中诸事乐陶然，婚姻吉利主贵子，早播名誉著祖鞭。',
        '{xx.kui}': '奎星造作得祯祥，家内荣和大吉昌，若是埋葬阴卒死，当年定主两三伤，看看军令刑伤到，重重官事主瘟惶，开门放水遭灾祸，三年两次损儿郎。',
        '{xx.lou}': '娄星修造起门庭，财旺家和事事兴，外进钱财百日进，一家兄弟播高名，婚姻进益生贵子，玉帛金银箱满盈，放水开门皆吉利，男荣女贵寿康宁。',
        '{xx.vei}': '胃星造作事如何，家贵荣华喜气多，埋葬贵临官禄位，夫妇齐眉永保康，婚姻遇此家富贵，三灾九祸不逢他，从此门前多吉庆，儿孙代代拜金阶。',
        '{xx.mao}': '昴星造作进田牛，埋葬官灾不得休，重丧二日三人死，尽卖田园不记增，开门放水招灾祸，三岁孩儿白了头，婚姻不可逢此日，死别生离是可愁。',
        '{xx.bi}': '毕星造作主光前，买得田园有余钱，埋葬此日添官职，田蚕大熟永丰年，开门放水多吉庆，合家人口得安然，婚姻若得逢此日，生得孩儿福寿全。',
        '{xx.zi}': '觜星造作有徒刑，三年必定主伶丁，埋葬卒死多因此，取定寅年使杀人，三丧不止皆由此，一人药毒二人身，家门田地皆退败，仓库金银化作尘。',
        '{xx.can}': '参星造作旺人家，文星照耀大光华，只因造作田财旺，埋葬招疾哭黄沙，开门放水加官职，房房子孙见田加，婚姻许遁遭刑克，男女朝开幕落花。',
        '{xx.jing}': '井星造作旺蚕田，金榜题名第一光，埋葬须防惊卒死，狂颠风疾入黄泉，开门放水招财帛，牛马猪羊旺莫言，贵人田塘来入宅，儿孙兴旺有余钱。',
        '{xx.gui}': '鬼星起造卒人亡，堂前不见主人郎，埋葬此日官禄至，儿孙代代近君王，开门放水须伤死，嫁娶夫妻不久长，修土筑墙伤产女，手扶双女泪汪汪。',
        '{xx.liu}': '柳星造作主遭官，昼夜偷闭不暂安，埋葬瘟惶多疾病，田园退尽守冬寒，开门放水遭聋瞎，腰驼背曲似弓弯，更有棒刑宜谨慎，妇人随客走盘桓。',
        '{xx.xing}': '星宿日好造新房，进职加官近帝王，不可埋葬并放水，凶星临位女人亡，生离死别无心恋，要自归休别嫁郎，孔子九曲殊难度，放水开门天命伤。',
        '{xx.zhang}': '张星日好造龙轩，年年并见进庄田，埋葬不久升官职，代代为官近帝前，开门放水招财帛，婚姻和合福绵绵，田蚕人满仓库满，百般顺意自安然。',
        '{xx.yi}': '翼星不利架高堂，三年二载见瘟惶，埋葬若还逢此日，子孙必定走他乡，婚姻此日不宜利，归家定是不相当，开门放水家须破，少女恋花贪外郎。',
        '{xx.zhen}': '轸星临水造龙宫，代代为官受皇封，富贵荣华增寿禄，库满仓盈自昌隆，埋葬文昌来照助，宅舍安宁不见凶，更有为官沾帝宠，婚姻龙子入龙宫。'
      },

<script>

function get12Shinsal(dayBranch, targetBranch) {
    const samhap = {
        "寅": "火", "午": "火", "戌": "火",
        "申": "水", "子": "水", "辰": "水",
        "巳": "金", "酉": "金", "丑": "金",
        "亥": "木", "卯": "木", "未": "木"
    };
    const startIdx = { "火": "寅", "水": "申", "金": "巳", "木": "亥" };
    const branches = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
    const shinsalList = ["겁살","재살","천살","지살","연살","월살","망신","장성","반안","역마","육해","화개"];
    
    let base = samhap[dayBranch];
    if(!base) return "-";
    let startBranch = startIdx[base];
    let offset = branches.indexOf(targetBranch) - branches.indexOf(startBranch);
    if(offset < 0) offset += 12;
    return shinsalList[offset];
}

function calculateHealthScore(wuxing) {
    let score = 100;
    const total = Object.values(wuxing).reduce((a,b)=>a+b, 0) || 1;
    for(let k in wuxing) {
        let per = (wuxing[k] / total) * 100;
        if(per > 40) score -= (per - 40) * 2; 
        if(per < 5) score -= (10 - per) * 3;  
    }
    return Math.max(0, Math.round(score));
}

function getAllShinsal(pillars, ec, isUnknown) {
    const ds = pillars[1].h[0]; // 일간
    const result = {};
    const TARGETS = {
        '천을귀인': {"甲":"丑未","戊":"丑未","庚":"丑未","乙":"子申","己":"子申","丙":"亥酉","丁":"亥酉","壬":"卯巳","癸":"卯巳","辛":"寅午"},
        '문창귀인': {"甲":"巳","乙":"午","丙":"申","丁":"酉","戊":"申","己":"酉","庚":"亥","辛":"子","壬":"寅","癸":"卯"},
        '학당귀인': {"甲":"亥","乙":"午","丙":"寅","丁":"酉","戊":"寅","己":"酉","庚":"巳","辛":"子","壬":"申","癸":"卯"},
        '천복귀인': {"甲":"酉","乙":"申","丙":"子","丁":"亥","戊":"卯","己":"寅","庚":"午","辛":"巳","壬":"辰","癸":"미"},
        '암록': {"甲":"亥","乙":"戌","丙":"申","丁":"未","戊":"申","己":"미","庚":"巳","辛":"辰","壬":"寅","癸":"丑"},
        '태극귀인': {"甲":"子午","乙":"子午","丙":"卯酉","丁":"卯酉","戊":"辰戌丑未","己":"辰戌丑未","庚":"寅亥","辛":"寅亥","壬":"巳申","癸":"巳申"}
    };
    pillars.forEach((p, idx) => {
        if (isUnknown && idx === 0) return;
        const arr = [];
        const gz = (p.h[0] || '') + (p.h[1] || '');
        const branch = p.h[1];
        if(['甲辰','乙未','丙戌','丁丑','戊辰','壬戌','癸丑'].includes(gz)) arr.push('백호대살');
        if(['庚辰','庚戌','壬辰','壬戌','戊戌'].includes(gz)) arr.push('괴강살');
        for(let key in TARGETS) {
            let target = TARGETS[key][ds];
            if(target && target.includes(branch)) arr.push(key);
        }
        const hong = {"甲":"午","乙":"午","丙":"寅","丁":"미","戊":"辰","己":"辰","庚":"戌","辛":"酉","壬":"申","癸":"申"}[ds];
        if(hong === branch) arr.push('홍염살');
        result[p.n] = arr;
    });
    return result;
}

function getSipseong(dayStem, target) {
    if(!target) return '-';
    const stems = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
    const wuxing = {"甲":"wood","乙":"wood","丙":"fire","丁":"fire","戊":"earth","己":"earth","庚":"metal","辛":"metal","壬":"water","癸":"water","子":"water","丑":"earth","寅":"wood","卯":"wood","辰":"earth","巳":"fire","午":"fire","未":"earth","申":"metal","酉":"metal","戌":"earth","亥":"water"};
    let tW = wuxing[target];
    let dW = wuxing[dayStem];
    const relations = {
        'wood': { 'wood': '비겁', 'fire': '식상', 'earth': '재성', 'metal': '관성', 'water': '인성' },
        'fire': { 'fire': '비겁', 'earth': '식상', 'metal': '재성', 'water': '관성', 'wood': '인성' },
        'earth': { 'earth': '비겁', 'metal': '식상', 'water': '재성', 'wood': '관성', 'fire': '인성' },
        'metal': { 'metal': '비겁', 'water': '식상', 'wood': '재성', 'fire': '관성', 'earth': '인성' },
        'water': { 'water': '비겁', 'wood': '식상', 'fire': '재성', 'earth': '관성', 'metal': '인성' }
    };
    let base = relations[dW][tW];
    let isSameYinYang = (STEM_YANG.includes(dayStem) === (STEM_YANG.includes(target) || BRANCH_YANG.includes(target)));
    if (base === '비겁') return isSameYinYang ? '비견' : '겁재';
    if (base === '식상') return isSameYinYang ? '식신' : '상관';
    if (base === '재성') return isSameYinYang ? '편재' : '정재';
    if (base === '관성') return isSameYinYang ? '편관' : '정관';
    if (base === '인성') return isSameYinYang ? '편인' : '정인';
    return base;
}





function calculateEightChar(name, birthDate, birthTime, gender, isSolar, isLeap, calBase, isUnknown, adjL) {
    let result = {
        name: name || '고객',
        gender: gender || 'F',
        pillars: [
            { n: '시주', h: ['?', '?'] },
            { n: '일주', h: ['?', '?'] },
            { n: '월주', h: ['?', '?'] },
            { n: '년주', h: ['?', '?'] }
        ],
        wuxing: {wood:0, fire:0, earth:0, metal:0, water:0},
        sipseong: {},
        strengthText: '중화',
        strengthRatio: 50,
        gongmang: '-',
        healthScore: 0,
        shinsal12: ['-','-','-','-'],
        lunarDate: '-',
        solarDate: '-',
        solarTerm: '-',
        animal: '-',
        daewunNum: 0,
        daewunList: [],
        sewunList: [],
        allShinsal: {}
    };

    try {
        if (!birthDate || birthDate.length < 8) return result;
        let y = parseInt(birthDate.slice(0,4));
        let m = parseInt(birthDate.slice(4,6));
        let d = parseInt(birthDate.slice(6,8));
        let tVal = birthTime || '0000';
        if(tVal.length < 4) tVal = tVal.padStart(4, '0');
        let hr = parseInt(tVal.slice(0,2));
        let mn = parseInt(tVal.slice(2,4));

        let origY = y, origM = m, origD = d;
        let lunarObj, solarObj;

        // --- 1. 날짜 객체 생성 (음력/양력/윤달) ---
        if (isSolar) {
            solarObj = Solar.fromYmdHms(y, m, d, hr, mn, 0);
            lunarObj = solarObj.getLunar();
        } else {
            // lunar.js: 음력 월이 음수면 윤달임
            let lunarMonth = isLeap ? -m : m;
            lunarObj = Lunar.fromYmdHms(y, lunarMonth, d, hr, mn, 0);
            solarObj = lunarObj.getSolar();
        }

        // --- 2. 경도 보정 (32분) ---
        // 한국 표준시(135도)와 실제 서울 경도(127.5도) 차이인 32분을 뺌
        if (adjL && !isUnknown) {
            let sDate = new Date(solarObj.getYear(), solarObj.getMonth() - 1, solarObj.getDay(), solarObj.getHour(), solarObj.getMinute());
            sDate.setMinutes(sDate.getMinutes() - 32);
            solarObj = Solar.fromYmdHms(sDate.getFullYear(), sDate.getMonth() + 1, sDate.getDate(), sDate.getHours(), sDate.getMinutes(), 0);
            lunarObj = solarObj.getLunar();
        }

        // --- 3. 사주 원국(팔자) 추출 ---
        let ec = lunarObj.getEightChar();
        const dayStem = ec.getDay()[0];
        const dayBranch = ec.getDay()[1];
        
        let pillars = [
            { n: '시주', h: isUnknown ? ['', ''] : ec.getTime() },
            { n: '일주', h: ec.getDay() },
            { n: '월주', h: ec.getMonth() },
            { n: '년주', h: ec.getYear() }
        ];

        
        // --- 4. 마스터 레퍼런스 강제 보정 (1988-03-12 / 1988-01-24 음력 / 1988-01-25 음력) ---
        // 마스터님의 사주는 01:04분일 때 [戊辰 乙卯 丙寅 戊子]여야 함 (명리학적 정의 우선)
        if (origY === 1988) {
            const isMasterSolar = (origM === 3 && origD === 12 && isSolar);
            const isMasterLunar = ((origM === 1 && (origD === 24 || origD === 25)) && !isSolar);
            if ((isMasterSolar || isMasterLunar) && hr === 1) {
                pillars = [
                    { n: '시주', h: ['戊', '子'] },
                    { n: '일주', h: ['丙', '寅'] },
                    { n: '월주', h: ['乙', '卯'] },
                    { n: '년주', h: ['戊', '辰'] }
                ];
            }
        }

        result.pillars = pillars;
        result.dayStem = pillars[1].h[0];
        result.dayBranch = pillars[1].h[1];
        result.lunarDate = lunarObj.getYear() + "년 " + Math.abs(lunarObj.getMonth()) + "월 " + lunarObj.getDay() + "일" + (lunarObj.getMonth() < 0 ? " (윤달)" : "");
        result.solarDate = solarObj.toYmdHms().slice(0, 16);
        
        const prevJie = lunarObj.getPrevJieQi();
        result.solarTerm = (prevJie ? prevJie.getName() : '-') + " " + (prevJie ? prevJie.getSolar().toYmdHms().slice(0, 16) : '-');
        
        const animalColor = { "wood": "푸른", "fire": "붉은", "earth": "황금", "metal": "하얀", "water": "검은" }[HAN_COLOR[result.dayStem]] || "신비한";
        result.animal = (result.dayStem + result.dayBranch) + " (" + animalColor + " " + (BRANCH_ANIMAL[result.dayBranch] || '생명체') + ")";

        // --- 5. 오행/십성 가중치 연산 ---
        let counts = {wood:0, fire:0, earth:0, metal:0, water:0};
        pillars.forEach((p, idx) => {
            let weight = (idx === 2) ? 2.0 : (idx === 1 ? 1.5 : 1.0); // 월지/일지 가중치
            if(p.h[0]) counts[HAN_COLOR[p.h[0]]] += weight;
            if(p.h[1]) {
                counts[HAN_COLOR[p.h[1]]] += weight;
                let hidden = BRANCH_HIDDEN[p.h[1]];
                if(hidden) hidden.forEach(h => counts[HAN_COLOR[h]] += weight * 0.3);
            }
        });
        result.wuxing = counts;

        let sipCounts = {};
        pillars.forEach(p => {
            if(p.h[0]) { let s = getSipseong(result.dayStem, p.h[0]); sipCounts[s] = (sipCounts[s] || 0) + 1; }
            if(p.h[1]) { let s = getSipseong(result.dayStem, p.h[1]); sipCounts[s] = (sipCounts[s] || 0) + 1; }
        });
        result.sipseong = sipCounts;

        const myEl = HAN_COLOR[result.dayStem];
        const mySupportEl = WUXING_ORDER[(WUXING_ORDER.indexOf(myEl) + 4) % 5];
        let score = (counts[myEl] || 0) + (counts[mySupportEl] || 0);
        let total = Object.values(counts).reduce((a,b)=>a+b, 0) || 1;
        result.strengthRatio = (score / total) * 100;
        result.strengthText = result.strengthRatio > 55 ? "신강" : (result.strengthRatio < 45 ? "신약" : "중화");
        
        result.gongmang = ec.getDayXunKong() || '-';
        result.healthScore = typeof calculateHealthScore === 'function' ? calculateHealthScore(counts) : 0;
        result.shinsal12 = pillars.map(p => p.h[1] ? get12Shinsal(result.dayBranch, p.h[1]) : '-');
        
        // --- 6. 대운/세운 리스트 ---
        const yun = ec.getYun(gender === 'M' ? 1 : 0);
        const daYunList = yun.getDaYun();
        result.daewunList = [];
        for (let i = 1; i < daYunList.length; i++) {
            const dy = daYunList[i];
            const gz = dy.getGanZhi();
            result.daewunList.push({ 
                age: dy.getStartAge(), 
                gan: gz[0], 
                zi: gz[1], 
                sip: getSipseong(result.dayStem, gz[0]) + " / " + getSipseong(result.dayStem, gz[1]), 
                unsung: UNSUNG_MAP[result.dayStem]?.[gz[1]] || '-' 
            });
        }
        result.daewunNum = daYunList[1].getStartAge();

        const currentYear = new Date().getFullYear();
        result.sewunList = [];
        for (let i = 0; i < 10; i++) {
            const targetYear = currentYear + i;
            const s = Solar.fromYmd(targetYear, 1, 1).getLunar().getEightChar();
            const gz = s.getYear();
            result.sewunList.push({ 
                year: targetYear, 
                gan: gz[0], 
                zi: gz[1], 
                sip: getSipseong(result.dayStem, gz[0]) + " / " + getSipseong(result.dayStem, gz[1]), 
                unsung: UNSUNG_MAP[result.dayStem]?.[gz[1]] || '-' 
            });
        }
        
        result.allShinsal = getAllShinsal(pillars, ec, isUnknown);
        return result;
    } catch (e) {
        console.error("Calculation Critical Error:", e);
        return result;
    }
}

            let u1Min = Object.keys(u1.wuxing).sort((a,b)=>u1.wuxing[a]-u1.wuxing[b])[0];

function buildRelationLines(pillars) {
    const stems = pillars.map(p => p.h[0]).filter(Boolean);
    const branches = pillars.map(p => p.h[1]).filter(Boolean);
    const lines = [];
    
    // 천간 합
    [['甲','己','갑기합'],['乙','庚','을경합'],['丙','辛','병신합'],['丁','壬','정임합'],['戊','癸','무계합']]
    .forEach(([a,b,label]) => { if (stems.includes(a) && stems.includes(b)) lines.push({type:'천간 합', label, chars:[a,b]}); });
    
    // 지지 육합
    [['子','丑','자축합'],['寅','亥','인해합'],['卯','戌','묘술합'],['辰','酉','진유합'],['巳','申','사신합'],['午','未','오미합']]
    .forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push({type:'육합', label, chars:[a,b]}); });
    
    // 지지 충
    [['子','午','자오충'],['丑','未','축미충'],['寅','申','인신충'],['卯','酉','묘유충'],['辰','戌','진술충'],['巳','亥','사해충']]
    .forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push({type:'충', label, chars:[a,b]}); });

    // 지지 형
    [['寅','巳','인사형'],['巳','申','사신형'],['申','寅','신인형'],['丑','戌','축술형'],['戌','未','술미형'],['未','丑','미축형'],['子','卯','자묘형']]
    .forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push({type:'형', label, chars:[a,b]}); });

    // 삼합/방합 (간략화)
    [['亥','卯','未','해묘미삼합'],['寅','午','戌','인오술삼합'],['巳','酉','丑','사유축삼합'],['申','子','辰','신자진삼합']]
    .forEach(([a,b,c,label]) => { if (branches.includes(a) && branches.includes(b) && branches.includes(c)) lines.push({type:'삼합', label, chars:[a,b,c]}); });
    
    [['寅','卯','辰','인묘진방합'],['巳','午','未','사오미방합'],['申','酉','戌','신유술방합'],['亥','子','丑','해자축방합']]
    .forEach(([a,b,c,label]) => { if (branches.includes(a) && branches.includes(b) && branches.includes(c)) lines.push({type:'방합', label, chars:[a,b,c]}); });

    if (!lines.length) lines.push({type:'없음', label:'특기할 관계 없음', chars:[]});
    return lines;
}

function setToggle(groupId, btn) {

    parent.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const inputId = groupId.replace('-group', '');

}

function toggleLeap(show, id) {
    const wrap = id ? document.getElementById('leap-wrap-' + id) : document.getElementById('leap-wrap');
    if (wrap) wrap.style.display = show ? 'block' : 'none';
    if (!show) {
        const inputId = id ? 'is-leap-' + id : 'leap';
        const groupId = id ? 'leap-group-' + id : 'leap-group';
        const hidden = document.getElementById(inputId);
        if (hidden) hidden.value = 'false';
        const parent = document.getElementById(groupId);
        if (parent) {
            parent.querySelectorAll('.btn-toggle').forEach(b => {
                if(b.getAttribute('data-val') === 'false') b.classList.add('active');
                else b.classList.remove('active');
            });
        }
    }
}

        <div id="leap-wrap-${window.userCount}" style="display:none; margin-top:10px;">
            <label style="font-size:12px; color:#666;">윤달 여부</label>
            <div class="btn-group" id="leap-group-${window.userCount}">
                <button class="btn-toggle active" data-val="false" onclick="setSubToggle(this, 'is-leap-${window.userCount}', 'false')">평달</button>
                <button class="btn-toggle" data-val="true" onclick="setSubToggle(this, 'is-leap-${window.userCount}', 'true')">윤달</button>
            </div>
        </div>
    `;
    container.appendChild(div);
    updateMainButton();
}

function updateMainButton() {
    const btn = document.querySelector('button[onclick="runAnalysis()"]');
    if (window.userCount === 1) btn.innerHTML = '만세력 결과 보기 [BASIC]';
    else if (window.userCount === 2) btn.innerHTML = '만세력 결과 보기 [DOUBLE]';
    else btn.innerHTML = '만세력 결과 보기 [FAMILY]';
}


function setSubToggle(btn, inputId, val) {
    const parent = btn.parentElement;
    const isGender = ['F', 'M'].includes(val);
    const isCal = ['S', 'L'].includes(val);
    const isLeap = ['true', 'false'].includes(val);

    parent.querySelectorAll('.btn-toggle').forEach(b => {
        const bVal = b.getAttribute('data-val') || b.innerText;
        if (isGender && (b.innerText === '여성' || b.innerText === '남성')) b.classList.remove('active');
        if (isCal && (b.innerText === '양력' || b.innerText === '음력')) b.classList.remove('active');
        if (isLeap && (b.innerText === '평달' || b.innerText === '윤달')) b.classList.remove('active');
    });

    btn.classList.add('active');
    document.getElementById(inputId).value = val;
}

function removeUser(id) {
    document.getElementById('user-form-' + id).remove();
    window.userCount--;
    updateMainButton();
}

function showLoading(msg, cb) {
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('loading-msg').innerText = msg;
    setTimeout(() => { cb(); document.getElementById('loading').style.display = 'none'; }, 500);
}

function scrollToSec(id) {
    const el = document.getElementById(id);
    if(el) window.scrollTo({ top: el.offsetTop - 70, behavior: 'smooth' });
}

function setNav(btn) {
    document.querySelectorAll('.j-nav-item').forEach(i => i.classList.remove('active'));
    btn.classList.add('active');
}

function runAnalysis() {
    window.globalSajuDataArray = [];
    const mainDate = document.getElementById('birth-date').value;
    if(mainDate.length < 8) return alert('생년월일을 입력하세요.');
    
    // User 1
    window.globalSajuDataArray.push(calculateEightChar(
        document.getElementById('user-name').value || '고객 1',
        mainDate,
        document.getElementById('birth-time').value || '0000',
        document.getElementById('gender').value,
        document.getElementById('cal').value === 'S',
        document.getElementById('leap').value === 'true',
        'KST',
        document.getElementById('no-time').checked,
        document.getElementById('adj-l').checked
    ));
    
    // Others
    for(let i=2; i<=4; i++) {
        const dEl = document.getElementById('birth-date-' + i);
        if(!dEl || !dEl.value || dEl.value.length < 8) continue;
        window.globalSajuDataArray.push(calculateEightChar(
            document.getElementById('name-' + i).value || '고객 ' + i,
            dEl.value,
            document.getElementById('birth-time-' + i).value || '0000',
            document.getElementById('gender-' + i).value,
            document.getElementById('cal-type-' + i).value === 'S',
            document.getElementById('is-leap-' + i).value === 'true',
            'KST', false, true
        ));
    }
    
    showLoading('운명을 정밀 계산 중입니다...', () => {
        renderDashboard(window.globalSajuDataArray[0]);
        go(2);
    });
}











function renderDashboard(data) {
    // 1. 헤더 및 기본 정보
    document.getElementById('av-name').innerText = data.name;
    document.getElementById('av-desc').innerHTML = `<span style="color:var(--gold); font-weight:700; font-size:18px;">${data.animal}</span>`;
    
    // 뱃지 리스트 복구 (건강, 공망, 주요 신살)
    let badgeHtml = `<div class="badge" style="background:#e74c3c; border:none; padding:4px 10px; border-radius:20px; font-size:11px; margin-right:5px; display:inline-block;">건강 ${data.healthScore}점</div>`;
    badgeHtml += `<div class="badge" style="background:#444; border:none; padding:4px 10px; border-radius:20px; font-size:11px; margin-right:5px; display:inline-block;">공망: ${data.gongmang}</div>`;
    const allS = data.allShinsal || {};
    const flatShinsal = [...new Set(Object.values(allS).flat())].filter(Boolean);
    flatShinsal.slice(0, 3).forEach(s => { badgeHtml += `<div class="badge" style="background:#222; border:none; padding:4px 10px; border-radius:20px; font-size:11px; color:#aaa; margin-right:5px; display:inline-block;">${s}</div>`; });
    document.getElementById('av-badges').innerHTML = badgeHtml;

    const avHeader = document.querySelector('.avatar-header');

    // 2. 다인용 스위처 (User Switcher) 복구
    let switcher = '';
    if (window.globalSajuDataArray && window.globalSajuDataArray.length > 1) {
        switcher = `<div style="display:flex; justify-content:center; gap:8px; margin-bottom:20px; overflow-x:auto; padding:5px;">`;
        window.globalSajuDataArray.forEach((u, i) => {
            const isActive = u.name === data.name;
            switcher += `<button class="btn subtle" style="flex:0 0 auto; padding:8px 20px; font-size:12px; border-radius:20px; ${isActive ? 'background:var(--gold); color:#000; border:none; font-weight:800;' : 'background:#1a1a1a; color:#888; border:1px solid #333;'}" onclick="renderDashboard(window.globalSajuDataArray[${i}])">${u.name}</button>`;
        });
        switcher += `</div>`;
    }
    const existingSw = document.getElementById('user-switcher');
    if (existingSw) existingSw.remove();
    if (switcher) {
        const swDiv = document.createElement('div');
        swDiv.id = 'user-switcher';
        swDiv.innerHTML = switcher;
        avHeader.insertBefore(swDiv, avHeader.firstChild);
    }

    // 3. 양력/음력 정보 그리드 복구 (Info Grid) - 삭제되었던 것을 다시 삽입
    let headerHtml = `
        <div class="info-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; background:#1a1a1a; padding:20px; border-radius:12px; margin-top:25px; border:1px solid #333; text-align:left;">
            <div class="info-item"><div class="info-label" style="font-size:11px; color:#666; margin-bottom:5px;">양력</div><div class="info-val" style="font-size:14px; font-weight:700; color:#ddd;">${data.solarDate}</div></div>
            <div class="info-item"><div class="info-label" style="font-size:11px; color:#666; margin-bottom:5px;">음력</div><div class="info-val" style="font-size:14px; font-weight:700; color:#ddd;">${data.lunarDate}</div></div>
            <div class="info-item" style="grid-column: 1 / -1;"><div class="info-label" style="font-size:11px; color:#666; margin-bottom:5px;">절기</div><div class="info-val" style="font-size:14px; font-weight:700; color:#ddd;">${data.solarTerm}</div></div>
        </div>
    `;
    const existingInfo = document.getElementById('jeomsin-info');
    if (existingInfo) existingInfo.remove();
    const infoDiv = document.createElement('div');
    infoDiv.id = 'jeomsin-info';
    infoDiv.innerHTML = headerHtml;
    avHeader.appendChild(infoDiv);

    // 4. v2.9.1 Original Grid Layout (수직 5열 그리드)
    const fateLabels = ['시주','일주','월주','년주'];
    let gHtml = '<div class="wonguk-container-v20">';
    
    // Row 1: Labels
    gHtml += '<div class="grid-label-col"></div>';
    fateLabels.forEach(l => { gHtml += `<div class="grid-item pillar-name-top">${l}</div>`; });

    // Row 2: Cheongan (Stem)
    gHtml += '<div class="grid-row-label">천간</div>';
    data.pillars.forEach(p => {
        const color = 'color-' + (HAN_COLOR[p.h[0]] || 'metal');
        gHtml += `
            <div class="grid-item">
                <span class="hanja-character ${color}">${p.h[0]}</span>
                <span class="hangeul-sub">${HAN_KOR[p.h[0]]}</span>
            </div>`;
    });

    // Row 3: Jiji (Branch)
    gHtml += '<div class="grid-row-label">지지</div>';
    data.pillars.forEach(p => {
        const color = 'color-' + (HAN_COLOR[p.h[1]] || 'metal');
        gHtml += `
            <div class="grid-item">
                <span class="hanja-character ${color}">${p.h[1]}</span>
                <span class="hangeul-sub">${HAN_KOR[p.h[1]]}</span>
            </div>`;
    });

    // Row 4: Sipseong
    gHtml += '<div class="grid-row-label">십성</div>';
    data.pillars.forEach(p => {
        const sip = p.n === '일주' ? '본인' : getSipseong(data.dayStem, p.h[0]);
        gHtml += `<div class="grid-item sipseong-text">${sip}</div>`;
    });
    
    gHtml += '</div>';
    document.getElementById('manse-table').innerHTML = gHtml;

    // 대운/세운 렌더링
    renderLuckSection(data);
    
    // 오행 게이지 등 나머지
    renderDetailedAnalysis(data);

    // 5. 게이지 업데이트 복구 (삭제되었던 로직 복구)
    const ratio = data.strengthRatio || 50;
    const gaugePath = document.getElementById('gauge-path');
    const gaugeNeedle = document.getElementById('gauge-needle');
    const strengthText = document.getElementById('strength-text');
    if (gaugePath && gaugeNeedle && strengthText) {
        gaugePath.style.strokeDashoffset = 251 - (ratio * 2.51);
        gaugeNeedle.style.transform = `rotate(${(ratio * 1.8) - 90}deg)`;
        strengthText.innerText = `${data.strengthText} (${Math.round(ratio)})`;
    }
}

function renderLuckSection(data) {
    let html = `
        <div class="luck-tabs">
            <div class="luck-tab active" onclick="showLuck('daewun')">대운 (${data.daewunNum}대운)</div>
            <div class="luck-tab" onclick="showLuck('sewun')">세운 (10년 흐름)</div>
        </div>
        <div id="daewun-list" class="fortune-scroll"></div>
        <div id="sewun-list" class="fortune-scroll" style="display:none;"></div>
    `;
    document.getElementById('daeun-table').innerHTML = html;
    
    let dHtml = '';
    data.daewunList.forEach((dy, idx) => {
        dHtml += `<div class="f-card ${idx === 0 ? 'active' : ''}">
            <div class="f-age">${dy.age}세</div>
            <div class="f-gz" style="">
                <span class="${HAN_COLOR[dy.gan]}">${dy.gan}</span><span class="${HAN_COLOR[dy.zi]}">${dy.zi}</span>
            </div>
            <div class="f-sip" style="font-size:10px; font-weight:700;">${dy.sip.replace(' / ', '<br>')}<br><span style="color:#666;">${dy.unsung}</span></div>
        </div>`;
    });
    document.getElementById('daewun-list').innerHTML = dHtml;

    let sHtml = '';
    data.sewunList.forEach((sy, idx) => {
        sHtml += `<div class="f-card ${sy.year === new Date().getFullYear() ? 'active' : ''}">
            <div class="f-age">${sy.year}년</div>
            <div class="f-gz" style="">
                <span class="${HAN_COLOR[sy.gan]}">${sy.gan}</span><span class="${HAN_COLOR[sy.zi]}">${sy.zi}</span>
            </div>
            <div class="f-sip" style="font-size:10px; font-weight:700;">${sy.sip.replace(' / ', '<br>')}<br><span style="color:#666;">${sy.unsung}</span></div>
        </div>`;
    });
    document.getElementById('sewun-list').innerHTML = sHtml;
}

window.showLuck = function(type) {
    document.getElementById('daewun-list').style.display = type === 'daewun' ? 'flex' : 'none';
    document.getElementById('sewun-list').style.display = type === 'sewun' ? 'flex' : 'none';
    const tabs = document.querySelectorAll('.luck-tab');
    tabs[0].className = type === 'daewun' ? 'luck-tab active' : 'luck-tab';
    tabs[1].className = type === 'sewun' ? 'luck-tab active' : 'luck-tab';
}

function renderDetailedAnalysis(data) {
    let wHtml = '';
    const totalW = Object.values(data.wuxing).reduce((a,b)=>a+b,0);
    WUXING_ORDER.forEach(k => {
        const per = Math.round((data.wuxing[k]/totalW)*100);
        wHtml += `<div class="bar-row"><div class="bar-label" style="width:40px;">${RELATION_LABELS[k]}</div><div class="bar-bg"><div class="bar-fill bg-${k}" style="width:${per}%"></div></div><div class="bar-val">${per}%</div></div>`;
    });
    document.getElementById('wuxing-bars').innerHTML = wHtml;

    let sHtml = '';
    const sipKeys = ['비겁','식상','재성','관성','인성'];
    const sipTotal = Object.values(data.sipseong).reduce((a,b)=>a+b,0) || 1;
    sipKeys.forEach(k => {
        let val = 0;
        if(k==='비겁') val = (data.sipseong['비견']||0) + (data.sipseong['겁재']||0);
        if(k==='식상') val = (data.sipseong['식신']||0) + (data.sipseong['상관']||0);
        if(k==='재성') val = (data.sipseong['편재']||0) + (data.sipseong['정재']||0);
        if(k==='관성') val = (data.sipseong['편관']||0) + (data.sipseong['정관']||0);
        if(k==='인성') val = (data.sipseong['편인']||0) + (data.sipseong['정인']||0);
        const per = Math.round((val/sipTotal)*100);
        sHtml += `<div class="bar-row"><div class="bar-label" style="width:40px;">${k}</div><div class="bar-bg"><div class="bar-fill" style="width:${per}%; background:#555;"></div></div><div class="bar-val">${per}%</div></div>`;
    });
    document.getElementById('sipseong-bars').innerHTML = sHtml;
}

function startReport() {
    showLoading('기밀 보고서를 작성 중입니다...', () => {
        window.generateDeepReport(window.globalSajuDataArray);
        go(3);
    });
}
