<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-SAJU MASTER v4.7 | Jeolgi Precision Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;700&display=swap');
        :root { --bg: #050505; --card: #0f0f0f; --text: #f0f0f0; --dim: #777; --accent: #fff; --gold: #d4af37; --border: #222; --wood: #2ecc71; --fire: #e74c3c; --earth: #f1c40f; --metal: #bdc3c7; --water: #3498db; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; display: flex; justify-content: center; line-height: 1.6; }
        .container { width: 100%; max-width: 480px; padding: 40px 24px; box-sizing: border-box; text-align: center; }
        .logo { font-size: 20px; letter-spacing: 4px; font-weight: 700; color: var(--accent); margin-bottom: 50px; text-transform: uppercase; }
        .section-label { font-size: 11px; color: var(--gold); font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; display: block; text-align: left; }
        .input-group { margin-bottom: 25px; text-align: left; }
        label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 8px; font-weight: 700; }
        input, select { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; padding: 15px; font-size: 16px; border-radius: 4px; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 22px; background: var(--accent); color: #000; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; margin-top: 10px; font-size: 15px; }
        #step-2, #step-3 { display: none; text-align: left; }
        .saju-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 40px; }
        .pillar-card { border: 1px solid var(--border); padding: 15px 0; background: var(--card); border-radius: 4px; text-align: center; }
        .pillar-label { font-size: 10px; color: #555; margin-bottom: 8px; }
        .sipseong { font-size: 11px; color: var(--gold); background: rgba(212,175,55,0.1); padding: 3px 0; margin-bottom: 8px; }
        .hanja { font-size: 28px; font-weight: 300; line-height: 1.1; margin-bottom: 8px; }
        .hangul { font-size: 12px; color: #888; }
        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); } .metal { color: var(--metal); } .water { color: var(--water); }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .loader-bar { width: 100px; height: 1px; background: #222; margin-top: 20px; position: relative; overflow: hidden; }
        .loader-progress { position: absolute; width: 100%; height: 100%; background: var(--gold); animation: load 2s infinite; }
        @keyframes load { 0% { left: -100%; } 100% { left: 100%; } }
    </style>
</head>
<body>
<div class="loading-overlay" id="loading">
    <div style="letter-spacing:10px; font-size:11px; color:var(--gold);">AXE CORE v4.7</div>
    <div class="loader-bar"><div class="loader-progress"></div></div>
</div>
<div class="container">
    <div class="logo">X-SAJU MASTER</div>
    <div id="step-1">
        <span class="section-label">데이터 입력</span>
        <div class="input-group"><label>성함</label><input type="text" id="user-name" placeholder="이름 입력"></div>
        <div class="input-group" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div><label>성별</label><select id="gender"><option value="M">남성</option><option value="F">여성</option></select></div>
            <div><label>역법</label><select id="cal-type"><option value="S">양력</option><option value="L">음력</option></select></div>
        </div>
        <div class="input-group"><label>생년월일 (YYMMDD / YYYYMMDD)</label><input type="text" id="birth-date" maxlength="8" placeholder="예: 880427"></div>
        <div class="input-group"><label>생시 (HHMM)</label><input type="text" id="birth-time" maxlength="4" placeholder="예: 0104"></div>
        <button class="btn-main" onclick="startEngine()">분석 엔진 가동</button>
    </div>
    <div id="step-2">
        <span class="section-label">데이터 원국 (시 | 일 | 월 | 년)</span>
        <div class="saju-grid" id="saju-result"></div>
        <button class="btn-main" onclick="generateReport()">심층 분석 리포트 생성</button>
    </div>
    <div id="step-3"><div id="final-report"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<script>
    const S = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"], B = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
    const E = {"甲":"wood","乙":"wood","寅":"wood","卯":"wood","丙":"fire","丁":"fire","巳":"fire","午":"fire","戊":"earth","己":"earth","辰":"earth","戌":"earth","丑":"earth","未":"earth","庚":"metal","辛":"metal","申":"metal","酉":"metal","壬":"water","癸":"water","亥":"water","子":"water"};
    
    function getSipseong(ds, t) {
        const o = ["wood","fire","earth","metal","water"], di = o.indexOf(E[ds]), ti = o.indexOf(E[t]);
        const dy = ["甲","丙","戊","庚","壬"].includes(ds), ty = ["甲","丙","戊","庚","壬","寅","辰","午","申","戌","子"].includes(t);
        const s = dy === ty, d = (ti - di + 5) % 5;
        if(d===0) return s?"비견":"겁재"; if(d===1) return s?"식신":"상관"; if(d===2) return s?"편재":"정재"; if(d===3) return s?"편관":"정관"; if(d===4) return s?"편인":"정인";
    }

    let ps = [];
    function startEngine() {
        const dsInput = document.getElementById('birth-date').value, tsInput = document.getElementById('birth-time').value || "0000";
        const ct = document.getElementById('cal-type').value;
        if(dsInput.length < 6) return alert("날짜를 입력하세요.");

        document.getElementById('loading').style.display='flex';
        
        setTimeout(() => {
            let y, m, d, h = parseInt(tsInput.substring(0,2)), mn = parseInt(tsInput.substring(2,4));
            if(dsInput.length===6) { let yy=parseInt(dsInput.substring(0,2)); y=(yy>30?1900:2000)+yy; m=parseInt(dsInput.substring(2,4)); d=parseInt(dsInput.substring(4,6)); }
            else { y=parseInt(dsInput.substring(0,4)); m=parseInt(dsInput.substring(4,6)); d=parseInt(dsInput.substring(6,8)); }

            try {
                let lunar;
                if(ct === 'S') {
                    lunar = Solar.fromYmdHms(y, m, d, h, mn, 0).getLunar();
                } else {
                    lunar = Lunar.fromYmdHms(y, m, d, h, mn, 0);
                }

                // [CORE FIX] Lunar library standard EightChar
                const ec = lunar.getEightChar();
                const year = ec.getYear(), month = ec.getMonth(), day = ec.getDay(), hour = ec.getHour();
                const dayStem = day.substring(0,1);

                ps = [
                    {h: year, p: "년", s: getSipseong(dayStem, year[0]), c1: E[year[0]], c2: E[year[1]]},
                    {h: month, p: "월", s: getSipseong(dayStem, month[0]), c1: E[month[0]], c2: E[month[1]]},
                    {h: day, p: "일", s: "본인", c1: E[day[0]], c2: E[day[1]]},
                    {h: hour, p: "시", s: getSipseong(dayStem, hour[0]), c1: E[hour[0]], c2: E[hour[1]]}
                ];

                document.getElementById('loading').style.display='none';
                document.getElementById('step-1').style.display='none';
                document.getElementById('step-2').style.display='block';

                let htm = '';
                [3, 2, 1, 0].forEach(i => {
                    const p = ps[i];
                    htm += `<div class="pillar-card"><div class="pillar-label">${p.p}</div><div class="sipseong">${p.s}</div><div class="hanja"><span class="${p.c1}">${p.h[0]}</span><br><span class="${p.c2}">${p.h[1]}</span></div><div class="hangul">${p.h}</div></div>`;
                });
                document.getElementById('saju-result').innerHTML = htm;
            } catch(e) {
                alert("엔진 가동 실패: " + e.message);
                location.reload();
            }
        }, 1000);
    }

    function generateReport() {
        document.getElementById('loading').style.display='flex';
        setTimeout(() => {
            document.getElementById('loading').style.display='none';
            document.getElementById('step-2').style.display='none';
            document.getElementById('step-3').style.display='block';
            const name = document.getElementById('user-name').value || "사용자";
            document.getElementById('final-report').innerHTML = `<div class="section-label">FINAL REPORT</div><h3>${name} 님의 분석 결과</h3><p>당신은 <strong>${ps[2].h}</strong> 일주를 중심으로 강력한 에너지를 보유하고 있습니다.</p>`;
        }, 1200);
    }
</script>
</body>
</html>
