<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-SAJU [Knowledge Dark]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            margin: 0; 
            padding: 0; 
            line-height: 1.8; /* 행간 확장 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .page-container { 
            width: 800px; 
            min-height: 1131px;
            padding: 120px 80px;
            background: #000000; /* 블랙 배경 통일 */
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
            border: 1px solid #111; /* 은은한 외곽선 */
        }

        .category {
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.4em;
            color: #444;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .term-title { 
            font-size: 32px; 
            font-weight: 200; /* 900 -> 200 */
            margin-bottom: 80px; 
            letter-spacing: -0.02em;
            color: #E6E6E6; /* Black 10% */
            line-height: 1.4;
        }

        .definition-box {
            border-left: 1px solid #222; /* 얇은 선 */
            padding-left: 30px;
            margin-bottom: 80px;
        }

        .definition-text {
            font-size: 18px;
            font-weight: 200; /* 300 -> 200 */
            color: #B3B3B3; /* Black 30% */
        }

        .insight-section {
            font-size: 15px;
            font-weight: 300;
            color: #888;
            word-break: keep-all;
        }

        .insight-section h4 {
            font-size: 13px;
            font-weight: 400;
            margin-bottom: 20px;
            color: #E6E6E6; /* Black 10% */
            letter-spacing: 0.1em;
        }

        .page-footer {
            position: absolute;
            bottom: 80px;
            left: 80px;
            right: 80px;
            font-size: 10px;
            font-weight: 200;
            color: #333;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="category">Energy Dynamics / Part 02</div>
        <div class="term-title">오행(五行)의 상호작용: <br>목(木)과 금(金)의 긴장</div>

        <div class="definition-box">
            <p class="definition-text">
                사주 명리학에서 <span style="color:#ffffff;">'목(木)'</span>은 탄생과 성장의 에너지를, <br>
                <span style="color:#ffffff;">'금(金)'</span>은 이를 수렴하고 결과물을 만드는 절단의 에너지를 의미합니다.
            </p>
        </div>

        <div class="insight-section">
            <h4>당신의 구조적 특성</h4>
            <p>
                당신의 원국은 숲이 너무 울창하여 빛이 차단된 상태입니다. 
                이러한 구조에서는 아이디어는 넘쳐나나 마침표(결과)를 찍기 어렵습니다. 
                이 페이지는 당신의 숲을 어떻게 '자산'으로 바꿀 것인지에 대한 <strong>데이터 사전</strong>입니다.
            </p>
        </div>

        <div class="page-footer">
            <span>X-SAJU PREMIUM REPORT</span>
            <span>PAGE 42 / 183</span>
        </div>
    </div>
</body>
</html>
