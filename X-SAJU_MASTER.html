<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-사주 마스터 | 프리미엄 만세력</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --panel: #0a0a0a;
            --panel-2: #050505;
            --line: rgba(255,255,255,0.08);
            --line-soft: rgba(255,255,255,0.04);
            --text: rgba(255,255,255,0.96);
            --text-soft: rgba(255,255,255,0.70);
            --text-dim: rgba(255,255,255,0.42);
            --gold: #c7a76a;
            --wood: #52b36a;
            --fire: #d45a52;
            --earth: #c9a24c;
            --metal: #9ea4aa;
            --water: #4e87d9;
        }

        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body { overflow-x: hidden; }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 28px 18px 80px;
        }

        .brand {
            padding: 20px 0 34px;
            text-align: center;
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.88);
        }

        .page { display: none; }
        .page.active { display: block; }

        .field-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .field {
            margin-bottom: 22px;
        }

        .field label {
            display: block;
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: -0.01em;
            color: var(--text-soft);
        }

        .field input,
        .field select {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--line);
            background: transparent;
            color: var(--text);
            padding: 14px 0;
            font-size: 19px;
            font-weight: 300;
            outline: none;
            border-radius: 0;
        }

        .field input::placeholder { color: rgba(255,255,255,0.28); }

        .sub-preview {
            min-height: 18px;
            margin-top: 8px;
            font-size: 13px;
            font-weight: 300;
            color: var(--gold);
        }

        .toggle-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 10px;
        }

        .toggle {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 300;
        }

        .toggle input { width: 16px; height: 16px; accent-color: #fff; }

        .btn {
            width: 100%;
            padding: 18px 16px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.16);
            background: transparent;
            color: var(--text);
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 0.08em;
            cursor: pointer;
        }

        .btn.subtle {
            margin-top: 10px;
            border-color: transparent;
            color: var(--text-dim);
            font-size: 13px;
            letter-spacing: 0.04em;
        }

        .hero-summary {
            margin-bottom: 24px;
            padding: 0 2px;
        }

        .hero-name {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .hero-meta {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-soft);
            font-weight: 300;
        }

        .section {
            margin-top: 38px;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--line);
            font-size: 13px;
            color: var(--text-soft);
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        .section-title span:last-child {
            color: var(--text-dim);
            font-size: 11px;
        }

        .manse-table {
            border-top: 1px solid var(--line);
            border-left: 1px solid var(--line-soft);
            background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0));
        }

        .row {
            display: grid;
            grid-template-columns: 72px repeat(4, 1fr);
        }

        .cell {
            min-height: 54px;
            border-right: 1px solid var(--line-soft);
            border-bottom: 1px solid var(--line-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 8px 4px;
            background: rgba(255,255,255,0.01);
        }

        .row-label {
            align-items: flex-start;
            justify-content: center;
            padding-left: 12px;
            text-align: left;
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 400;
        }

        .col-head {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 400;
            background: rgba(255,255,255,0.02);
        }

        .hanja-main {
            font-size: 34px;
            line-height: 1;
            font-weight: 300;
            letter-spacing: -0.05em;
        }

        .hangul-main {
            margin-top: 6px;
            font-size: 14px;
            color: var(--text-soft);
            font-weight: 400;
        }

        .mini-top {
            font-size: 12px;
            color: var(--gold);
            font-weight: 500;
            line-height: 1.35;
        }

        .mini-mid {
            font-size: 15px;
            color: var(--text);
            font-weight: 400;
            line-height: 1.35;
        }

        .mini-low {
            font-size: 12px;
            color: var(--text-soft);
            font-weight: 400;
            line-height: 1.45;
        }

        .tiny-dim {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 400;
            line-height: 1.4;
        }

        .pill-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .info-card {
            border: 1px solid var(--line-soft);
            background: var(--panel-2);
            padding: 14px 14px 16px;
            border-radius: 6px;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .info-value {
            font-size: 16px;
            color: var(--text);
            font-weight: 400;
            line-height: 1.55;
        }

        .line-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .line-item {
            padding: 12px 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-soft);
            font-weight: 400;
            line-height: 1.6;
        }

        .bar-group { display: flex; flex-direction: column; gap: 16px; }

        .bar-item { display: grid; grid-template-columns: 70px 1fr 46px; gap: 12px; align-items: center; }
        .bar-label { font-size: 14px; color: var(--text-soft); font-weight: 400; }
        .bar-track { height: 4px; background: rgba(255,255,255,0.08); position: relative; border-radius: 2px; }
        .bar-fill { height: 4px; position: absolute; left: 0; top: 0; border-radius: 2px; }
        .bar-value { text-align: right; font-size: 13px; color: var(--text); font-weight: 400; }

        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); } .metal { color: var(--metal); } .water { color: var(--water); }
        .bg-wood { background: var(--wood); } .bg-fire { background: var(--fire); } .bg-earth { background: var(--earth); } .bg-metal { background: var(--metal); } .bg-water { background: var(--water); }

        .fortune-scroll {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 16px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
        }
        
        .fortune-scroll::-webkit-scrollbar {
            height: 4px;
        }
        .fortune-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        .fortune-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        .f-card {
            flex: 0 0 76px;
            scroll-snap-align: start;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            padding: 14px 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .f-head { font-size: 12px; color: var(--text-soft); font-weight: 500; }
        .f-sip { font-size: 12px; color: var(--gold); font-weight: 500; }
        .f-hz { font-size: 24px; font-weight: 300; line-height: 1.1; color: var(--text); letter-spacing: -1px; }
        .f-kr { font-size: 12px; color: var(--text-soft); font-weight: 400; }
        .f-un { font-size: 11px; color: var(--text-dim); border-top: 1px solid var(--line-soft); padding-top: 8px; margin-top: 4px; font-weight: 400; width: 80%; margin-left: auto; margin-right: auto; }

        .loading {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: rgba(0,0,0,0.92);
            z-index: 999;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.14);
            border-top-color: rgba(255,255,255,0.85);
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            margin-top: 14px;
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            font-weight: 300;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-msg">만세력을 정밀 계산하는 중입니다</div>
</div>

<div class="container" id="main-ui">
    <div class="brand">X-사주 마스터</div>

    <div id="step-1" class="page active">
        <div class="field">
            <label>성함</label>
            <input type="text" id="user-name" placeholder="성함을 입력하세요" autocomplete="off">
            <div class="sub-preview" id="n-pre"></div>
        </div>

        <div class="field-grid">
            <div class="field">
                <label>성별</label>
                <select id="gender">
                    <option value="M">남성</option>
                    <option value="F">여성</option>
                </select>
            </div>
            <div class="field">
                <label>달력</label>
                <select id="cal-type">
                    <option value="S">양력</option>
                    <option value="L">음력</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label>생년월일</label>
            <input type="text" id="birth-date" placeholder="예: 19880312" maxlength="8">
            <div class="sub-preview" id="d-pre"></div>
        </div>

        <div class="field">
            <label>태어난 시간</label>
            <input type="text" id="birth-time" placeholder="예: 0104" maxlength="4">
            <div class="sub-preview" id="t-pre"></div>
            <div class="toggle-row">
                <label class="toggle"><input type="checkbox" id="no-time"> 태어난 시간 모름</label>
                <label class="toggle"><input type="checkbox" id="adj-l" checked> 경도 보정(-32분)</label>
            </div>
        </div>

        <button class="btn" onclick="runAnalysis()">만세력 열기</button>
    </div>

    <div id="step-2" class="page">
        <div class="hero-summary">
            <div class="hero-name" id="hero-name">사주 결과</div>
            <div class="hero-meta" id="hero-meta"></div>
        </div>

        <div class="section">
            <div class="section-title"><span>만세력 원국</span><span>풀이 전 참고 데이터</span></div>
            <div class="manse-table" id="manse-table"></div>
        </div>

        <div class="section">
            <div class="section-title"><span>합 · 충 · 형 · 파 · 해</span><span>관계 구조</span></div>
            <div class="line-list" id="relation-list"></div>
        </div>

        <div class="section">
            <div class="section-title"><span>신살 · 길성</span><span>원국 전체 기준</span></div>
            <div class="pill-grid" id="shinsal-grid"></div>
        </div>

        <div class="section">
            <div class="section-title"><span>오행 분포</span><span>한글 가독성 중심</span></div>
            <div class="bar-group" id="wuxing-bars"></div>
        </div>

        <div class="section">
            <div class="section-title"><span>십성 분포</span><span>육친 구조</span></div>
            <div class="bar-group" id="sipseong-bars"></div>
        </div>

        <div class="section">
            <div class="section-title"><span>신강 · 신약</span><span>중심 판단</span></div>
            <div class="pill-grid">
                <div class="info-card">
                    <div class="info-label">판정</div>
                    <div class="info-value" id="strength-text">-</div>
                </div>
                <div class="info-card">
                    <div class="info-label">대운수</div>
                    <div class="info-value" id="yun-text">-</div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title"><span>대운</span><span>8개 흐름</span></div>
            <div class="fortune-table" id="daeun-table"></div>
        </div>

        <div class="section">
            <div class="section-title"><span>세운</span><span>가까운 10년</span></div>
            <div class="fortune-table" id="seun-table"></div>
        </div>

        <div class="section">
            <div class="section-title"><span>월운</span><span>올해의 열두 달</span></div>
            <div class="fortune-table" id="wolun-table"></div>
        </div>

        <button class="btn subtle" onclick="go(1)">입력 정보 수정</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<script>
const HAN_COLOR = {"甲":"wood","乙":"wood","寅":"wood","卯":"wood","丙":"fire","丁":"fire","巳":"fire","午":"fire","戊":"earth","己":"earth","辰":"earth","戌":"earth","丑":"earth","未":"earth","庚":"metal","辛":"metal","申":"metal","酉":"metal","壬":"water","癸":"water","亥":"water","子":"water"};
const HAN_KOR = {"甲":"갑","乙":"을","丙":"병","丁":"정","戊":"무","己":"기","庚":"경","辛":"신","壬":"임","癸":"계","子":"자","丑":"축","寅":"인","卯":"묘","辰":"진","巳":"사","午":"오","未":"미","申":"신","酉":"유","戌":"술","亥":"해"};
const STEM_YANG = ["甲","丙","戊","庚","壬"];
const BRANCH_YANG = ["子","寅","辰","午","申","戌"];
const RELATION_LABELS = {
    wood: '목', fire: '화', earth: '토', metal: '금', water: '수'
};
const WUXING_ORDER = ['wood','fire','earth','metal','water'];

const UNSUNG_MAP = {
    "甲": {"亥": "장생", "子": "목욕", "丑": "관대", "寅": "건록", "卯": "제왕", "辰": "쇠", "巳": "병", "午": "사", "未": "묘", "申": "절", "酉": "태", "戌": "양"},
    "丙": {"寅": "장생", "卯": "목욕", "辰": "관대", "巳": "건록", "午": "제왕", "未": "쇠", "申": "병", "酉": "사", "戌": "묘", "亥": "절", "子": "태", "丑": "양"},
    "戊": {"寅": "장생", "卯": "목욕", "辰": "관대", "巳": "건록", "午": "제왕", "未": "쇠", "申": "병", "酉": "사", "戌": "묘", "亥": "절", "子": "태", "丑": "양"},
    "庚": {"巳": "장생", "午": "목욕", "未": "관대", "申": "건록", "酉": "제왕", "戌": "쇠", "亥": "병", "子": "사", "丑": "묘", "寅": "절", "卯": "태", "辰": "양"},
    "壬": {"申": "장생", "酉": "목욕", "戌": "관대", "亥": "건록", "子": "제왕", "丑": "쇠", "寅": "병", "卯": "사", "辰": "묘", "巳": "절", "午": "태", "未": "양"},
    "乙": {"午": "장생", "巳": "목욕", "辰": "관대", "卯": "건록", "寅": "제왕", "丑": "쇠", "子": "병", "亥": "사", "戌": "묘", "酉": "절", "申": "태", "未": "양"},
    "丁": {"酉": "장생", "申": "목욕", "未": "관대", "午": "건록", "巳": "제왕", "辰": "쇠", "卯": "병", "寅": "사", "丑": "묘", "子": "절", "亥": "태", "戌": "양"},
    "己": {"酉": "장생", "申": "목욕", "未": "관대", "午": "건록", "巳": "제왕", "辰": "쇠", "卯": "병", "寅": "사", "丑": "묘", "子": "절", "亥": "태", "戌": "양"},
    "辛": {"子": "장생", "亥": "목욕", "戌": "관대", "酉": "건록", "申": "제왕", "未": "쇠", "午": "병", "巳": "사", "辰": "묘", "卯": "절", "寅": "태", "丑": "양"},
    "癸": {"卯": "장생", "寅": "목욕", "丑": "관대", "子": "건록", "亥": "제왕", "戌": "쇠", "酉": "병", "申": "사", "未": "묘", "午": "절", "巳": "태", "辰": "양"}
};

const BRANCH_HIDDEN = {
    子:['癸'], 丑:['己','癸','辛'], 寅:['甲','丙','戊'], 卯:['乙'], 辰:['戊','乙','癸'], 巳:['丙','戊','庚'],
    午:['丁','己'], 未:['己','丁','乙'], 申:['庚','壬','戊'], 酉:['辛'], 戌:['戊','辛','丁'], 亥:['壬','甲']
};

const SHINSAL_LOGIC = {
    '천을귀인': (gz, ec) => {
        const ds = ec.getDay()[0];
        const targets = {"甲":"丑未","戊":"丑未","庚":"丑未","乙":"子申","己":"子申","丙":"亥酉","丁":"亥酉","壬":"卯巳","癸":"卯巳","辛":"寅午"}[ds];
        return targets && targets.includes(gz[1]) ? '천을귀인' : '';
    },
    '문창귀인': (gz, ec) => {
        const ds = ec.getDay()[0];
        const targets = {"甲":"巳","乙":"午","丙":"申","丁":"酉","戊":"申","己":"酉","庚":"亥","辛":"子","壬":"寅","癸":"卯"}[ds];
        return targets === gz[1] ? '문창귀인' : '';
    },
    '문곡귀인': (gz, ec) => {
        const ds = ec.getDay()[0];
        const targets = {"甲":"亥","乙":"子","丙":"寅","丁":"卯","戊":"寅","己":"卯","庚":"巳","辛":"午","壬":"申","癸":"酉"}[ds];
        return targets === gz[1] ? '문곡귀인' : '';
    },
    '도화': (gz, ec) => {
        const ms = ec.getMonth()[1];
        const targets = {"亥":"子","卯":"子","未":"子","申":"酉","子":"酉","辰":"酉","巳":"午","酉":"午","丑":"午","寅":"卯","午":"卯","戌":"卯"}[ms];
        return targets === gz[1] ? '도화' : '';
    },
    '역마': (gz, ec) => {
        const ms = ec.getMonth()[1];
        const targets = {"亥":"巳","卯":"巳","未":"巳","申":"寅","子":"寅","辰":"寅","巳":"亥","酉":"亥","丑":"亥","寅":"申","午":"申","戌":"申"}[ms];
        return targets === gz[1] ? '역마' : '';
    },
    '화개': (gz, ec) => {
        const ms = ec.getMonth()[1];
        const targets = {"亥":"未","卯":"未","未":"未","申":"辰","子":"辰","辰":"辰","巳":"丑","酉":"丑","丑":"丑","寅":"戌","午":"戌","戌":"戌"}[ms];
        return targets === gz[1] ? '화개' : '';
    },
    '홍염': (gz, ec) => {
        const ds = ec.getDay()[0];
        const targets = {"甲":"午","乙":"午","丙":"寅","丁":"未","戊":"辰","己":"辰","庚":"戌","辛":"酉","壬":"子","癸":"申"}[ds];
        return targets === gz[1] ? '홍염' : '';
    },
    '백호대살': (gz) => ["戊辰","丁丑","丙戌","乙未","甲辰","癸丑","壬戌"].includes(gz) ? '백호대살' : ''
};

function go(n) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('step-' + n).classList.add('active');
    window.scrollTo(0, 0);
}

function showLoading(msg, callback) {
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('loading-msg').innerText = msg;
    setTimeout(() => {
        try { callback(); } catch (e) { console.error(e); alert('오류: ' + e.message); }
        document.getElementById('loading').style.display = 'none';
    }, 300);
}

const ni = document.getElementById('user-name');
const di = document.getElementById('birth-date');
const ti = document.getElementById('birth-time');
ni.oninput = () => document.getElementById('n-pre').innerText = ni.value ? ni.value + ' 님' : '';
di.oninput = () => {
    const v = di.value.replace(/\D/g, '');
    document.getElementById('d-pre').innerText = v.length === 8 ? `${v.slice(0,4)}년 ${parseInt(v.slice(4,6))}월 ${parseInt(v.slice(6,8))}일` : '';
};
ti.oninput = () => {
    const v = ti.value.replace(/\D/g, '');
    if (v.length >= 2) {
        const h = parseInt(v.slice(0,2));
        if (h >= 0 && h < 24) {
            let txt = h < 12 ? '오전 ' + (h === 0 ? 12 : h) : '오후 ' + (h === 12 ? 12 : h - 12);
            txt += v.length === 4 ? `시 ${v.slice(2,4)}분` : '시';
            document.getElementById('t-pre').innerText = txt;
        } else {
            document.getElementById('t-pre').innerText = '시간 형식 오류';
        }
    } else {
        document.getElementById('t-pre').innerText = '';
    }
};

function isYang(ch) {
    return STEM_YANG.includes(ch) || BRANCH_YANG.includes(ch);
}

function getSipseong(dayStem, target) {
    if (!dayStem || !target) return '';
    const t = target[0];
    const dIdx = WUXING_ORDER.indexOf(HAN_COLOR[dayStem]);
    const tIdx = WUXING_ORDER.indexOf(HAN_COLOR[t]);
    if (dIdx === -1 || tIdx === -1) return '';
    const diff = (tIdx - dIdx + 5) % 5;
    const same = isYang(dayStem) === isYang(t);
    return [["비견","겁재"],["식신","상관"],["편재","정재"],["편관","정관"],["편인","정인"]][diff][same ? 0 : 1];
}

function getUnsung(stem, branch) {
    return UNSUNG_MAP[stem]?.[branch] || '';
}

function getHidden(branch) {
    return (BRANCH_HIDDEN[branch] || []).map(ch => `${ch}${HAN_KOR[ch]}`).join(' ');
}

function getShinsal(gz, ec) {
    const arr = [];
    for (const key in SHINSAL_LOGIC) {
        const val = SHINSAL_LOGIC[key](gz, ec);
        if (val) arr.push(val);
    }
    return arr;
}

function getAllShinsal(pillars, ec, isUnknown) {
    const result = {};
    pillars.forEach((p, idx) => {
        if (isUnknown && idx === 0) return;
        result[p.n] = getShinsal((p.h[0] || '') + (p.h[1] || ''), ec);
    });
    return result;
}

function buildRelationLines(pillars) {
    const stems = pillars.map(p => p.h[0]).filter(Boolean);
    const branches = pillars.map(p => p.h[1]).filter(Boolean);
    const lines = [];

    const stemCombine = [['甲','己','갑기합'],['乙','庚','을경합'],['丙','辛','병신합'],['丁','壬','정임합'],['戊','癸','무계합']];
    stemCombine.forEach(([a,b,label]) => { if (stems.includes(a) && stems.includes(b)) lines.push(`천간 합: ${label}`); });

    const branchSix = [['子','丑','자축합'],['寅','亥','인해합'],['卯','戌','묘술합'],['辰','酉','진유합'],['巳','申','사신합'],['午','未','오미합']];
    branchSix.forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push(`지지 합: ${label}`); });

    const branchChung = [['子','午','자오충'],['丑','未','축미충'],['寅','申','인신충'],['卯','酉','묘유충'],['辰','戌','진술충'],['巳','亥','사해충']];
    branchChung.forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push(`지지 충: ${label}`); });

    const branchHyung = [['子','卯','자묘형'],['寅','巳','인사형'],['巳','申','사신형'],['丑','戌','축술형'],['戌','未','술미형']];
    branchHyung.forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push(`지지 형: ${label}`); });

    if (branches.includes('寅') && branches.includes('卯') && branches.includes('辰')) lines.push('방합: 인묘진 방합');
    if (branches.includes('子') && branches.includes('辰')) lines.push('반합: 자진 반합');
    if (!lines.length) lines.push('특기할 합충형파해 구조 없음');
    return lines;
}

function percent(count, total) {
    return total ? Math.round((count / total) * 1000) / 10 : 0;
}

function buildBars(targetId, rows, toneMap) {
    document.getElementById(targetId).innerHTML = rows.map(row => `
        <div class="bar-item">
            <div class="bar-label">${row.label}</div>
            <div class="bar-track"><div class="bar-fill ${toneMap(row.key)}" style="width:${row.value}%;"></div></div>
            <div class="bar-value">${row.value}%</div>
        </div>
    `).join('');
}

function buildFortuneCards(targetId, rows) {
    const html = `<div class="fortune-scroll">
        ${rows.map(row => `
            <div class="f-card">
                <div class="f-head">${row[0]}</div>
                <div class="f-sip">${row[1]}</div>
                <div class="f-hz"><span class="${HAN_COLOR[row[2][0]]||''}">${row[2][0]}</span><br><span class="${HAN_COLOR[row[2][1]]||''}">${row[2][1]}</span></div>
                <div class="f-kr">${row[3]}</div>
                <div class="f-un">${row[4]}</div>
            </div>
        `).join('')}
    </div>`;
    document.getElementById(targetId).innerHTML = html;
}

function runAnalysis() {
    const dVal = di.value.replace(/\D/g, '');
    if (dVal.length < 8) return alert('생년월일 8자리를 입력하세요.');

    showLoading('만세력을 정밀 계산하는 중입니다', () => {
        const name = ni.value || '고객';
        let tVal = ti.value.replace(/\D/g, '') || '0000';
        if (tVal.length < 4) tVal = tVal.padStart(4, '0');

        let y = parseInt(dVal.slice(0,4));
        let m = parseInt(dVal.slice(4,6));
        let d = parseInt(dVal.slice(6,8));
        let hr = parseInt(tVal.slice(0,2));
        let mn = parseInt(tVal.slice(2,4));

        const isUnknown = document.getElementById('no-time').checked;
        const isSolar = document.getElementById('cal-type').value === 'S';

        if (document.getElementById('adj-l').checked && !isUnknown) {
            const dt = new Date(y, m - 1, d, hr, mn);
            dt.setMinutes(dt.getMinutes() - 32);
            y = dt.getFullYear();
            m = dt.getMonth() + 1;
            d = dt.getDate();
            hr = dt.getHours();
            mn = dt.getMinutes();
        }

        const lunar = isSolar ? Solar.fromYmdHms(y, m, d, hr, mn, 0).getLunar() : Lunar.fromYmdHms(y, m, d, hr, mn, 0);
        const solar = lunar.getSolar();
        const ec = lunar.getEightChar();
        const pillars = [
            { n: '시주', h: isUnknown ? ['', ''] : ec.getTime() },
            { n: '일주', h: ec.getDay() },
            { n: '월주', h: ec.getMonth() },
            { n: '년주', h: ec.getYear() }
        ];
        const dayStem = ec.getDay()[0];
        const allShinsal = getAllShinsal(pillars, ec, isUnknown);

        document.getElementById('hero-name').innerText = `${name}님의 만세력`;
        const lunarMonth = lunar.getMonth();
        const lunarDay = lunar.getDay();
        const lunarMonthText = lunarMonth < 0 ? String(Math.abs(lunarMonth)).padStart(2, '0') : String(lunarMonth).padStart(2, '0');
        const lunarLeapText = lunarMonth < 0 ? '(윤달)' : '(평달)';
        document.getElementById('hero-meta').innerHTML = `양력 ${solar.getYear()}.${String(solar.getMonth()).padStart(2,'0')}.${String(solar.getDay()).padStart(2,'0')} (${String(solar.getHour()).padStart(2,'0')}:${String(solar.getMinute()).padStart(2,'0')})<br>음력 ${lunar.getYear()}.${lunarMonthText}.${String(lunarDay).padStart(2,'0')} ${lunarLeapText}`;

        const header = `
            <div class="row">
                <div class="cell col-head"></div>
                <div class="cell col-head">시주</div>
                <div class="cell col-head">일주</div>
                <div class="cell col-head">월주</div>
                <div class="cell col-head">년주</div>
            </div>`;

        const buildRow = (label, renderer) => `
            <div class="row">
                <div class="cell row-label">${label}</div>
                ${pillars.map((p, idx) => `<div class="cell">${isUnknown && idx === 0 ? '<span class="tiny-dim">미상</span>' : renderer(p, idx)}</div>`).join('')}
            </div>`;

        const manseHtml = [
            header,
            buildRow('천간십성', p => `<div class="mini-top">${p.n === '일주' ? '일원' : getSipseong(dayStem, p.h[0])}</div>`),
            buildRow('천간', p => `<div class="hanja-main ${HAN_COLOR[p.h[0]] || ''}">${p.h[0]}</div><div class="hangul-main">${HAN_KOR[p.h[0]] || ''}</div>`),
            buildRow('지지', p => `<div class="hanja-main ${HAN_COLOR[p.h[1]] || ''}">${p.h[1]}</div><div class="hangul-main">${HAN_KOR[p.h[1]] || ''}</div>`),
            buildRow('지지십성', p => `<div class="mini-mid">${getSipseong(dayStem, p.h[1])}</div>`),
            buildRow('지장간', p => `<div class="mini-low">${getHidden(p.h[1])}</div>`),
            buildRow('12운성', p => `<div class="mini-mid">${getUnsung(dayStem, p.h[1]) || '-'}</div>`),
            buildRow('12신살', p => `<div class="mini-low">${(allShinsal[p.n] || []).join(' · ') || '-'}</div>`),
            buildRow('공망', p => `<div class="mini-mid">-</div>`)
        ].join('');
        document.getElementById('manse-table').innerHTML = manseHtml;

        document.getElementById('relation-list').innerHTML = buildRelationLines(pillars).map(line => `<div class="line-item">${line}</div>`).join('');

        document.getElementById('shinsal-grid').innerHTML = pillars.map((p, idx) => `
            <div class="info-card">
                <div class="info-label">${p.n}</div>
                <div class="info-value">${isUnknown && idx === 0 ? '시간 미상' : ((allShinsal[p.n] || []).join(', ') || '특기 신살 없음')}</div>
            </div>
        `).join('');

        const counts = { wood: 0, fire: 0, earth: 0, metal: 0, water: 0 };
        const sipCounts = { 비견:0, 겁재:0, 식신:0, 상관:0, 편재:0, 정재:0, 편관:0, 정관:0, 편인:0, 정인:0 };

        pillars.forEach((p, idx) => {
            if (isUnknown && idx === 0) return;
            [p.h[0], p.h[1]].forEach(ch => { if (HAN_COLOR[ch]) counts[HAN_COLOR[ch]]++; });
            const s1 = getSipseong(dayStem, p.h[0]);
            const s2 = getSipseong(dayStem, p.h[1]);
            if (s1 && sipCounts[s1] !== undefined) sipCounts[s1]++;
            if (s2 && sipCounts[s2] !== undefined) sipCounts[s2]++;
        });

        const total = isUnknown ? 6 : 8;
        buildBars('wuxing-bars', [
            { key:'wood', label:'목', value: percent(counts.wood, total) },
            { key:'fire', label:'화', value: percent(counts.fire, total) },
            { key:'earth', label:'토', value: percent(counts.earth, total) },
            { key:'metal', label:'금', value: percent(counts.metal, total) },
            { key:'water', label:'수', value: percent(counts.water, total) }
        ], key => `bg-${key}`);

        buildBars('sipseong-bars', Object.keys(sipCounts).map(key => ({
            key,
            label: key,
            value: percent(sipCounts[key], total)
        })), () => 'bg-earth');

        const support = counts.wood + counts.fire;
        const control = counts.metal + counts.water;
        let strength = '중화';
        if (support - control >= 2) strength = '신강';
        if (control - support >= 2) strength = '신약';
        document.getElementById('strength-text').innerText = strength;

        const yun = ec.getYun(document.getElementById('gender').value === 'M' ? 1 : 0);
        const yunDirection = document.getElementById('gender').value === 'M' ? '순행' : '역행';
        const yunStartAge = yun.getStartAge ? yun.getStartAge() : '-';
        document.getElementById('yun-text').innerText = `${yunStartAge}세 시작 · ${yunDirection}`;

        const daeunRows = yun.getDaYun().slice(1, 9).map(dy => {
            const gz = dy.getGanZhi();
            return [
                dy.getStartAge() + '세',
                getSipseong(dayStem, gz[0]),
                `${gz[0]}${gz[1]}`,
                `${HAN_KOR[gz[0]]}${HAN_KOR[gz[1]]}`,
                getUnsung(dayStem, gz[1]) || '-'
            ];
        });
        buildFortuneCards('daeun-table', daeunRows);

        const currentYear = new Date().getFullYear();
        const seunRows = [];
        for (let year = currentYear; year < currentYear + 10; year++) {
            const yLunar = Solar.fromYmd(year, 6, 15).getLunar();
            const yEc = yLunar.getEightChar();
            const gz = yEc.getYear();
            seunRows.push([
                year + '년',
                getSipseong(dayStem, gz[0]),
                `${gz[0]}${gz[1]}`,
                `${HAN_KOR[gz[0]]}${HAN_KOR[gz[1]]}`,
                getUnsung(dayStem, gz[1]) || '-'
            ]);
        }
        buildFortuneCards('seun-table', seunRows);

        const wolunRows = [];
        for (let m = 1; m <= 12; m++) {
            const mSolar = Solar.fromYmd(currentYear, m, 15);
            const mEc = mSolar.getLunar().getEightChar();
            const gz = mEc.getMonth();
            wolunRows.push([
                m + '월',
                getSipseong(dayStem, gz[0]),
                `${gz[0]}${gz[1]}`,
                `${HAN_KOR[gz[0]]}${HAN_KOR[gz[1]]}`,
                getUnsung(dayStem, gz[1]) || '-'
            ]);
        }
        buildFortuneCards('wolun-table', wolunRows);

        go(2);
    });
}
</script>
