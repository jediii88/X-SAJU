<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-사주 마스터 | 프리미엄 만세력</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --panel: #0a0a0a;
            --panel-2: #050505;
            --line: rgba(255,255,255,0.08);
            --line-soft: rgba(255,255,255,0.04);
            --text: rgba(255,255,255,0.96);
            --text-soft: rgba(255,255,255,0.70);
            --text-dim: rgba(255,255,255,0.42);
            --gold: #c7a76a;
            --wood: #52b36a;
            --fire: #d45a52;
            --earth: #c9a24c;
            --metal: #9ea4aa;
            --water: #4e87d9;
        }

        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body { overflow-x: hidden; }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 28px 18px 80px;
        }

        .brand {
            padding: 20px 0 34px;
            text-align: center;
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.88);
        }

        .page { display: none; }
        .page.active { display: block; }

        /* --- 입력 폼 (점신 스타일) --- */
        .input-group {
            margin-bottom: 32px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
            font-weight: 400;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #333;
            background: transparent;
            color: var(--text);
            padding: 8px 0;
            font-size: 20px;
            font-weight: 700;
            outline: none;
        }
        .input-wrapper input::placeholder { color: #444; font-weight: 300; }
        
        /* 쭈욱~ 애니메이션 밑줄 */
        .input-wrapper input:focus { border-bottom-color: transparent; }
        .underline {
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 2px;
            background-color: #fff;
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .input-wrapper input:focus ~ .underline { width: 100%; }

        /* 버튼류 (성별, 달력) */
        .btn-group {
            display: flex; gap: 12px; margin-top: 8px;
        }
        .btn-toggle {
            flex: 1; padding: 14px;
            border-radius: 12px; border: none;
            background: #1a1a1a; color: #666;
            font-size: 15px; font-weight: 400;
            cursor: pointer; transition: 0.2s;
        }
        .btn-toggle.active {
            background: #fff; color: #000; font-weight: 700;
        }

        .toggle-row {
            display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px;
        }
        .toggle {
            display: inline-flex; align-items: center; gap: 7px;
            color: var(--text-dim); font-size: 13px; font-weight: 300; cursor: pointer;
        }
        .toggle input { width: 16px; height: 16px; accent-color: #fff; cursor: pointer; }

        /* 아바타 헤더 (동물 이미지) */
        .avatar-header {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px 0 40px; text-align: center;
        }
        
        .avatar-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 10px;
            border: 2px solid var(--gold);
            background-image: url('avatar_sprite.jpg');
            background-size: 400% 300%; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }

        .avatar-circle.wood { filter: sepia(0.5) hue-rotate(90deg) saturate(1.5); }
        .avatar-circle.fire { filter: sepia(0.5) hue-rotate(-20deg) saturate(2); }
        .avatar-circle.earth { filter: sepia(0.8) hue-rotate(10deg) saturate(1.5); }
        .avatar-circle.metal { filter: grayscale(1); }
        .avatar-circle.water { filter: grayscale(0.5) contrast(1.2) brightness(0.8); }

        .avatar-name { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 8px; }
        .avatar-desc-wrap { font-size: 14px; color: var(--gold); margin-bottom: 12px; }
        .badge {
            border: 1px solid #333; border-radius: 16px; padding: 4px 10px;
            font-size: 12px; color: #aaa; background: #0a0a0a;
        }

        .btn {
            width: 100%; padding: 18px 16px; margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.16); background: transparent;
            color: var(--text); font-size: 15px; font-weight: 300; letter-spacing: 0.08em; cursor: pointer;
        }
        .btn.subtle { margin-top: 10px; border-color: transparent; color: var(--text-dim); font-size: 13px; }

        /* 네비게이션 스티키 탭 */
        .jeomsin-nav {
            position: sticky; top: 0; z-index: 100; background: var(--bg);
            display: flex; overflow-x: auto; gap: 16px; padding: 12px 16px;
            border-bottom: 1px solid var(--line); margin-bottom: 20px; white-space: nowrap;
        }
        .jeomsin-nav::-webkit-scrollbar { display: none; }
        .j-nav-item {
            font-size: 15px; color: var(--text-soft); font-weight: 500;
            padding-bottom: 8px; position: relative; cursor: pointer;
        }
        .j-nav-item.active { color: var(--text); font-weight: 700; }
        .j-nav-item.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--text); }

        /* 만세력 테이블 */
        .manse-table { display: flex; flex-direction: column; gap: 4px; margin-bottom: 30px; }
        .manse-row { display: grid; grid-template-columns: 60px repeat(4, 1fr); gap: 4px; }
        .manse-cell {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px 4px; background: var(--panel); border-radius: 8px; min-height: 48px; text-align: center;
        }
        .manse-label { color: var(--text-dim); font-size: 12px; }
        .manse-head { color: var(--text-soft); font-size: 13px; font-weight: 700; }
        .m-badge { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
        .m-hanja { font-size: 34px; font-weight: 500; line-height: 1.1; }
        
        /* 바 차트 */
        .bar-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .bar-row { display: grid; grid-template-columns: 60px 1fr 40px; gap: 10px; align-items: center; }
        .bar-label { font-size: 13px; color: var(--text-soft); }
        .bar-bg { height: 6px; background: #111; border-radius: 3px; position: relative; }
        .bar-fill { height: 100%; border-radius: 3px; transition: width 1s; }
        .bar-val { font-size: 12px; color: var(--text-dim); text-align: right; }

        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); } .metal { color: var(--metal); } .water { color: var(--water); }
        .bg-wood { background: var(--wood); } .bg-fire { background: var(--fire); } .bg-earth { background: var(--earth); } .bg-metal { background: var(--metal); } .bg-water { background: var(--water); }

        /* 대운/세운 카드 스크롤 */
        .fortune-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 16px; }
        .f-card {
            flex: 0 0 85px; background: var(--panel); border-radius: 10px; padding: 15px 5px;
            text-align: center; display: flex; flex-direction: column; gap: 6px; border: 1px solid #111;
        }
        .f-head { font-size: 12px; color: var(--text-dim); }
        .f-sip { font-size: 11px; color: var(--gold); }
        .f-hz { font-size: 22px; font-family: 'Noto Serif KR', serif; }

        .loading {
            position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
            flex-direction: column; background: rgba(0,0,0,0.95); z-index: 999;
        }
        .spinner { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #222; border-top-color: var(--gold); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 섹션 타이틀 */
        .section-title {
            display: flex; justify-content: space-between; align-items: center;
            margin: 40px 0 15px; padding-bottom: 8px; border-bottom: 1px solid #111;
            font-size: 14px; color: var(--text-soft); font-weight: 500;
        }
    </style>

    <style>
        .report-chapter { margin-bottom: 40px; }
        .ch-title { color: var(--gold); border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 15px; font-family: 'Noto Serif KR', serif; font-weight: 300; font-size: 20px; }
        .ch-text { font-size: 15px; line-height: 1.8; color: #eee; margin-bottom: 15px; text-align: justify; word-break: keep-all; }
        .axe-advice { background: #111; padding: 18px; border-radius: 8px; border-left: 3px solid var(--gold); font-size: 14.5px; line-height: 1.6; color: #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-card { background: #111; border: 1px solid var(--line-soft); border-radius: 12px; padding: 24px; width: 100%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .modal-title { font-size: 16px; font-weight: 500; color: var(--gold); margin-bottom: 12px; }
        .modal-body { font-size: 14px; line-height: 1.6; color: var(--text-soft); margin-bottom: 24px; word-break: keep-all; }
        .modal-close { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: none; border-radius: 6px; color: var(--text); cursor: pointer; }

        .rel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px; }
        .rel-card { background: linear-gradient(135deg, #151515, #0a0a0a); border: 1px solid var(--line); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; }
        .rel-nodes { display: flex; align-items: center; gap: 12px; }
        .rel-char { width: 36px; height: 36px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .rel-link { flex: 1; height: 2px; background: var(--line); min-width: 20px; position: relative; }
        .rel-badge { background: #2a2a2a; color: var(--gold); font-size: 13px; padding: 4px 12px; border-radius: 20px; margin-top: 8px; }

        .help-icon { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.1); color: #aaa; font-size: 10px; cursor: pointer; margin-left: 6px; }
    </style>


<style>
    /* 점신 스타일 만세력 그리드 */
    .manse-table {
        display: flex;
        flex-direction: column;
        background: #1a1a1a;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #333;
        margin-bottom: 30px;
    }
    .manse-row {
        display: grid;
        grid-template-columns: 60px 1fr 1fr 1fr 1fr;
        border-bottom: 1px solid #222;
    }
    .manse-row:last-child { border-bottom: none; }
    .manse-cell {
        padding: 15px 5px;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 50px;
        font-size: 13px;
    }
    .manse-label {
        background: #111;
        color: #777;
        font-weight: 700;
        font-size: 11px;
        border-right: 1px solid #222;
    }
    .manse-head {
        background: #111;
        color: #aaa;
        font-weight: 800;
        font-size: 12px;
        padding: 8px 0;
        border-bottom: 1px solid #222;
    }
    
    /* 천간/지지 강조 */
    .hz-main {
        font-size: 28px;
        font-weight: 900;
        line-height: 1.1;
        margin-bottom: 2px;
    }
    .hz-sub {
        font-size: 12px;
        opacity: 0.8;
    }
    
    /* 오행 색상 (점신 스타일) */
    .wood { color: #52b36a; }
    .fire { color: #e74c3c; }
    .earth { color: #c7a76a; }
    .metal { color: #f1f1f1; }
    .water { color: #4e87d9; }
    
    /* 배경색 (지지의 경우 박스형) */
    .bg-wood { background: rgba(82, 179, 106, 0.1); }
    .bg-fire { background: rgba(231, 76, 60, 0.1); }
    .bg-earth { background: rgba(199, 167, 106, 0.1); }
    .bg-metal { background: rgba(241, 241, 241, 0.05); }
    .bg-water { background: rgba(78, 135, 217, 0.1); }

    /* 대운 스크롤 (점신 스타일 가로 카드) */
    .fortune-scroll {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding: 10px 0 20px 0;
        -webkit-overflow-scrolling: touch;
    }
    .fortune-scroll::-webkit-scrollbar { display: none; }
    .f-card {
        flex: 0 0 85px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 10px;
        padding: 15px 5px;
        text-align: center;
        transition: transform 0.2s;
    }
    .f-card.active {
        border-color: var(--gold);
        background: rgba(199, 167, 106, 0.05);
    }
    .f-age { font-size: 14px; font-weight: 900; color: var(--gold); margin-bottom: 8px; }
    .f-gz { font-size: 18px; font-weight: 800; margin-bottom: 5px; }
    .f-sip { font-size: 10px; color: #888; line-height: 1.3; }
</style>


<style>
    /* 점신 스타일 헤더 상세 */
    .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        background: #1a1a1a;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 25px;
        border: 1px solid #333;
    }
    .info-item { display: flex; flex-direction: column; }
    .info-label { font-size: 11px; color: #666; margin-bottom: 5px; }
    .info-val { font-size: 14px; font-weight: 700; color: #ddd; }

    /* 만세력 기둥별 운세 라벨 */
    .pillar-fate-label {
        font-size: 10px;
        color: #555;
        margin-top: 5px;
        font-weight: 700;
    }

    /* 십성/오행 상세 바 */
    .analysis-section {
        background: #111;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 30px;
    }
    .analysis-title {
        font-size: 15px;
        font-weight: 800;
        color: var(--gold);
        margin-bottom: 20px;
        padding-left: 10px;
        border-left: 4px solid var(--gold);
    }

    /* 대운/세운 탭 스타일 */
    .luck-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
    }
    .luck-tab {
        flex: 1;
        padding: 10px;
        text-align: center;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        font-size: 13px;
        color: #777;
        cursor: pointer;
    }
    .luck-tab.active {
        background: var(--gold);
        color: #000;
        font-weight: 800;
        border-color: var(--gold);
    }
</style>

</head>
<body>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="margin-top:15px; color:#888; font-size:13px;" id="loading-msg">운명을 분석 중입니다...</div>
</div>

<div class="container">
    <div class="brand">X-SAJU MASTER</div>

    <!-- STEP 1: 입력 -->
    <div id="step-1" class="page active">
        <div id="input-container">
            <div class="input-group" id="user-form-1">
                <label>성함</label>
                <div class="input-wrapper">
                    <input type="text" id="user-name" placeholder="이름을 입력하세요">
                    <div class="underline"></div>
                </div>
            </div>

            <div class="input-group">
                <label>생년월일 (8자리)</label>
                <div class="input-wrapper">
                    <input type="text" id="birth-date" placeholder="예: 19880312" maxlength="8">
                    <div class="underline"></div>
                </div>
            </div>

            <div class="input-group">
                <label>태어난 시간 (4자리)</label>
                <div class="input-wrapper">
                    <input type="text" id="birth-time" placeholder="예: 0104" maxlength="4">
                    <div class="underline"></div>
                </div>
                <div class="toggle-row">
                    <label class="toggle"><input type="checkbox" id="no-time"> 시간 모름</label>
                    <label class="toggle"><input type="checkbox" id="adj-l" checked> 경도 보정</label>
                </div>
            </div>

            <div class="input-group">
                <label>성별 / 달력</label>
                <div class="btn-group" id="gender-group">
                    <button class="btn-toggle active" data-val="F" onclick="setToggle('gender-group', this)">여성</button>
                    <button class="btn-toggle" data-val="M" onclick="setToggle('gender-group', this)">남성</button>
                </div>
                <input type="hidden" id="gender" value="F">
                
                <div class="btn-group" id="cal-group" style="margin-top:10px;">
                    <button class="btn-toggle active" data-val="S" onclick="setToggle('cal-group', this); toggleLeap(false)">양력</button>
                    <button class="btn-toggle" data-val="L" onclick="setToggle('cal-group', this); toggleLeap(true)">음력</button>
                </div>
                <input type="hidden" id="cal" value="S">

                <!-- 윤달 여부 -->
                <div id="leap-wrap" style="display:none; margin-top:10px;">
                    <label style="font-size:12px; color:#666;">윤달 여부</label>
                    <div class="btn-group" id="leap-group">
                        <button class="btn-toggle active" data-val="false" onclick="setToggle('leap-group', this)">평달</button>
                        <button class="btn-toggle" data-val="true" onclick="setToggle('leap-group', this)">윤달</button>
                    </div>
                    <input type="hidden" id="leap" value="false">
                </div>
            </div>
        </div>

        <button class="btn subtle" onclick="addUserForm()">+ 인원 추가 (최대 4인)</button>
        <button class="btn" style="background:var(--gold); color:#000; font-weight:700; border:none;" onclick="runAnalysis()">만세력 결과 보기</button>
    </div>

    <!-- STEP 2: 대시보드 -->
    <div id="step-2" class="page">
        <div class="avatar-header">
            <div class="avatar-circle" id="av-circle"></div>
            <div class="avatar-name" id="av-name">-</div>
            <div class="avatar-desc-wrap" id="av-desc">丙寅 붉은 호랑이</div>
            <div class="avatar-badges" id="av-badges"></div>
        </div>

        <div class="jeomsin-nav">
            <div class="j-nav-item active" onclick="scrollToSec('sec-manse'); setNav(this)">원국</div>
            <div class="j-nav-item" onclick="scrollToSec('sec-relation'); setNav(this)">관계</div>
            <div class="j-nav-item" onclick="scrollToSec('sec-wuxing'); setNav(this)">오행</div>
            <div class="j-nav-item" onclick="scrollToSec('sec-fortune'); setNav(this)">대운</div>
        </div>

        <div id="sec-manse" class="section">
            <div class="section-title"><div class="title-left"><span>사주 원국 (팔자)</span><span class="help-icon" onclick="openHelp('manse')">?</span></div></div>
            <div class="manse-table" id="manse-table"></div>
        </div>

        <div id="sec-relation" class="section">
            <div class="section-title"><div class="title-left"><span>합 · 충 · 형 · 파 · 해</span><span class="help-icon" onclick="openHelp('relation')">?</span></div></div>
            <div class="rel-grid" id="relation-grid"></div>
        </div>

        <div id="sec-wuxing" class="section">
            <div class="section-title"><div class="title-left"><span>오행 및 십성 에너지</span><span class="help-icon" onclick="openHelp('wuxing')">?</span></div></div>
            <div class="bar-group" id="wuxing-bars"></div>
            <div class="bar-group" id="sipseong-bars" style="margin-top:20px;"></div>
        </div>

        <div id="sec-fortune" class="section">
            <div class="section-title"><div class="title-left"><span>신강 · 신약 및 대운</span><span class="help-icon" onclick="openHelp('strength')">?</span></div></div>
            <div class="gauge-wrap" id="strength-gauge" style="display:flex; flex-direction:column; align-items:center; padding:20px 0;">
                <div style="position:relative; width:200px; height:110px; display:flex; justify-content:center;">
                    <svg viewBox="0 0 200 100" style="width:200px; height:100px;">
                        <path d="M 20 90 A 80 80 0 0 1 180 90" fill="none" stroke="#222" stroke-width="14" stroke-linecap="round" />
                        <path id="gauge-path" d="M 20 90 A 80 80 0 0 1 180 90" fill="none" stroke="var(--gold)" stroke-width="14" stroke-linecap="round" stroke-dasharray="251" stroke-dashoffset="251" style="transition:1s;" />
                    </svg>

function buildRelationLines(pillars) {
    const stems = pillars.map(p => p.h[0]).filter(Boolean);
    const branches = pillars.map(p => p.h[1]).filter(Boolean);
    const lines = [];
    
    // 천간 합
    [['甲','己','갑기합'],['乙','庚','을경합'],['丙','辛','병신합'],['丁','壬','정임합'],['戊','癸','무계합']]
    .forEach(([a,b,label]) => { if (stems.includes(a) && stems.includes(b)) lines.push({type:'천간 합', label, chars:[a,b]}); });
    
    // 지지 육합
    [['子','丑','자축합'],['寅','亥','인해합'],['卯','戌','묘술합'],['辰','酉','진유합'],['巳','申','사신합'],['午','未','오미합']]
    .forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push({type:'육합', label, chars:[a,b]}); });
    
    // 지지 충
    [['子','午','자오충'],['丑','未','축미충'],['寅','申','인신충'],['卯','酉','묘유충'],['辰','戌','진술충'],['巳','亥','사해충']]
    .forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push({type:'충', label, chars:[a,b]}); });

    // 지지 형
    [['寅','巳','인사형'],['巳','申','사신형'],['申','寅','신인형'],['丑','戌','축술형'],['戌','未','술미형'],['未','丑','미축형'],['子','卯','자묘형']]
    .forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push({type:'형', label, chars:[a,b]}); });

    // 삼합/방합 (간략화)
    [['亥','卯','未','해묘미삼합'],['寅','午','戌','인오술삼합'],['巳','酉','丑','사유축삼합'],['申','子','辰','신자진삼합']]
    .forEach(([a,b,c,label]) => { if (branches.includes(a) && branches.includes(b) && branches.includes(c)) lines.push({type:'삼합', label, chars:[a,b,c]}); });
    
    [['寅','卯','辰','인묘진방합'],['巳','午','未','사오미방합'],['申','酉','戌','신유술방합'],['亥','子','丑','해자축방합']]
    .forEach(([a,b,c,label]) => { if (branches.includes(a) && branches.includes(b) && branches.includes(c)) lines.push({type:'방합', label, chars:[a,b,c]}); });

    if (!lines.length) lines.push({type:'없음', label:'특기할 관계 없음', chars:[]});
    return lines;
}

function toggleLeap(show, id) {
    const wrap = id ? document.getElementById('leap-wrap-' + id) : document.getElementById('leap-wrap');
    if (wrap) wrap.style.display = show ? 'block' : 'none';
    if (!show) {
        const inputId = id ? 'is-leap-' + id : 'leap';
        const groupId = id ? 'leap-group-' + id : 'leap-group';
        const hidden = document.getElementById(inputId);
        if (hidden) hidden.value = 'false';
        const parent = document.getElementById(groupId);
        if (parent) {
            parent.querySelectorAll('.btn-toggle').forEach(b => {
                if(b.getAttribute('data-val') === 'false') b.classList.add('active');
                else b.classList.remove('active');
            });
        }
    }
}

function setSubToggle(btn, inputId, val) {

             // Logic to only toggle within same group (gender or cal)
        }
    });

        if((val === 'F' || val === 'M') && (b.innerText === '여성' || b.innerText === '남성')) b.classList.remove('active');

function runAnalysis() {
    window.globalSajuDataArray = [];
    const mainDate = document.getElementById('birth-date').value;
    if(mainDate.length < 8) return alert('생년월일을 입력하세요.');
    
    // User 1
    window.globalSajuDataArray.push(calculateEightChar(
        document.getElementById('user-name').value || '고객 1',
        mainDate,
        document.getElementById('birth-time').value || '0000',
        document.getElementById('gender').value,
        document.getElementById('cal').value === 'S',
        document.getElementById('leap').value === 'true',
        'KST',
        document.getElementById('no-time').checked,
        document.getElementById('adj-l').checked
    ));
    
    // Others
    for(let i=2; i<=4; i++) {
        const dEl = document.getElementById('birth-date-' + i);
        if(!dEl || !dEl.value || dEl.value.length < 8) continue;
        window.globalSajuDataArray.push(calculateEightChar(
            document.getElementById('name-' + i).value || '고객 ' + i,
            dEl.value,
            document.getElementById('birth-time-' + i).value || '0000',
            document.getElementById('gender-' + i).value,
            document.getElementById('cal-type-' + i).value === 'S',
            document.getElementById('is-leap-' + i).value === 'true',
            'KST', false, true
        ));
    }
    
    showLoading('운명을 정밀 계산 중입니다...', () => {
        renderDashboard(window.globalSajuDataArray[0]);
        go(2);
    });
}







function renderDashboard(data) {
    // 1. 헤더 정보 (점신 스타일)
    document.getElementById('av-name').innerText = data.name;
    const elType = HAN_COLOR[data.dayStem];
    document.getElementById('av-circle').className = 'avatar-circle ' + elType;
    document.getElementById('av-desc').innerHTML = `<span style="color:var(--gold); font-weight:900; font-size:18px;">${data.animal}</span>`;
    
    let headerHtml = `
        <div class="info-grid">
            <div class="info-item"><div class="info-label">양력</div><div class="info-val">${data.solarDate}</div></div>
            <div class="info-item"><div class="info-label">음력</div><div class="info-val">${data.lunarDate}</div></div>
            <div class="info-item" style="grid-column: 1 / -1;"><div class="info-label">절기</div><div class="info-val">${data.solarTerm}</div></div>
        </div>
    `;
    const avHeader = document.querySelector('.avatar-header');
    const existingInfo = document.getElementById('jeomsin-info');
    if (existingInfo) existingInfo.remove();
    const infoDiv = document.createElement('div');
    infoDiv.id = 'jeomsin-info';
    infoDiv.innerHTML = headerHtml;
    avHeader.insertBefore(infoDiv, document.getElementById('av-circle').nextSibling);

    // Badges
    let badgeHtml = `<div class="badge" style="background:#e74c3c; border:none; font-weight:800;">건강 ${data.healthScore}점</div>`;
    badgeHtml += `<div class="badge" style="background:#444; border:none;">공망: ${data.gongmang}</div>`;
    const allS = data.allShinsal || {};
    const flatShinsal = [...new Set(Object.values(allS).flat())].filter(Boolean);
    flatShinsal.slice(0, 3).forEach(s => { badgeHtml += `<div class="badge">${s}</div>`; });
    document.getElementById('av-badges').innerHTML = badgeHtml;
    
    // User Switcher
    let switcher = '';
    if (window.globalSajuDataArray.length > 1) {
        switcher = `<div style="display:flex; justify-content:center; gap:8px; margin:20px 0; overflow-x:auto; padding:5px;">`;
        window.globalSajuDataArray.forEach((u, i) => {
            const isActive = u.name === data.name;
            switcher += `<button class="btn subtle" style="flex:0 0 auto; padding:8px 20px; font-size:12px; border-radius:20px; ${isActive ? 'background:var(--gold); color:#000; border:none; font-weight:800;' : 'background:#1a1a1a; color:#888; border:1px solid #333;'}" onclick="renderDashboard(window.globalSajuDataArray[${i}])">${u.name}</button>`;
        });
        switcher += `</div>`;
    }
    const existingSw = document.getElementById('user-switcher');
    if (existingSw) existingSw.remove();
    if (switcher) {
        const swDiv = document.createElement('div');
        swDiv.id = 'user-switcher';
        swDiv.innerHTML = switcher;
        avHeader.insertBefore(swDiv, document.getElementById('av-circle'));
    }
    
    // 2. 만세력 (정밀 복구)
    const fateLabels = ['말년운','장년운','청년운','초년운'];
    const labels = ['십성','천간','지지','십성','지장간','12운성','12신살'];
    const rows = [
        data.pillars.map(p => p.n === '일주' ? '일원' : getSipseong(data.dayStem, p.h[0])),
        data.pillars.map(p => p.h[0]),
        data.pillars.map(p => p.h[1]),
        data.pillars.map(p => getSipseong(data.dayStem, p.h[1])),
        data.pillars.map(p => (BRANCH_HIDDEN[p.h[1]] || []).join(',')),
        data.pillars.map(p => UNSUNG_MAP[data.dayStem]?.[p.h[1]] || '-'),
        data.shinsal12 || ['-','-','-','-']
    ];
    
    let mHtml = '<div class="manse-row"><div class="manse-label"></div>' + fateLabels.map(fl => `<div class="manse-head">${fl}</div>`).join('') + '</div>';
    labels.forEach((l, i) => {
        mHtml += `<div class="manse-row"><div class="manse-cell manse-label">${l}</div>`;
        rows[i].forEach((val, idx) => {
            const colorCls = HAN_COLOR[val] || HAN_COLOR[val[0]] || '';
            const bgCls = (i === 2) ? 'bg-' + colorCls : '';
            let content = val;
            
            if (i === 1 || i === 2) {
                content = `<span class="hz-main ${colorCls}">${val}</span><span class="hz-sub">(${HAN_KOR[val]})</span>`;
            } else if (i === 4) {
                content = val.split(',').map(v => `<span class="${HAN_COLOR[v]}" style="font-size:10px; margin:0 1px;">${v}</span>`).join('');
            } else if (i === 0 || i === 3 || i === 5 || i === 6) {
                content = `<span style="font-weight:700; color:${i===0||i===3?'#ccc':'#888'};">${val}</span>`;
            }
            mHtml += `<div class="manse-cell ${bgCls}">${content}</div>`;
        });
        mHtml += `</div>`;
    });
    document.getElementById('manse-table').innerHTML = mHtml;

    // 3. 관계 그리드
    const relGrid = document.getElementById('relation-grid');
    const relLines = buildRelationLines(data.pillars);
    relGrid.innerHTML = relLines.map(item => {
        if(item.type === '없음') return '';
        let nodesHtml = item.chars.map(c => `<div class="rel-char ${HAN_COLOR[c]}" style="width:35px; height:35px; font-size:16px;">${c}</div>`).join('<div class="rel-link" style="width:15px;"></div>');
        return `<div class="rel-card" style="padding:15px; background:#1a1a1a; border:1px solid #333;"><div class="rel-nodes" style="margin-bottom:10px;">${nodesHtml}</div><div class="rel-badge" style="background:var(--gold); color:#000; font-size:11px;">${item.label}</div></div>`;
    }).join('');

    // 4. 대운/세운 탭 및 리스트
    renderLuckSection(data);

    // 5. 오행/십성 상세 분석
    renderDetailedAnalysis(data);
    
    // 6. 신강신약 게이지
    const ratio = data.strengthRatio;
    document.getElementById('gauge-path').style.strokeDashoffset = 251 - (ratio * 2.51);
    document.getElementById('gauge-needle').style.transform = `rotate(${(ratio * 1.8) - 90}deg)`;
    document.getElementById('strength-text').innerText = `${data.strengthText} (${Math.round(ratio)})`;
}

window.showLuck = function(type) {
    document.getElementById('daewun-list').style.display = type === 'daewun' ? 'flex' : 'none';
    document.getElementById('sewun-list').style.display = type === 'sewun' ? 'flex' : 'none';
    const tabs = document.querySelectorAll('.luck-tab');
    tabs[0].className = type === 'daewun' ? 'luck-tab active' : 'luck-tab';
    tabs[1].className = type === 'sewun' ? 'luck-tab active' : 'luck-tab';
}

function renderDetailedAnalysis(data) {
    let wHtml = '';
    const totalW = Object.values(data.wuxing).reduce((a,b)=>a+b,0);
    WUXING_ORDER.forEach(k => {
        const per = Math.round((data.wuxing[k]/totalW)*100);
        wHtml += `<div class="bar-row"><div class="bar-label" style="width:40px;">${RELATION_LABELS[k]}</div><div class="bar-bg"><div class="bar-fill bg-${k}" style="width:${per}%"></div></div><div class="bar-val">${per}%</div></div>`;
    });
    document.getElementById('wuxing-bars').innerHTML = wHtml;

    let sHtml = '';
    const sipKeys = ['비겁','식상','재성','관성','인성'];
    const sipTotal = Object.values(data.sipseong).reduce((a,b)=>a+b,0) || 1;
    sipKeys.forEach(k => {
        let val = 0;
        if(k==='비겁') val = (data.sipseong['비견']||0) + (data.sipseong['겁재']||0);
        if(k==='식상') val = (data.sipseong['식신']||0) + (data.sipseong['상관']||0);
        if(k==='재성') val = (data.sipseong['편재']||0) + (data.sipseong['정재']||0);
        if(k==='관성') val = (data.sipseong['편관']||0) + (data.sipseong['정관']||0);
        if(k==='인성') val = (data.sipseong['편인']||0) + (data.sipseong['정인']||0);
        const per = Math.round((val/sipTotal)*100);
        sHtml += `<div class="bar-row"><div class="bar-label" style="width:40px;">${k}</div><div class="bar-bg"><div class="bar-fill" style="width:${per}%; background:#555;"></div></div><div class="bar-val">${per}%</div></div>`;
    });
    document.getElementById('sipseong-bars').innerHTML = sHtml;
}

function startReport() {
    showLoading('기밀 보고서를 작성 중입니다...', () => {
        window.generateDeepReport(window.globalSajuDataArray);
        go(3);
    });
}
