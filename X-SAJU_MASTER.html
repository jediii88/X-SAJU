<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-사주 마스터 | 프리미엄 만세력</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --panel: #0a0a0a;
            --panel-2: #050505;
            --line: rgba(255,255,255,0.08);
            --line-soft: rgba(255,255,255,0.04);
            --text: rgba(255,255,255,0.96);
            --text-soft: rgba(255,255,255,0.70);
            --text-dim: rgba(255,255,255,0.42);
            --gold: #c7a76a;
            --wood: #52b36a;
            --fire: #d45a52;
            --earth: #c9a24c;
            --metal: #9ea4aa;
            --water: #4e87d9;
        }

        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body { overflow-x: hidden; }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 28px 18px 80px;
        }

        .brand {
            padding: 20px 0 34px;
            text-align: center;
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.88);
        }

        .page { display: none; }
        .page.active { display: block; }

        /* --- 입력 폼 (점신 스타일) --- */
        .input-group {
            margin-bottom: 32px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
            font-weight: 400;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #333;
            background: transparent;
            color: var(--text);
            padding: 8px 0;
            font-size: 20px;
            font-weight: 700;
            outline: none;
        }
        .input-wrapper input::placeholder { color: #444; font-weight: 300; }
        
        /* 쭈욱~ 애니메이션 밑줄 */
        .input-wrapper input:focus { border-bottom-color: transparent; }
        .underline {
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 2px;
            background-color: #fff;
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .input-wrapper input:focus ~ .underline { width: 100%; }

        /* 버튼류 (성별, 달력) */
        .btn-group {
            display: flex; gap: 12px; margin-top: 8px;
        }
        .btn-toggle {
            flex: 1; padding: 14px;
            border-radius: 12px; border: none;
            background: #1a1a1a; color: #666;
            font-size: 15px; font-weight: 400;
            cursor: pointer; transition: 0.2s;
        }
        .btn-toggle.active {
            background: #fff; color: #000; font-weight: 700;
        }

        .toggle-row {
            display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px;
        }
        .toggle {
            display: inline-flex; align-items: center; gap: 7px;
            color: var(--text-dim); font-size: 13px; font-weight: 300; cursor: pointer;
        }
        .toggle input { width: 16px; height: 16px; accent-color: #fff; cursor: pointer; }

        /* 아바타 헤더 (동물 이미지) */
        .avatar-header {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px 0 40px; text-align: center;
        }
        
        .avatar-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 10px;
            border: 2px solid var(--gold);
            background-image: url('avatar_sprite.jpg');
            background-size: 400% 300%; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }

        .avatar-circle.wood { filter: sepia(0.5) hue-rotate(90deg) saturate(1.5); }
        .avatar-circle.fire { filter: sepia(0.5) hue-rotate(-20deg) saturate(2); }
        .avatar-circle.earth { filter: sepia(0.8) hue-rotate(10deg) saturate(1.5); }
        .avatar-circle.metal { filter: grayscale(1); }
        .avatar-circle.water { filter: grayscale(0.5) contrast(1.2) brightness(0.8); }

        .avatar-name { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 8px; }
        .avatar-desc-wrap { font-size: 14px; color: var(--gold); margin-bottom: 12px; }
        .badge {
            border: 1px solid #333; border-radius: 16px; padding: 4px 10px;
            font-size: 12px; color: #aaa; background: #0a0a0a;
        }

        .btn {
            width: 100%; padding: 18px 16px; margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.16); background: transparent;
            color: var(--text); font-size: 15px; font-weight: 300; letter-spacing: 0.08em; cursor: pointer;
        }
        .btn.subtle { margin-top: 10px; border-color: transparent; color: var(--text-dim); font-size: 13px; }

        /* 네비게이션 스티키 탭 */
        .jeomsin-nav {
            position: sticky; top: 0; z-index: 100; background: var(--bg);
            display: flex; overflow-x: auto; gap: 16px; padding: 12px 16px;
            border-bottom: 1px solid var(--line); margin-bottom: 20px; white-space: nowrap;
        }
        .jeomsin-nav::-webkit-scrollbar { display: none; }
        .j-nav-item {
            font-size: 15px; color: var(--text-soft); font-weight: 500;
            padding-bottom: 8px; position: relative; cursor: pointer;
        }
        .j-nav-item.active { color: var(--text); font-weight: 700; }
        .j-nav-item.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--text); }

        /* 만세력 테이블 */
        .manse-table { display: flex; flex-direction: column; gap: 4px; margin-bottom: 30px; }
        .manse-row { display: grid; grid-template-columns: 60px repeat(4, 1fr); gap: 4px; }
        .manse-cell {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px 4px; background: var(--panel); border-radius: 8px; min-height: 48px; text-align: center;
        }
        .manse-label { color: var(--text-dim); font-size: 12px; }
        .manse-head { color: var(--text-soft); font-size: 13px; font-weight: 700; }
        .m-badge { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
        .m-hanja { font-size: 34px; font-weight: 500; line-height: 1.1; }
        
        /* 바 차트 */
        .bar-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .bar-row { display: grid; grid-template-columns: 60px 1fr 40px; gap: 10px; align-items: center; }
        .bar-label { font-size: 13px; color: var(--text-soft); }
        .bar-bg { height: 6px; background: #111; border-radius: 3px; position: relative; }
        .bar-fill { height: 100%; border-radius: 3px; transition: width 1s; }
        .bar-val { font-size: 12px; color: var(--text-dim); text-align: right; }

        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); } .metal { color: var(--metal); } .water { color: var(--water); }
        .bg-wood { background: var(--wood); } .bg-fire { background: var(--fire); } .bg-earth { background: var(--earth); } .bg-metal { background: var(--metal); } .bg-water { background: var(--water); }

        /* 대운/세운 카드 스크롤 */
        .fortune-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 16px; }
        .f-card {
            flex: 0 0 85px; background: var(--panel); border-radius: 10px; padding: 15px 5px;
            text-align: center; display: flex; flex-direction: column; gap: 6px; border: 1px solid #111;
        }
        .f-head { font-size: 12px; color: var(--text-dim); }
        .f-sip { font-size: 11px; color: var(--gold); }
        .f-hz { font-size: 22px; font-family: 'Noto Serif KR', serif; }

        .loading {
            position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
            flex-direction: column; background: rgba(0,0,0,0.95); z-index: 999;
        }
        .spinner { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #222; border-top-color: var(--gold); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 섹션 타이틀 */
        .section-title {
            display: flex; justify-content: space-between; align-items: center;
            margin: 40px 0 15px; padding-bottom: 8px; border-bottom: 1px solid #111;
            font-size: 14px; color: var(--text-soft); font-weight: 500;
        }
    </style>
</head>
<body>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="margin-top:15px; color:#888; font-size:13px;" id="loading-msg">운명을 분석 중입니다...</div>
</div>

<div class="container">
    <div class="brand">X-SAJU MASTER</div>

    <!-- STEP 1: 입력 -->
    <div id="step-1" class="page active">
        <div id="input-container">
            <div class="input-group" id="user-form-1">
                <label>성함</label>
                <div class="input-wrapper">
                    <input type="text" id="user-name" placeholder="이름을 입력하세요">
                    <div class="underline"></div>
                </div>
            </div>

            <div class="input-group">
                <label>생년월일 (8자리)</label>
                <div class="input-wrapper">
                    <input type="text" id="birth-date" placeholder="예: 19880312" maxlength="8">
                    <div class="underline"></div>
                </div>
            </div>

            <div class="input-group">
                <label>태어난 시간 (4자리)</label>
                <div class="input-wrapper">
                    <input type="text" id="birth-time" placeholder="예: 0104" maxlength="4">
                    <div class="underline"></div>
                </div>
                <div class="toggle-row">
                    <label class="toggle"><input type="checkbox" id="no-time"> 시간 모름</label>
                    <label class="toggle"><input type="checkbox" id="adj-l" checked> 경도 보정</label>
                </div>
            </div>

            <div class="input-group">
                <label>성별 / 달력</label>
                <div class="btn-group" id="gender-group">
                    <button class="btn-toggle active" data-val="F" onclick="setToggle('gender-group', this)">여성</button>
                    <button class="btn-toggle" data-val="M" onclick="setToggle('gender-group', this)">남성</button>
                </div>
                <input type="hidden" id="gender" value="F">
                
                <div class="btn-group" id="cal-group" style="margin-top:10px;">
                    <button class="btn-toggle active" data-val="S" onclick="setToggle('cal-group', this)">양력</button>
                    <button class="btn-toggle" data-val="L" onclick="setToggle('cal-group', this)">음력</button>
                </div>
                <input type="hidden" id="cal-type" value="S">
            </div>
        </div>

        <button class="btn subtle" onclick="addUserForm()">+ 인원 추가 (최대 4인)</button>
        <button class="btn" style="background:var(--gold); color:#000; font-weight:700; border:none;" onclick="runAnalysis()">만세력 결과 보기</button>
    </div>

    <!-- STEP 2: 대시보드 -->
    <div id="step-2" class="page">
        <div class="avatar-header">
            <div class="avatar-circle" id="av-circle"></div>
            <div class="avatar-name" id="av-name">-</div>
            <div class="avatar-desc-wrap" id="av-desc">丙寅 붉은 호랑이</div>
            <div class="avatar-badges" id="av-badges"></div>
        </div>

        <div class="jeomsin-nav">
            <div class="j-nav-item active" onclick="scrollToSec('sec-manse'); setNav(this)">원국</div>
            <div class="j-nav-item" onclick="scrollToSec('sec-wuxing'); setNav(this)">오행</div>
            <div class="j-nav-item" onclick="scrollToSec('sec-fortune'); setNav(this)">대운</div>
        </div>

        <div id="sec-manse" class="section">
            <div class="section-title"><span>사주 원국 (팔자)</span></div>
            <div class="manse-table" id="manse-table"></div>
        </div>

        <div id="sec-wuxing" class="section">
            <div class="section-title"><span>오행 및 십성 에너지</span></div>
            <div class="bar-group" id="wuxing-bars"></div>
            <div class="bar-group" id="sipseong-bars"></div>
        </div>

        <div id="sec-fortune" class="section">
            <div class="section-title"><span>대운의 흐름 (10년 단위)</span></div>
            <div id="daeun-table"></div>
        </div>

        <button class="btn" style="background:var(--gold); color:#000; font-weight:800;" onclick="startReport()">심층 사주풀이 (X-FILE) 열람</button>
        <button class="btn subtle" onclick="go(1)">정보 수정하기</button>
    </div>

    <!-- STEP 3: 리포트 -->
    <div id="step-3" class="page">
        <div style="font-size:24px; font-family:'Noto Serif KR', serif; text-align:center; color:var(--gold); margin-bottom:30px; letter-spacing:2px;">TOP SECRET X-FILE</div>
        <div id="report-container"></div>
        <button class="btn subtle" onclick="go(2)">만세력으로 돌아가기</button>
    </div>
</div>

<script src="lunar.js"></script>
<script src="constants.js"></script>
<script src="calculation_engine.js"></script>
<script src="saju_database.js"></script>
<script src="report_engine.js"></script>

<script>
// --- UI INTERACTION LOGIC ---
window.globalSajuDataArray = [];
window.userCount = 1;

function go(n) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('step-' + n).classList.add('active');
    window.scrollTo(0, 0);
}

function setToggle(groupId, btn) {
    const parent = document.getElementById(groupId);
    parent.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const inputId = groupId.replace('-group', '');
    document.getElementById(inputId).value = btn.getAttribute('data-val');
}

function addUserForm() {
    if (window.userCount >= 4) return alert('최대 4인까지 가능합니다.');
    window.userCount++;
    const container = document.getElementById('input-container');
    const div = document.createElement('div');
    div.id = 'user-form-' + window.userCount;
    div.className = 'input-group';
    div.style.borderTop = '1px solid #222';
    div.style.paddingTop = '20px';
    div.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <label style="color:var(--gold);">인원 ${window.userCount} 정보</label>
            <button onclick="removeUser(${window.userCount})" style="background:none; border:none; color:#555; cursor:pointer;">✕ 삭제</button>
        </div>
        <div class="input-wrapper"><input type="text" id="name-${window.userCount}" placeholder="이름"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="text" id="birth-date-${window.userCount}" placeholder="생년월일" style="flex:1; background:transparent; border:none; border-bottom:1px solid #333; color:#fff; font-size:18px; padding:5px 0;">
            <input type="text" id="birth-time-${window.userCount}" placeholder="시간" style="flex:0.6; background:transparent; border:none; border-bottom:1px solid #333; color:#fff; font-size:18px; padding:5px 0;">
        </div>
        <input type="hidden" id="gender-${window.userCount}" value="F">
        <input type="hidden" id="cal-type-${window.userCount}" value="S">
        <div class="btn-group" style="margin-top:10px;">
            <button class="btn-toggle active" onclick="setSubToggle(this, 'gender-${window.userCount}', 'F')">여성</button>
            <button class="btn-toggle" onclick="setSubToggle(this, 'gender-${window.userCount}', 'M')">남성</button>
            <button class="btn-toggle active" onclick="setSubToggle(this, 'cal-type-${window.userCount}', 'S')">양력</button>
            <button class="btn-toggle" onclick="setSubToggle(this, 'cal-type-${window.userCount}', 'L')">음력</button>
        </div>
    `;
    container.appendChild(div);
}

function setSubToggle(btn, inputId, val) {
    const parent = btn.parentElement;
    parent.querySelectorAll('.btn-toggle').forEach(b => {
        if(b.innerText === btn.innerText || (['여성','남성'].includes(b.innerText) && ['여성','남성'].includes(btn.innerText)) || (['양력','음력'].includes(b.innerText) && ['양력','음력'].includes(btn.innerText))) {
             // Logic to only toggle within same group (gender or cal)
        }
    });
    // Simplified for now
    btn.parentElement.querySelectorAll('.btn-toggle').forEach(b => {
        if((val === 'F' || val === 'M') && (b.innerText === '여성' || b.innerText === '남성')) b.classList.remove('active');
        if((val === 'S' || val === 'L') && (b.innerText === '양력' || b.innerText === '음력')) b.classList.remove('active');
    });
    btn.classList.add('active');
    document.getElementById(inputId).value = val;
}

function removeUser(id) {
    document.getElementById('user-form-' + id).remove();
    window.userCount--;
}

function showLoading(msg, cb) {
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('loading-msg').innerText = msg;
    setTimeout(() => { cb(); document.getElementById('loading').style.display = 'none'; }, 500);
}

function scrollToSec(id) {
    const el = document.getElementById(id);
    if(el) window.scrollTo({ top: el.offsetTop - 70, behavior: 'smooth' });
}

function setNav(btn) {
    document.querySelectorAll('.j-nav-item').forEach(i => i.classList.remove('active'));
    btn.classList.add('active');
}

function runAnalysis() {
    window.globalSajuDataArray = [];
    const mainDate = document.getElementById('birth-date').value;
    if(mainDate.length < 8) return alert('생년월일을 입력하세요.');
    
    // User 1
    window.globalSajuDataArray.push(calculateEightChar(
        document.getElementById('user-name').value || '고객 1',
        mainDate,
        document.getElementById('birth-time').value || '0000',
        document.getElementById('gender').value,
        document.getElementById('cal-type').value === 'S',
        false, 'KST',
        document.getElementById('no-time').checked,
        document.getElementById('adj-l').checked
    ));
    
    // Others
    for(let i=2; i<=4; i++) {
        const dEl = document.getElementById('birth-date-' + i);
        if(!dEl || !dEl.value || dEl.value.length < 8) continue;
        window.globalSajuDataArray.push(calculateEightChar(
            document.getElementById('name-' + i).value || '고객 ' + i,
            dEl.value,
            document.getElementById('birth-time-' + i).value || '0000',
            document.getElementById('gender-' + i).value,
            document.getElementById('cal-type-' + i).value === 'S',
            false, 'KST', false, true
        ));
    }
    
    showLoading('운명을 정밀 계산 중입니다...', () => {
        renderDashboard(window.globalSajuDataArray[0]);
        go(2);
    });
}

function renderDashboard(data) {
    document.getElementById('av-name').innerText = data.name + "님";
    const el = HAN_COLOR[data.dayStem];
    document.getElementById('av-circle').className = 'avatar-circle ' + el;
    document.getElementById('av-desc').innerText = `${data.dayStem}${data.dayBranch} ${COLOR_KR_MAP[el]} 생명체`;
    
    // Manse Table
    const labels = ['십성','천간','지지','십성'];
    const rows = [
        data.pillars.map(p => getSipseong(data.dayStem, p.h[0])),
        data.pillars.map(p => p.h[0]),
        data.pillars.map(p => p.h[1]),
        data.pillars.map(p => getSipseong(data.dayStem, p.h[1]))
    ];
    
    let html = '<div class="manse-row"><div class="manse-label"></div><div class="manse-head">시</div><div class="manse-head">일</div><div class="manse-head">월</div><div class="manse-head">년</div></div>';
    labels.forEach((l, i) => {
        html += `<div class="manse-row"><div class="manse-cell manse-label">${l}</div>`;
        rows[i].forEach(val => {
            const cls = HAN_COLOR[val] || HAN_COLOR[val[0]] || '';
            html += `<div class="manse-cell ${cls}" style="font-size:${i===1||i===2?'30px':'12px'}">${val}</div>`;
        });
        html += `</div>`;
    });
    document.getElementById('manse-table').innerHTML = html;
    
    // Wuxing Bars
    let wHtml = '';
    const total = Object.values(data.wuxing).reduce((a,b)=>a+b,0);
    WUXING_ORDER.forEach(k => {
        const per = Math.round((data.wuxing[k]/total)*100);
        wHtml += `<div class="bar-row"><div class="bar-label">${RELATION_LABELS[k]}</div><div class="bar-bg"><div class="bar-fill bg-${k}" style="width:${per}%"></div></div><div class="bar-val">${per}%</div></div>`;
    });
    document.getElementById('wuxing-bars').innerHTML = wHtml;
}

function startReport() {
    showLoading('기밀 보고서를 작성 중입니다...', () => {
        window.generateDeepReport(window.globalSajuDataArray);
        go(3);
    });
}

const COLOR_KR_MAP = {'wood':'푸른','fire':'붉은','earth':'황금','metal':'하얀','water':'검은'};
</script>
</body>
</html>
