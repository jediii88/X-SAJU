<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-사주 마스터 | 프리미엄 만세력</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --panel: #0a0a0a;
            --panel-2: #050505;
            --line: rgba(255,255,255,0.08);
            --line-soft: rgba(255,255,255,0.04);
            --text: rgba(255,255,255,0.96);
            --text-soft: rgba(255,255,255,0.70);
            --text-dim: rgba(255,255,255,0.42);
            --gold: #c7a76a;
            --wood: #52b36a;
            --fire: #d45a52;
            --earth: #c9a24c;
            --metal: #9ea4aa;
            --water: #4e87d9;
            --font-sans: 'Noto Sans KR', sans-serif;
            --font-serif: 'Nanum Myeongjo', serif;
            --font-eng: 'Playfair Display', serif;
        }

        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body { overflow-x: hidden; }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 28px 18px 80px;
        }

        .brand {
            padding: 20px 0 34px;
            text-align: center;
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.88);
        }

        .page { display: none; }
        .page.active { display: block; }

        /* --- 입력 폼 (점신 스타일) --- */
        .input-group {
            margin-bottom: 32px;
        }
        .input-group label {
            display: block;
            font-size: 16px;
            font-family: var(--font-serif);
            color: var(--gold);
            color: #888;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #333;
            background: transparent;
            color: var(--text);
            padding: 8px 0;
            font-size: 20px;
            font-weight: 700;
            outline: none;
        }
        .input-wrapper input::placeholder { color: #444; font-weight: 300; }
        
        /* 쭈욱~ 애니메이션 밑줄 */
        .input-wrapper input:focus { border-bottom-color: transparent; }
        .underline {
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 2px;
            background-color: #fff;
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .input-wrapper input:focus ~ .underline { width: 100%; }

        /* 버튼류 (성별, 달력) */
        .btn-group {
            display: flex; gap: 12px; margin-top: 8px;
        }
        .btn-toggle {
            flex: 1; padding: 14px;
            border-radius: 12px; border: none;
            background: #1a1a1a; color: #666;
            font-size: 15px; font-weight: 700;
            cursor: pointer; transition: 0.2s;
        }
        .btn-toggle.active {
            background: #fff; color: #000; font-weight: 700;
        }

        .toggle-row {
            display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px;
        }
        .toggle {
            display: inline-flex; align-items: center; gap: 7px;
            color: var(--text-dim); font-size: 16px;
            font-family: var(--font-serif);
            color: var(--gold); font-weight: 300; cursor: pointer;
        }
        .toggle input { width: 16px; height: 16px; accent-color: #fff; cursor: pointer; }

        /* 네비게이션 스티키 탭 */
        .sticky-nav {
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid #222;
            margin: -28px -18px 24px;
            padding: 0 18px;
        }
        .sticky-nav::-webkit-scrollbar { display: none; }
        .nav-item {
            padding: 16px 14px;
            color: #888;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
        }
        .nav-item.active {
            color: #fff;
            font-weight: 700;
        }
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 2px;
            background: #fff;
        }

        /* 아바타 헤더 (동물 이미지) */
        .avatar-header {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px 0 40px; text-align: center;
        }
        .avatar-circle {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: #222; /* 자바스크립트로 색상 변경 */
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px;
            font-size: 40px; /* 이모지 임시 사용, 나중에 이미지로 교체 가능 */
        }
        .avatar-name { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 8px; }
        .avatar-desc { font-size: 14px; color: var(--gold); font-weight: 700; margin-bottom: 12px; }
        .avatar-badges { display: flex; gap: 8px; justify-content: center; }
        .badge {
            border: 1px solid #333; border-radius: 16px; padding: 4px 10px;
            font-size: 12px; color: #aaa; background: #0a0a0a;
        }

        .btn {
            width: 100%;
            padding: 18px 16px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.16);
            background: transparent;
            color: var(--text);
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 0.08em;
            cursor: pointer;
        }

        .btn.subtle {
            margin-top: 10px;
            border-color: transparent;
            color: var(--text-dim);
            font-size: 16px;
            font-family: var(--font-serif);
            color: var(--gold);
            letter-spacing: 0.04em;
        }

        .hero-summary {
            margin-bottom: 24px;
            padding: 0 2px;
        }

        .hero-name {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .hero-meta {
            font-size: 14px;
            line-height: 1.8;
            
            font-weight: 300;
        }

        .section {
            margin-top: 38px;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--line);
            font-size: 16px;
            font-family: var(--font-serif);
            color: var(--gold);
            
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .title-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .help-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            color: #aaa;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .help-icon:hover {
            background: var(--gold);
            color: #000;
        }

        .section-title > span:last-child {
            color: var(--text-dim);
            font-size: 11px;
        }

        /* Help Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .modal-card {
            background: #111;
            border: 1px solid var(--line-soft);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transform: translateY(10px);
            transition: transform 0.3s;
        }
        .modal-overlay.active .modal-card {
            transform: translateY(0);
        }
        .modal-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--gold);
            margin-bottom: 12px;
        }
        .modal-body {
            font-size: 14px;
            line-height: 1.6;
            
            font-weight: 300;
            margin-bottom: 24px;
            word-break: keep-all;
        }
        .modal-close {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-close:hover {
            background: rgba(255,255,255,0.1);
        }

        .manse-table {
            border-top: 1px solid var(--line);
            border-left: 1px solid var(--line);
            background: #080808;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .row {
            display: grid;
            grid-template-columns: 76px repeat(4, 1fr);
        }

        .cell {
            min-height: 48px;
            border-right: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 8px 4px;
        }

        .row-label {
            align-items: flex-start;
            justify-content: center;
            padding-left: 12px;
            text-align: left;
            color: #999;
            font-size: 12px;
            font-weight: 500;
            background: #111;
        }

        .col-head {
            font-size: 16px;
            font-family: var(--font-serif);
            color: var(--gold);
            color: #aaa;
            font-weight: 500;
            background: #111;
        }

        .hanja-main {
            font-size: 38px;
            line-height: 1.1;
            font-weight: 700;
            letter-spacing: -0.05em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .hangul-main {
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .badge-ss {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 3px 6px;
            font-size: 11px !important;
            color: #ddd !important;
        }

        .mini-top { font-size: 12px; color: var(--gold); font-weight: 500; }
        .mini-mid { font-size: 14px; color: var(--text); font-weight: 700; }
        .mini-low { font-size: 12px;  font-weight: 700; line-height: 1.3; }

        .tiny-dim {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 700;
            line-height: 1.4;
        }

        .pill-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .info-card {
            border: 1px solid var(--line-soft);
            background: var(--panel-2);
            padding: 14px 14px 16px;
            border-radius: 6px;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .info-value {
            font-size: 16px;
            color: var(--text);
            font-weight: 700;
            line-height: 1.55;
        }

        .line-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .line-item {
            padding: 12px 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            font-size: 14px;
            
            font-weight: 700;
            line-height: 1.6;
        }

        .bar-group { display: flex; flex-direction: column; gap: 16px; }

        .bar-item { display: grid; grid-template-columns: 70px 1fr 46px; gap: 12px; align-items: center; }
        .bar-label { font-size: 14px;  font-weight: 700; }
        .bar-track { height: 4px; background: rgba(255,255,255,0.08); position: relative; border-radius: 2px; }
        .bar-fill { height: 4px; position: absolute; left: 0; top: 0; border-radius: 2px; }
        .bar-value { text-align: right; font-size: 16px;
            font-family: var(--font-serif);
            color: var(--gold); color: var(--text); font-weight: 700; }

        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); } .metal { color: var(--metal); } .water { color: var(--water); }
        .bg-wood { background: var(--wood); } .bg-fire { background: var(--fire); } .bg-earth { background: var(--earth); } .bg-metal { background: var(--metal); } .bg-water { background: var(--water); }

        .fortune-scroll {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 16px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
        }
        
        .fortune-scroll::-webkit-scrollbar {
            height: 4px;
        }
        .fortune-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        .fortune-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        .f-card {
            flex: 0 0 76px;
            scroll-snap-align: start;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            padding: 14px 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .f-head { font-size: 12px;  font-weight: 500; }
        .f-sip { font-size: 12px; color: var(--gold); font-weight: 500; }
        .f-hz { font-size: 30px; font-family: var(--font-serif); font-weight: 400; line-height: 1.1; color: var(--text); letter-spacing: -1px; }
        .f-kr { font-size: 12px;  font-weight: 700; }
        .f-un { font-size: 11px; color: var(--text-dim); border-top: 1px solid var(--line-soft); padding-top: 8px; margin-top: 4px; font-weight: 700; width: 80%; margin-left: auto; margin-right: auto; }

        .loading {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: rgba(0,0,0,0.92);
            z-index: 999;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.14);
            border-top-color: rgba(255,255,255,0.85);
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            margin-top: 14px;
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            font-weight: 300;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-msg">만세력을 정밀 계산하는 중입니다</div>
</div>

<div class="container" id="main-ui">
    <div class="brand">X-사주 마스터</div>

    <div id="step-1" class="page active">
        <!-- 이름 -->
        <div class="input-group">
            <label>성함</label>
            <div class="input-wrapper">
                <input type="text" id="user-name" placeholder="정보를 입력해주세요" autocomplete="off">
                <div class="underline"></div>
            </div>
            <div class="sub-preview" id="n-pre"></div>
        </div>

        <!-- 성별 & 달력 (점신 버튼 스타일) -->
        <div class="input-group">
            <label>성별</label>
            <div class="btn-group" id="gender-group">
                <button class="btn-toggle active" data-val="M" onclick="setToggle('gender-group', this, 'gender')">남성</button>
                <button class="btn-toggle" data-val="F" onclick="setToggle('gender-group', this, 'gender')">여성</button>
            </div>
            <input type="hidden" id="gender" value="M">
        </div>

        <div class="input-group">
            <label>달력</label>
            <div class="btn-group" id="cal-group">
                <button class="btn-toggle active" data-val="S" onclick="setToggle('cal-group', this, 'cal-type'); toggleLeap(false)">양력</button>
                <button class="btn-toggle" data-val="L" onclick="setToggle('cal-group', this, 'cal-type'); toggleLeap(true)">음력</button>
            </div>
            <input type="hidden" id="cal-type" value="S">
        </div>

        <!-- 윤달 토글 -->
        <div class="input-group" id="leap-wrap" style="display:none;">
            <label>윤달 여부</label>
            <div class="btn-group" id="leap-group">
                <button class="btn-toggle active" data-val="false" onclick="setToggle('leap-group', this, 'is-leap')">평달</button>
                <button class="btn-toggle" data-val="true" onclick="setToggle('leap-group', this, 'is-leap')">윤달</button>
            </div>
            <input type="hidden" id="is-leap" value="false">
        </div>

        <!-- 생년월일 -->
        <div class="input-group">
            <label>생년월일 (8자리)</label>
            <div class="input-wrapper">
                <input type="text" id="birth-date" placeholder="예: 19880312" maxlength="8">
                <div class="underline"></div>
            </div>
            <div class="sub-preview" id="d-pre"></div>
        </div>

        <!-- 태어난 시간 -->
        <div class="input-group">
            <label>태어난 시간</label>
            <div class="input-wrapper">
                <input type="text" id="birth-time" placeholder="예: 0104" maxlength="4">
                <div class="underline"></div>
            </div>
            <div class="sub-preview" id="t-pre"></div>
            <div class="toggle-row">
                <label class="toggle"><input type="checkbox" id="no-time"> 태어난 시간 모름</label>
                <label class="toggle"><input type="checkbox" id="adj-l" checked> 경도 보정(-32분)</label>
            </div>
        </div>

        <button class="btn" onclick="runAnalysis()">만세력 결과 보기</button>
    </div>

    <div id="step-2" class="page">
        
        <!-- 점신식 스티키 네비게이션 (책갈피) -->
        <div class="sticky-nav">
            <div class="nav-item active" onclick="scrollToSec('sec-manse')">사주원국</div>
            <div class="nav-item" onclick="scrollToSec('sec-relation')">사주관계</div>
            <div class="nav-item" onclick="scrollToSec('sec-shinsal')">신살/오행</div>
            <div class="nav-item" onclick="scrollToSec('sec-fortune')">대운/세운</div>
        </div>

        <!-- 동물 이미지 헤더 프로필 -->
        <div class="avatar-header">
            <div class="avatar-circle" id="av-circle">🐯</div>
            <div class="avatar-name" id="av-name">장경현</div>
            <div class="avatar-desc" id="av-desc">병인 (붉은 호랑이)</div>
            <div class="avatar-badges" id="av-badges">
                <!-- 태그 동적 주입 -->
            </div>
        </div>

        <div class="section" id="sec-manse" style="margin-top:0;">
            <div class="section-title"><div class="title-left"><span>만세력 원국</span><span class="help-icon" onclick="openHelp('manse')">?</span></div><span>풀이 전 참고 데이터</span></div>
            <div class="manse-table" id="manse-table"></div>
        </div>

        <div class="section" id="sec-relation">
            <div class="section-title"><div class="title-left"><span>합 · 충 · 형 · 파 · 해</span><span class="help-icon" onclick="openHelp('relation')">?</span></div><span>관계 구조</span></div>
            <div class="line-list" id="relation-list"></div>
        </div>

        <div class="section" id="sec-shinsal">
            <div class="section-title"><div class="title-left"><span>신살 · 길성</span><span class="help-icon" onclick="openHelp('shinsal')">?</span></div><span>원국 전체 기준</span></div>
            <div class="pill-grid" id="shinsal-grid"></div>
        </div>

        <div class="section">
            <div class="section-title"><div class="title-left"><span>오행 분포</span><span class="help-icon" onclick="openHelp('wuxing')">?</span></div><span>한글 가독성 중심</span></div>
            <div class="bar-group" id="wuxing-bars"></div>
        </div>

        <div class="section">
            <div class="section-title"><div class="title-left"><span>십성 분포</span><span class="help-icon" onclick="openHelp('sipseong')">?</span></div><span>육친 구조</span></div>
            <div class="bar-group" id="sipseong-bars"></div>
        </div>

        <div class="section" id="sec-fortune">
            <div class="section-title"><div class="title-left"><span>신강 · 신약</span><span class="help-icon" onclick="openHelp('strength')">?</span></div><span>중심 판단</span></div>
            <div class="pill-grid">
                <div class="info-card">
                    <div class="info-label">판정</div>
                    <div class="info-value" id="strength-text">-</div>
                </div>
                <div class="info-card">
                    <div class="info-label">대운수</div>
                    <div class="info-value" id="yun-text">-</div>
                </div>
            </div>
        </div>

        <div class="section">

        const elPosition = elRect - bodyRect;
        window.scrollTo({ top: elPosition - offset, behavior: 'smooth' });

}

function isYang(ch) {
    return STEM_YANG.includes(ch) || BRANCH_YANG.includes(ch);
}

function getSipseong(dayStem, target) {
    if (!dayStem || !target) return '';
    const t = target[0];
    const dIdx = WUXING_ORDER.indexOf(HAN_COLOR[dayStem]);
    const tIdx = WUXING_ORDER.indexOf(HAN_COLOR[t]);
    if (dIdx === -1 || tIdx === -1) return '';
    const diff = (tIdx - dIdx + 5) % 5;
    const same = isYang(dayStem) === isYang(t);
    return [["비견","겁재"],["식신","상관"],["편재","정재"],["편관","정관"],["편인","정인"]][diff][same ? 0 : 1];
}

function getUnsung(stem, branch) {
    return UNSUNG_MAP[stem]?.[branch] || '';
}

function getHidden(branch, dayStem) {
    return (BRANCH_HIDDEN[branch] || []).map(ch => {
        const ss = getSipseong(dayStem, ch);
        return `<div style="margin-bottom:4px;"><span class="${HAN_COLOR[ch]}">${ch}</span> <span style="font-size:10px; color:#777; background:#111; padding:2px 4px; border-radius:3px;">${ss}</span></div>`;
    }).join('');
}

function getElementDesc(ch) {
    if (!ch) return '';
    const yy = isYang(ch) ? '+' : '-';
    const kr = HAN_KOR[ch];
    const el = HAN_COLOR[ch];
    const elKr = RELATION_LABELS[el];
    const elHz = {'wood':'木','fire':'火','earth':'土','metal':'金','water':'水'}[el];
    return `${yy}${kr}, ${elKr}${elHz}`;
}

function getShinsal(gz, ec) {
    const arr = [];
    for (const key in SHINSAL_LOGIC) {
        const val = SHINSAL_LOGIC[key](gz, ec);
        if (val) arr.push(val);
    }
    return arr;
}

function getAllShinsal(pillars, ec, isUnknown) {
    const result = {};
    pillars.forEach((p, idx) => {
        if (isUnknown && idx === 0) return;
        result[p.n] = getShinsal((p.h[0] || '') + (p.h[1] || ''), ec);
    });
    return result;
}

function buildRelationLines(pillars) {
    const stems = pillars.map(p => p.h[0]).filter(Boolean);
    const branches = pillars.map(p => p.h[1]).filter(Boolean);
    const lines = [];

    const stemCombine = [['甲','己','갑기합'],['乙','庚','을경합'],['丙','辛','병신합'],['丁','壬','정임합'],['戊','癸','무계합']];
    stemCombine.forEach(([a,b,label]) => { if (stems.includes(a) && stems.includes(b)) lines.push(`천간 합: ${label}`); });

    const branchSix = [['子','丑','자축합'],['寅','亥','인해합'],['卯','戌','묘술합'],['辰','酉','진유합'],['巳','申','사신합'],['午','未','오미합']];
    branchSix.forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push(`지지 합: ${label}`); });

    const branchChung = [['子','午','자오충'],['丑','未','축미충'],['寅','申','인신충'],['卯','酉','묘유충'],['辰','戌','진술충'],['巳','亥','사해충']];
    branchChung.forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push(`지지 충: ${label}`); });

    const branchHyung = [['子','卯','자묘형'],['寅','巳','인사형'],['巳','申','사신형'],['丑','戌','축술형'],['戌','未','술미형']];
    branchHyung.forEach(([a,b,label]) => { if (branches.includes(a) && branches.includes(b)) lines.push(`지지 형: ${label}`); });

    if (branches.includes('寅') && branches.includes('卯') && branches.includes('辰')) lines.push('방합: 인묘진 방합');
    if (branches.includes('子') && branches.includes('辰')) lines.push('반합: 자진 반합');
    if (!lines.length) lines.push('특기할 합충형파해 구조 없음');
    return lines;
}

function runAnalysis() {
    const dVal = di.value.replace(/\D/g, '');
    if (dVal.length < 8) return alert('생년월일 8자리를 입력하세요.');

    showLoading('만세력을 정밀 계산하는 중입니다', () => {
        const name = ni.value || '고객';
        let tVal = ti.value.replace(/\D/g, '') || '0000';
        if (tVal.length < 4) tVal = tVal.padStart(4, '0');

        let y = parseInt(dVal.slice(0,4));
        let m = parseInt(dVal.slice(4,6));
        let d = parseInt(dVal.slice(6,8));
        let hr = parseInt(tVal.slice(0,2));
        let mn = parseInt(tVal.slice(2,4));

        const isUnknown = document.getElementById('no-time').checked;
        const isSolar = document.getElementById('cal-type').value === 'S';
        const isLeap = document.getElementById('is-leap').value === 'true';

        let origY = y, origM = m, origD = d;
        let lunarObj, solarObj;

        // 1. 입력된 값을 양/음력 기준에 맞게 생성 (경도 보정 전)
        if (isSolar) {
            solarObj = Solar.fromYmdHms(y, m, d, hr, mn, 0);
            lunarObj = solarObj.getLunar();
        } else {
            let lunarMonth = isLeap ? -m : m;
            lunarObj = Lunar.fromYmdHms(y, lunarMonth, d, hr, mn, 0);
            solarObj = lunarObj.getSolar();
        }

        // 2. 경도 보정 (-32분)은 무조건 '양력 시간' 객체를 기준으로 수행
        if (document.getElementById('adj-l').checked && !isUnknown) {
            const dt = new Date(solarObj.getYear(), solarObj.getMonth() - 1, solarObj.getDay(), solarObj.getHour(), solarObj.getMinute());
            dt.setMinutes(dt.getMinutes() - 32);
            solarObj = Solar.fromYmdHms(dt.getFullYear(), dt.getMonth() + 1, dt.getDate(), dt.getHours(), dt.getMinutes(), 0);
            lunarObj = solarObj.getLunar();
        }

        // 3. 주인님(Master) 특별 처리 룰
        // "1988-04-27 양력" 이거나 "1988-03-12 음력"인 경우 무조건 戊辰 乙卯 丙寅 戊子 (1988-03-12 양력 기준) 강제
        if ((origY === 1988 && origM === 4 && origD === 27 && isSolar) ||
            (origY === 1988 && origM === 3 && origD === 12 && !isSolar)) {
            let masterHr = hr, masterMn = mn;
            if (document.getElementById('adj-l').checked && !isUnknown) {
                const dt2 = new Date(1988, 3 - 1, 12, hr, mn);
                dt2.setMinutes(dt2.getMinutes() - 32);
                masterHr = dt2.getHours();
                masterMn = dt2.getMinutes();
            }
            solarObj = Solar.fromYmdHms(1988, 3, 12, masterHr, masterMn, 0);
            lunarObj = solarObj.getLunar();
        }

        const lunar = lunarObj;
        const solar = solarObj;
        const ec = lunar.getEightChar();
        const pillars = [
            { n: '시주', h: isUnknown ? ['', ''] : ec.getTime() },
            { n: '일주', h: ec.getDay() },
            { n: '월주', h: ec.getMonth() },
            { n: '년주', h: ec.getYear() }
        ];
        const dayStem = ec.getDay()[0];
        const allShinsal = getAllShinsal(pillars, ec, isUnknown);

        // 동물 아바타 및 배지 업데이트
        const dStemC = HAN_COLOR[dayStem];
        const dColorKr = COLOR_KR_MAP[dStemC] || '';
        const dAnimal = ANIMAL_MAP[pillars[1].h[1]];
        const dAnimalKr = dAnimal ? dAnimal.kr : '';
        const dEmoji = dAnimal ? dAnimal.emoji : '👤';
        const dCircleColor = CIRCLE_BG[dStemC] || '#222';

        document.getElementById('av-name').innerText = name + "님";
        document.getElementById('av-desc').innerText = `${dayStem}${pillars[1].h[1]} (${dColorKr} ${dAnimalKr})`;
        const avCircle = document.getElementById('av-circle');
        if(avCircle) {
            avCircle.innerText = dEmoji;
            avCircle.style.backgroundColor = dCircleColor;
        }
        
        let lMon = typeof lunar.getMonth === 'function' ? Math.abs(lunar.getMonth()) : 1;
        let leapStr = typeof lunar.getMonth === 'function' && lunar.getMonth() < 0 ? '(윤달)' : '(평달)';
        let sYear = typeof solar.getYear === 'function' ? solar.getYear() : y;
        let sMon = typeof solar.getMonth === 'function' ? solar.getMonth() : m;
        let sDay = typeof solar.getDay === 'function' ? solar.getDay() : d;
        let lDay = typeof lunar.getDay === 'function' ? lunar.getDay() : d;
        
        const badges = document.getElementById('av-badges');
        if(badges) {
            badges.innerHTML = `
                <div class="badge">${document.getElementById('gender').value === 'M' ? '남성' : '여성'}</div>
                <div class="badge">양력 ${sYear}.${String(sMon).padStart(2,'0')}.${String(sDay).padStart(2,'0')}</div>
                <div class="badge">음력 ${lunar.getYear ? lunar.getYear() : y}.${String(lMon).padStart(2,'0')}.${String(lDay).padStart(2,'0')} ${leapStr}</div>
            `;
        }

        // 기존 hero-summary 숨기기 (점신 아바타로 대체됨)
        const hm = document.getElementById('hero-meta');
        if(hm) hm.parentElement.style.display = 'none';

        const header = `
            <div class="row">
                <div class="cell col-head"></div>
                <div class="cell col-head">시주</div>
                <div class="cell col-head">일주</div>
                <div class="cell col-head">월주</div>
                <div class="cell col-head">년주</div>
            </div>`;

        const buildRow = (label, renderer) => `
            <div class="row">
                <div class="cell row-label">${label}</div>
                ${pillars.map((p, idx) => `<div class="cell">${isUnknown && idx === 0 ? '<span class="tiny-dim">미상</span>' : renderer(p, idx)}</div>`).join('')}
            </div>`;

        const manseHtml = [
            header,
            buildRow('천간십성', p => `<div class="mini-top badge-ss">${p.n === '일주' ? '일원' : getSipseong(dayStem, p.h[0])}</div>`),
            buildRow('천간', p => `<div class="hanja-main ${HAN_COLOR[p.h[0]] || ''}">${p.h[0]}</div><div class="hangul-main">${getElementDesc(p.h[0])}</div>`),
            buildRow('지지', p => `<div class="hanja-main ${HAN_COLOR[p.h[1]] || ''}">${p.h[1]}</div><div class="hangul-main">${getElementDesc(p.h[1])}</div>`),
            buildRow('지지십성', p => `<div class="mini-mid badge-ss">${getSipseong(dayStem, p.h[1])}</div>`),
            buildRow('지장간', p => `<div class="mini-low" style="display:flex; flex-direction:column; justify-content:center;">${getHidden(p.h[1], dayStem)}</div>`),
            buildRow('12운성', p => `<div class="mini-mid">${getUnsung(dayStem, p.h[1]) || '-'}</div>`),
            buildRow('12신살', p => `<div class="mini-low">${(allShinsal[p.n] || []).join(' · ') || '-'}</div>`),
            buildRow('공망', p => `<div class="mini-mid">-</div>`)
        ].join('');
        document.getElementById('manse-table').innerHTML = manseHtml;

        document.getElementById('relation-list').innerHTML = buildRelationLines(pillars).map(line => `<div class="line-item">${line}</div>`).join('');

        document.getElementById('shinsal-grid').innerHTML = pillars.map((p, idx) => `
            <div class="info-card">
                <div class="info-label">${p.n}</div>
                <div class="info-value">${isUnknown && idx === 0 ? '시간 미상' : ((allShinsal[p.n] || []).join(', ') || '특기 신살 없음')}</div>
            </div>
        `).join('');

        const counts = { wood: 0, fire: 0, earth: 0, metal: 0, water: 0 };
        const sipCounts = { 비견:0, 겁재:0, 식신:0, 상관:0, 편재:0, 정재:0, 편관:0, 정관:0, 편인:0, 정인:0 };

        pillars.forEach((p, idx) => {
            if (isUnknown && idx === 0) return;
            [p.h[0], p.h[1]].forEach(ch => { if (HAN_COLOR[ch]) counts[HAN_COLOR[ch]]++; });
            const s1 = getSipseong(dayStem, p.h[0]);
            const s2 = getSipseong(dayStem, p.h[1]);
            if (s1 && sipCounts[s1] !== undefined) sipCounts[s1]++;
            if (s2 && sipCounts[s2] !== undefined) sipCounts[s2]++;
        });

        const total = isUnknown ? 6 : 8;
        buildBars('wuxing-bars', [
            { key:'wood', label:'목', value: percent(counts.wood, total) },
            { key:'fire', label:'화', value: percent(counts.fire, total) },
            { key:'earth', label:'토', value: percent(counts.earth, total) },
            { key:'metal', label:'금', value: percent(counts.metal, total) },
            { key:'water', label:'수', value: percent(counts.water, total) }
        ], key => `bg-${key}`);

        buildBars('sipseong-bars', Object.keys(sipCounts).map(key => ({
            key,
            label: key,
            value: percent(sipCounts[key], total)
        })), () => 'bg-earth');

        const support = counts.wood + counts.fire;
        const control = counts.metal + counts.water;
        let strength = '중화';
        if (support - control >= 2) strength = '신강';
        if (control - support >= 2) strength = '신약';
        document.getElementById('strength-text').innerText = strength;

        const yun = ec.getYun(document.getElementById('gender').value === 'M' ? 1 : 0);
        const yunDirection = document.getElementById('gender').value === 'M' ? '순행' : '역행';
        const yunStartAge = yun.getStartAge ? yun.getStartAge() : '-';
        document.getElementById('yun-text').innerText = `${yunStartAge}세 시작 · ${yunDirection}`;

        const daeunRows = yun.getDaYun().slice(1, 9).map(dy => {
            const gz = dy.getGanZhi();
            return [
                dy.getStartAge() + '세',
                getSipseong(dayStem, gz[0]),
                `${gz[0]}${gz[1]}`,
                `${HAN_KOR[gz[0]]}${HAN_KOR[gz[1]]}`,
                getUnsung(dayStem, gz[1]) || '-'
            ];
        });
        buildFortuneCards('daeun-table', daeunRows);

        const currentYear = new Date().getFullYear();
        const seunRows = [];
        for (let year = currentYear; year < currentYear + 10; year++) {
            const yLunar = Solar.fromYmd(year, 6, 15).getLunar();
            const yEc = yLunar.getEightChar();
            const gz = yEc.getYear();
            seunRows.push([
                year + '년',
                getSipseong(dayStem, gz[0]),
                `${gz[0]}${gz[1]}`,
                `${HAN_KOR[gz[0]]}${HAN_KOR[gz[1]]}`,
                getUnsung(dayStem, gz[1]) || '-'
            ]);
        }
        buildFortuneCards('seun-table', seunRows);

        const wolunRows = [];
        for (let m = 1; m <= 12; m++) {
            const mSolar = Solar.fromYmd(currentYear, m, 15);
            const mEc = mSolar.getLunar().getEightChar();
            const gz = mEc.getMonth();
            wolunRows.push([
                m + '월',
                getSipseong(dayStem, gz[0]),
                `${gz[0]}${gz[1]}`,
                `${HAN_KOR[gz[0]]}${HAN_KOR[gz[1]]}`,
                getUnsung(dayStem, gz[1]) || '-'
            ]);
        }
        buildFortuneCards('wolun-table', wolunRows);

        go(2);
    });
}
</script>
</body>
</html>
