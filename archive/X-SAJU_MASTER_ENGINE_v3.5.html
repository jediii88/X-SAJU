<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-SAJU MASTER ENGINE v3.5 RELEASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;700;900&family=Noto+Serif+KR:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #fff; --muted: #444; --card-bg: #0a0a0a; --border: #222; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--accent); font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
        #input-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: 100; transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1); }
        .input-card { width: 520px; padding: 60px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 40px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); text-align: center; }
        .input-card h1 { font-size: 32px; font-weight: 900; letter-spacing: -0.05em; margin-bottom: 10px; color: #fff; }
        .input-card p { font-size: 13px; color: #666; margin-bottom: 40px; letter-spacing: 0.1em; }
        .field { margin-bottom: 25px; text-align: left; }
        .field label { display: block; font-size: 11px; color: #888; font-weight: 900; margin-bottom: 10px; letter-spacing: 0.15em; }
        .field input, .field select { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 20px; border-radius: 15px; font-size: 16px; box-sizing: border-box; transition: 0.3s; font-family: 'Noto Sans KR', sans-serif; }
        .field input:focus { border-color: #fff; outline: none; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .row { display: flex; gap: 15px; }
        .gender-group { display: flex; gap: 15px; }
        .gender-btn { flex: 1; padding: 20px; background: #000; border: 1px solid #333; color: #666; border-radius: 15px; cursor: pointer; font-weight: 900; font-size: 14px; transition: 0.3s; }
        .gender-btn.active { border-color: #fff; color: #fff; background: #111; }
        .run-btn { width: 100%; background: #fff; color: #000; border: none; padding: 25px; font-size: 18px; font-weight: 900; border-radius: 15px; cursor: pointer; margin-top: 20px; transition: 0.4s; letter-spacing: 0.1em; }
        .run-btn:hover { background: #ccc; transform: scale(1.02); }
        #engine-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; padding: 80px; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; z-index: 200; }
        .log-line { color: #00ff00; font-size: 15px; margin-bottom: 8px; opacity: 0; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #00ff00; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        #report-layer { display: none; padding-bottom: 100px; }
        .page-container { width: 1000px; height: 1414px; margin: 60px auto; background: #000; color: #fff; position: relative; padding: 120px; box-sizing: border-box; border: 1px solid #111; display: flex; flex-direction: column; page-break-after: always; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 25px; margin-bottom: 80px; }
        .category { font-size: 13px; font-weight: 900; letter-spacing: 0.3em; color: #555; text-transform: uppercase; }
        .page-num { font-size: 13px; font-weight: 300; letter-spacing: 0.1em; color: #444; }
        .theory-tag { font-size: 11px; font-weight: 900; letter-spacing: 0.2em; color: #444; margin-bottom: 20px; border: 1px solid #222; padding: 6px 12px; align-self: flex-start; }
        .term-title { font-size: 48px; font-weight: 900; margin-bottom: 70px; letter-spacing: -0.04em; font-family: 'Noto Serif KR', serif; line-height: 1.2; }
        .term-title span.thin-hanja { font-family: 'Noto Sans KR', sans-serif; font-weight: 100; margin-right: 15px; color: #888; }
        .content-body { font-size: 20px; line-height: 1.9; font-weight: 300; color: #bbb; word-break: keep-all; }
        .pillar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; margin-top: 50px; }
        .pillar-box { background: #080808; border: 1px solid #1a1a1a; padding: 40px 20px; text-align: center; border-radius: 20px; }
        .p-label { font-size: 12px; color: #444; font-weight: 900; margin-bottom: 30px; letter-spacing: 0.2em; }
        .hanja-character { font-size: 92px; font-weight: 100; line-height: 1; margin-bottom: 10px; display: block; font-family: 'Noto Sans KR', sans-serif; color: #fff; }
        .hangeul-sub { font-size: 16px; color: #666; font-weight: 400; margin-bottom: 30px; }
        .p-sipseong { font-size: 14px; font-weight: 900; color: #fff; margin-bottom: 10px; letter-spacing: 0.05em; }
        .p-unsung { font-size: 13px; font-weight: 400; color: #555; }
        @media print { body { background: #fff; color: #000; } .page-container { margin: 0; border: none; box-shadow: none; } #input-layer, #engine-layer { display: none !important; } }
    </style>

            if (hour !== -1) {
                let tb_idx = (hour >= 23 || hour < 1) ? 0 : Math.floor((hour*60 + minute - 90) / 120) + 1;
                t_stem = STEMS[((ds_idx % 5) * 2 + tb_idx) % 10]; t_branch = BRANCHES[tb_idx];
            }
            return { year: { stem: y_stem, branch: y_branch }, month: { stem: m_stem, branch: m_branch }, day: { stem: d_stem, branch: d_branch }, time: { stem: t_stem, branch: t_branch } };
        }

        async function runEngine() {
            const name = document.getElementById('user-name').value || "마스터";
            const dateStr = document.getElementById('birth-date').value;
            const hour = parseInt(document.getElementById('birth-hour').value), min = parseInt(document.getElementById('birth-min').value);
            if(!dateStr) return alert("생년월일을 입력해주세요.");
            const [y, m, d] = dateStr.split('-').map(v => parseInt(v));
            document.getElementById('input-layer').style.display = 'none';
            document.getElementById('engine-layer').style.display = 'flex';
            const logs = [`>>> X-SAJU CORE ENGINE V3.5 INITIALIZING...`, `>>> TARGET: ${name} (${currentGender})`, `>>> DATA: ${y}-${m}-${d} ${hour === -1 ? "시모름" : hour + ":" + min}`, `>>> CALCULATING PILLARS & KNOWLEDGE BASE...`, `>>> SYNTHESIZING 183 PAGES MASTER REPORT...`, `>>> APPLYING THIN-FONT (WEIGHT 100) TYPOGRAPHY...`, `>>> COMPLETE.`];
            const stream = document.getElementById('log-stream');
            for(let log of logs) { const p = document.createElement('p'); p.className = 'log-line'; p.innerText = log; p.style.opacity = '1'; stream.appendChild(p); await new Promise(r => setTimeout(r, 150)); }
            generateFullReport(name, y, m, d, hour, min);
            setTimeout(() => { document.getElementById('engine-layer').style.display = 'none'; document.getElementById('report-layer').style.display = 'block'; window.scrollTo(0,0); }, 500);
        }

        function generateFullReport(name, y, m, d, hour, min) {
            const pillars = getSajuPillars(y, m, d, hour, min);
            const ds = pillars.day.stem;
            const reportLayer = document.getElementById('report-layer');
            reportLayer.innerHTML = '';
            for(let i=1; i<=183; i++) {
                let cat, title, content;
                if(i===1) { cat="Master Intro"; title="운명의 시스템, 그 거대한 지도의 시작"; content=`${name}님의 운명은 ${ds}${pillars.day.branch} 일주를 기반으로 합니다. ${UNSUNG_MASTER_TEXTS[UNSUNG_12[ds][pillars.day.branch]]}`; }
                else if(i<=5) {
                    const keys = ["year", "month", "day", "time"], labels = ["연주 (뿌리)", "월주 (환경)", "일주 (본체)", "시주 (열매)"];
                    const p = pillars[keys[i-2]], s = (i===4) ? "본인" : SIPSEONG_MAP[ds][p.stem];
                    cat=`Pillar Depth / ${labels[i-2]}`; title=`${labels[i-2]} 정밀 분석: ${p.stem}${p.branch}(${HANJA_TO_HANGEUL[p.stem]}${HANJA_TO_HANGEUL[p.branch]})`;
                    content=`이 기둥의 ${s} 기운은 ${SIPSEONG_ADVICE[s]} 12운성 ${UNSUNG_12[ds][p.branch]} 단계에 있어 ${UNSUNG_MASTER_TEXTS[UNSUNG_12[ds][p.branch]] || "강력한 영향을 미칩니다."}`;
                } else {
                    cat=`Master Insight / Page ${i}`; title=`운명 알고리즘 정밀 제언 제 ${i}장`;
                    content=`마스터 ${name}님의 데이터 분석 결과, 이 구간의 에너지는 당신의 성공 가도에서 중요한 변곡점이 됩니다. 특히 일간 ${ds}의 특성이 사회적 관계인 ${SIPSEONG_MAP[ds][pillars.month.stem]}과 만나는 지점에서 당신만의 독보적인 가치가 창출됩니다. 183페이지에 걸친 이 정밀 지도는 당신의 미래를 설계하는 최고의 도구가 될 것입니다.`;
                }
                reportLayer.innerHTML += `<div class="page-container"><div class="top-nav"><span class="category">${cat}</span><span class="page-num">PAGE ${i}</span></div><div class="theory-tag">DEEP ANALYSIS</div><div class="term-title">${title}</div><div class="content-body">${content}</div>${i===1?`<div class="pillar-grid">${renderPillar("연주", pillars.year, ds)}${renderPillar("월주", pillars.month, ds)}${renderPillar("일주", pillars.day, ds)}${renderPillar("시주", pillars.time, ds)}</div>`:''}</div>`;
            }
        }

        function renderPillar(label, p, ds) {
            const s = (label==="일주") ? "본인" : (SIPSEONG_MAP[ds] ? SIPSEONG_MAP[ds][p.stem] : "-");
            const u = (UNSUNG_12[ds] && UNSUNG_12[ds][p.branch]) ? UNSUNG_12[ds][p.branch] : "-";
            return `<div class="pillar-box"><div class="p-label">${label}</div><span class="hanja-character">${p.stem}</span><div class="hangeul-sub">${HANJA_TO_HANGEUL[p.stem]}</div><span class="hanja-character">${p.branch}</span><div class="hangeul-sub">${HANJA_TO_HANGEUL[p.branch]}</div><div class="p-sipseong">${s}</div><div class="p-unsung">${u}</div></div>`;
        }
    </script>
