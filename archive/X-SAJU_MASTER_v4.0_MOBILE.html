<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-SAJU MASTER v4.0 | Precision Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+KR:wght@100;300;400;700&family=Noto+Serif+KR:wght@200;400&display=swap');
        
        :root {
            --bg-color: #050505;
            --card-bg: #0f0f0f;
            --text-main: #f0f0f0;
            --text-dim: #777777;
            --accent: #ffffff;
            --gold: #d4af37;
            --border: #222222;
            --font-serif: 'Playfair Display', 'Noto Serif KR', serif;
            --font-sans: 'Noto Sans KR', sans-serif;
            --wood: #2ecc71;
            --fire: #e74c3c;
            --earth: #f1c40f;
            --metal: #bdc3c7;
            --water: #3498db;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 24px;
            text-align: center;
            box-sizing: border-box;
        }

        .brand-header {
            margin-bottom: 60px;
        }

        .logo {
            font-family: var(--font-sans);
            font-size: 22px;
            letter-spacing: 4px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .sub-logo {
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--text-dim);
            font-weight: 400;
            text-transform: uppercase;
        }

        /* Typography & Editorial Grid */
        h1, h2, h3 { font-family: var(--font-sans); font-weight: 700; letter-spacing: -0.5px; }
        .section-label { 
            display: block; font-size: 12px; color: var(--accent); 
            margin-bottom: 15px; letter-spacing: 1px;
            font-weight: 700; border-bottom: 2px solid var(--accent);
            padding-bottom: 8px; text-align: left;
        }

        /* STEP 1 REFINEMENT */
        #step-1 { display: block; animation: fadeIn 0.5s ease; }
        .input-group { margin-bottom: 30px; text-align: left; position: relative; }
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; font-weight: 700; }

        input, select {
            width: 100%; background: #111; border: 1px solid var(--border);
            color: var(--text-main); padding: 14px 12px; font-size: 16px; font-weight: 400; outline: none;
            border-radius: 4px; transition: border-color 0.2s; box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); }

        .btn-main {
            margin-top: 20px; width: 100%; padding: 20px; background: var(--accent);
            color: var(--bg-color); cursor: pointer; font-size: 15px; letter-spacing: 1px; 
            border: none; font-weight: 700; text-transform: uppercase; border-radius: 4px;
        }
        .btn-main:active { transform: scale(0.98); }

        /* STEP 2 REFINEMENT */
        #step-2 { display: none; animation: fadeIn 0.5s ease; }
        .saju-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 30px; }
        .pillar-card { border: 1px solid var(--border); padding: 15px 0; background: var(--card-bg); border-radius: 4px; }
        .hanja { font-family: var(--font-sans); font-size: 26px; font-weight: 300; margin-bottom: 8px; line-height: 1.2; }
        .hangul { font-size: 13px; color: #B3B3B3; font-weight: 400; }
        .pillar-label { font-size: 10px; color: #777; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }

        /* Elemental Colors */
        .wood { color: #2ecc71; }
        .fire { color: #e74c3c; }
        .earth { color: #f1c40f; }
        .metal { color: #bdc3c7; }
        .water { color: #3498db; }
        .default-text { color: #E6E6E6; }

        /* RADAR CHART UPGRADE */
        .chart-container {
            width: 100%; height: 260px; margin-bottom: 50px; display: flex;
            justify-content: center; align-items: center; position: relative;
            box-sizing: border-box;
        }
        .radar-svg { width: 240px; height: 240px; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); }
        .radar-grid { stroke: #222; stroke-width: 0.5; fill: none; }
        .radar-axis { stroke: #333; stroke-width: 1; }
        .radar-polygon { 
            fill: rgba(212, 175, 55, 0.2); 
            stroke: var(--gold); 
            stroke-width: 2; 
            stroke-linejoin: round;
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .radar-label { font-size: 9px; fill: var(--text-dim); letter-spacing: 1px; font-weight: 300; }
        .radar-point { fill: var(--gold); stroke: var(--bg-color); stroke-width: 2; }
        
        @keyframes radarPulse {
            0% { stroke-opacity: 0.5; stroke-width: 2; }
            50% { stroke-opacity: 1; stroke-width: 3; }
            100% { stroke-opacity: 0.5; stroke-width: 2; }
        }
        .radar-polygon { animation: radarPulse 3s infinite ease-in-out; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; text-align: left; }
        .stat-item { border-left: 2px solid var(--gold); padding-left: 15px; background: var(--card-bg); padding-top: 10px; padding-bottom: 10px; }
        .stat-item div { font-family: var(--font-serif); font-size: 18px; color: var(--accent); margin-top: 5px; }

        /* STEP 3 REFINEMENT (Editorial) */
        #step-3 { display: none; text-align: left; animation: fadeIn 1s ease; padding-bottom: 80px; }
        .report-header { margin-bottom: 40px; text-align: center; }
        .report-title { font-size: 28px; margin-bottom: 10px; color: var(--accent); }
        .report-subtitle { font-size: 12px; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }
        
        .hero-act { margin-bottom: 50px; }
        .act-num { font-family: var(--font-serif); font-size: 40px; color: rgba(212, 175, 55, 0.1); position: absolute; margin-top: -20px; z-index: -1; }
        .act-title { font-size: 18px; color: var(--gold); margin-bottom: 15px; display: flex; align-items: center; }
        .act-title::after { content: ''; flex: 1; height: 1px; background: var(--border); margin-left: 15px; }
        
        .report-content { font-weight: 300; line-height: 2; font-size: 15px; color: #bbbbbb; }
        .report-content p { margin-bottom: 20px; }
        .highlight-box { background: var(--card-bg); padding: 25px; border: 1px solid var(--border); margin: 30px 0; position: relative; }
        .highlight-box::before { content: '"'; font-family: var(--font-serif); font-size: 60px; color: var(--gold); position: absolute; top: -10px; left: 10px; opacity: 0.2; }

        /* Branding & Monetization */
        .premium-cta {
            margin-top: 60px; padding: 40px 20px; background: #fff; color: #000; text-align: center;
        }
        .cta-hook { font-family: var(--font-serif); font-size: 20px; margin-bottom: 15px; font-weight: 700; }
        .cta-desc { font-size: 13px; margin-bottom: 25px; line-height: 1.6; opacity: 0.8; }
        .btn-premium {
            background: #000; color: #fff; border: none; padding: 20px 40px; font-size: 14px;
            letter-spacing: 2px; font-weight: 700; cursor: pointer; width: 100%;
        }
        
        .footer-brand {
            margin-top: 60px; font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 1000; justify-content: center; align-items: center; flex-direction: column;
        }
        .loader-bar { width: 100px; height: 1px; background: var(--border); margin-top: 20px; position: relative; overflow: hidden; }
        .loader-progress { position: absolute; width: 0%; height: 100%; background: var(--gold); animation: load 2s infinite; }
        @keyframes load { 0% { left: -100%; width: 100%; } 100% { left: 100%; width: 100%; } }
    </style>

</head>
<body>

<div class="loading-overlay" id="loading">
    <div style="letter-spacing: 10px; font-weight: 100; font-size: 11px; color: var(--gold);">AXE ENGINE v4.0</div>
    <div style="letter-spacing: 4px; font-weight: 300; font-size: 14px; margin-top:10px;">ARCHITECTING DESTINY...</div>
    <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<div class="container">
    <div class="brand-header">
        <div class="logo">X-SAJU MASTER</div>
        <div class="sub-logo">Special AI Engine v4.0</div>
    </div>

    <div id="step-1">
        <div class="section-label">01. 정보 입력 (Initialization)</div>
        <div class="input-group"><label>이름 (Name)</label><input type="text" id="user-name" placeholder="이름을 입력하세요..."></div>
        <div class="input-group" style="display: flex; gap: 15px;">
            <div style="flex: 1;"><label>성별 (Gender)</label><select id="gender"><option value="male">남성 (MALE)</option><option value="female">여성 (FEMALE)</option></select></div>
            <div style="flex: 1;"><label>력 (Calendar)</label><select id="calendar-type"><option value="solar">양력 (SOLAR)</option><option value="lunar">음력 (LUNAR)</option></select></div>
        </div>
        <div class="input-group"><label>생년월일 (Birth Date)</label><input type="date" id="birth-date" value="1988-04-27"></div>
        <div class="input-group"><label>생시 (Birth Time)</label><input type="time" id="birth-time" value="01:04"></div>
        <button class="btn-main" onclick="runAnalysis()">분석 시작 (Analyze Sequence)</button>
        <div class="footer-brand">Anonymous Architect / Precision Logic</div>
    </div>

    <div id="step-2">
        <div class="section-label">02. 데이터 분석 (Data Manifest)</div>
        <div class="saju-grid" id="saju-result"></div>
        <label style="text-align: center; width: 100%; margin-bottom: 15px; color: var(--accent); font-weight: 700;">오행 균형 (Five Elements Balance)</label>
        <div class="chart-container" id="element-chart">
            <svg class="radar-svg" viewBox="0 0 200 200">
                <!-- Grids -->
                <polygon points="100,20 176,75 147,165 53,165 24,75" class="radar-grid" />
                <polygon points="100,60 138,87 123,132 77,132 62,87" class="radar-grid" />
                <polygon points="100,100 100,100 100,100 100,100 100,100" class="radar-grid" />
                <!-- Axes -->
                <line x1="100" y1="100" x2="100" y2="20" class="radar-axis" />
                <line x1="100" y1="100" x2="176" y2="75" class="radar-axis" />
                <line x1="100" y1="100" x2="147" y2="165" class="radar-axis" />
                <line x1="100" y1="100" x2="53" y2="165" class="radar-axis" />
                <line x1="100" y1="100" x2="24" y2="75" class="radar-axis" />
                <!-- Labels -->
                <text x="100" y="15" text-anchor="middle" class="radar-label">木 (WOOD)</text>
                <text x="185" y="75" text-anchor="start" class="radar-label">火 (FIRE)</text>
                <text x="155" y="180" text-anchor="start" class="radar-label">土 (EARTH)</text>
                <text x="45" y="180" text-anchor="end" class="radar-label">金 (METAL)</text>
                <text x="15" y="75" text-anchor="end" class="radar-label">水 (WATER)</text>
                <!-- Data Polygon -->
                <polygon id="radar-data" points="100,100 100,100 100,100 100,100 100,100" class="radar-polygon" />
            </svg>
        </div>
        <div class="stat-grid">
            <div class="stat-item"><label>용신 (YONG-SIN)</label><div id="yongsin-val">-</div></div>
            <div class="stat-item"><label>핵심 엔진 (CORE)</label><div id="core-val">-</div></div>
        </div>
        <ul class="sipseong-list" id="extra-analysis" style="list-style: none; padding: 0; text-align: left; font-size: 13px; margin-bottom: 40px; border-top: 1px solid var(--border);"></ul>
        
        <div class="section-label">03. 분석 카테고리 (Category)</div>
        <div class="category-select" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 40px;">
            <label class="checkbox-container" style="display: flex; align-items: center; font-size: 13px; color: var(--text-dim); padding: 15px; border: 1px solid var(--border); background: var(--card-bg);"><input type="checkbox" id="cat-all" onchange="toggleAll(this)" style="width: auto; margin-right: 12px;"> 전체 리포트 (FULL)</label>
            <label class="checkbox-container" style="display: flex; align-items: center; font-size: 13px; color: var(--text-dim); padding: 15px; border: 1px solid var(--border); background: var(--card-bg);"><input type="checkbox" class="cat-item" style="width: auto; margin-right: 12px;"> 애정운 (LOVE)</label>
            <label class="checkbox-container" style="display: flex; align-items: center; font-size: 13px; color: var(--text-dim); padding: 15px; border: 1px solid var(--border); background: var(--card-bg);"><input type="checkbox" class="cat-item" style="width: auto; margin-right: 12px;"> 재물운 (WEALTH)</label>
            <label class="checkbox-container" style="display: flex; align-items: center; font-size: 13px; color: var(--text-dim); padding: 15px; border: 1px solid var(--border); background: var(--card-bg);"><input type="checkbox" class="cat-item" style="width: auto; margin-right: 12px;"> 직업운 (CAREER)</label>
            <label class="checkbox-container" style="display: flex; align-items: center; font-size: 13px; color: var(--text-dim); padding: 15px; border: 1px solid var(--border); background: var(--card-bg);"><input type="checkbox" class="cat-item" style="width: auto; margin-right: 12px;"> 건강운 (HEALTH)</label>
            <label class="checkbox-container" style="display: flex; align-items: center; font-size: 13px; color: var(--text-dim); padding: 15px; border: 1px solid var(--border); background: var(--card-bg);"><input type="checkbox" class="cat-item" style="width: auto; margin-right: 12px;"> 연도별 분석 (TIME)</label>
        </div>
        <button class="btn-main" onclick="generateReport()">심층 리포트 생성 (Generate Blueprint)</button>
    </div>

    <div id="step-3">
        <div id="final-report"></div>
        <button class="btn-main" onclick="location.reload()" style="background: transparent; border: 1px solid var(--border); color: var(--text-dim);">새로운 분석 (New Sequence)</button>
        <div class="footer-brand" style="text-align: center;">© Anonymous Architect | AXE v4.0</div>
    </div>
</div>

<script>
    // X-SAJU Precision Manse-ryeok Engine v4.0
    const STEMS = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
    const BRANCHES = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
    const ELEMENTS = {
        "甲": "wood", "乙": "wood", "寅": "wood", "卯": "wood",
        "丙": "fire", "丁": "fire", "巳": "fire", "午": "fire",
        "戊": "earth", "己": "earth", "辰": "earth", "戌": "earth", "丑": "earth", "未": "earth",
        "庚": "metal", "辛": "metal", "申": "metal", "酉": "metal",
        "壬": "water", "癸": "water", "亥": "water", "子": "water"
    };

    // 60-Gapja Interpretations (Il-ju)
    const ILJU_DATA = {
        "丙寅": {
            title: "병인(丙寅) - 숲을 비추는 태양",
            desc: "매우 강력한 목(木)의 생명력을 자양분 삼아 솟아오른 태양의 형상입니다. 창의적이고 추진력이 강하며, 새로운 질서를 창조하는 능력이 탁월합니다.",
            advice: "열정이 넘치나 때로는 성급할 수 있으니, 무자(戊子)의 차분한 이성을 곁에 두십시오."
        },
        "丙辰": {
            title: "병진(丙辰) - 구름 사이로 보이는 태양",
            desc: "지혜로운 용의 기운을 품은 태양입니다. 사교적이고 적응력이 뛰어나며, 실리와 명분을 동시에 챙길 줄 아는 영특함이 있습니다.",
            advice: "감정의 기복을 조절하고 끈기를 가진다면 큰 성취를 이룰 명조입니다."
        },
        "丁未": {
            title: "정미(丁未) - 들판의 촛불",
            desc: "따뜻하고 헌신적인 기운입니다. 내면의 열정이 강하며 예술적 감각이나 전문 기술 분야에서 빛을 발하는 경우가 많습니다.",
            advice: "고집이 세질 수 있으니 타인의 의견을 수용하는 유연함이 필요합니다."
        },
        "壬子": {
            title: "임자(壬子) - 끝없는 바다",
            desc: "거대한 물의 기운이 모인 형상입니다. 지혜가 깊고 포용력이 넓으며, 한번 결심하면 거침없이 나아가는 파괴적인 힘도 가지고 있습니다.",
            advice: "자신감이 지나쳐 독단에 빠질 수 있으니 토(土)의 절제력을 기르십시오."
        }
    };

    function calculatePillars(year, month, day, hour, minute) {
        // [SIMPLE PRECISION ENGINE]
        // Note: Real Saju requires precise Solar Terms. This is a high-fidelity lookup.
        const date = new Date(year, month - 1, day, hour, minute);
        
        // 1. Year Pillar
        let y_idx = (year - 4) % 60;
        if (month < 2 || (month === 2 && day < 4)) y_idx--; // Before Ipchun
        if (y_idx < 0) y_idx += 60;
        const yearPillar = STEMS[y_idx % 10] + BRANCHES[y_idx % 12];

        // 2. Month Pillar (Simplified)
        const jeolgiDays = [0, 5, 4, 5, 5, 6, 7, 7, 8, 8, 7, 7];
        let m_idx = month - 1;
        if (day < jeolgiDays[m_idx]) m_idx--;
        if (m_idx < 0) m_idx = 11;
        const m_branch_idx = (m_idx + 2) % 12;
        const m_stem_start = ((y_idx % 10 % 5) * 2 + 2) % 10;
        const monthPillar = STEMS[(m_stem_start + m_idx) % 10] + BRANCHES[m_branch_idx];

        // 3. Day Pillar (Base: 2000-01-01 is 戊午, 54th in 60-cycle)
        const baseDate = new Date(2000, 0, 1);
        const diffDays = Math.floor((date - baseDate) / (1000 * 60 * 60 * 24));
        let d_idx = (54 + diffDays) % 60;
        if (d_idx < 0) d_idx += 60;
        const dayPillar = STEMS[d_idx % 10] + BRANCHES[d_idx % 12];

        // 4. Hour Pillar
        const h_branch_idx = Math.floor(((hour + 1) % 24) / 2);
        const h_stem_start = ((d_idx % 10 % 5) * 2) % 10;
        const hourPillar = STEMS[(h_stem_start + h_branch_idx) % 10] + BRANCHES[h_branch_idx];

        return [
            {h: yearPillar, k: "년", c: ELEMENTS[yearPillar[0]]},
            {h: monthPillar, k: "월", c: ELEMENTS[monthPillar[0]]},
            {h: dayPillar, k: "일", c: ELEMENTS[dayPillar[0]]},
            {h: hourPillar, k: "시", c: ELEMENTS[hourPillar[0]]}
        ];
    }

    let currentPillars = [];

    function runAnalysis() {
        const name = document.getElementById('user-name').value;
        const dateInput = document.getElementById('birth-date').value;
        const timeInput = document.getElementById('birth-time').value;

        if (!dateInput) { alert("생년월일을 입력해주세요."); return; }

        document.getElementById('loading').style.display = 'flex';
        
        setTimeout(() => {
            const [y, m, d] = dateInput.split('-').map(Number);
            const [hh, mm] = timeInput.split(':').map(Number);

            currentPillars = calculatePillars(y, m, d, hh, mm);
            
            console.log("Calculated Pillars:", currentPillars); // Testing Log

            document.getElementById('loading').style.display = 'none';
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
            window.scrollTo(0, 0);

            // Display Pillars
            let html = '';
            currentPillars.forEach((p, idx) => {
                const labels = ["년", "월", "일", "시"];
                html += `
                    <div class="pillar-card">
                        <div class="pillar-label">${labels[idx]}</div>
                        <div class="hanja ${p.c}">${p.h[0]}<br>${p.h[1]}</div>
                        <div class="hangul">${p.h}</div>
                    </div>
                `;
            });
            document.getElementById('saju-result').innerHTML = html;

            // Update Statistics
            const dayStem = currentPillars[2].h[0];
            document.getElementById('yongsin-val').innerText = ELEMENTS[dayStem] === 'metal' ? '수(水)' : '금(金)';
            document.getElementById('core-val').innerText = 'PRO ENGINE';
            
            // Random-ish balance for now (should be calculated from pillars)
            updateChart({ wood: 40, fire: 30, earth: 20, metal: 10, water: 50 });
            
            document.getElementById('extra-analysis').innerHTML = `
                <li><span>일주</span><span>${currentPillars[2].h}</span></li>
                <li><span>운세 강도</span><span>92%</span></li>
                <li><span>엔진 상태</span><span>최적화 완료</span></li>
            `;
        }, 1500);
    }

    function updateChart(stats) {
        const radar = document.getElementById('radar-data');
        const r = 80; // Max radius
        const cx = 100;
        const cy = 100;
        const angles = [0, 72, 144, 216, 288];
        const values = [
            stats.wood || 0,
            stats.fire || 0,
            stats.earth || 0,
            stats.metal || 0,
            stats.water || 0
        ];

        const points = values.map((v, i) => {
            const rad = (angles[i] * Math.PI) / 180;
            const x = cx + (r * (v / 100)) * Math.sin(rad);
            const y = cy - (r * (v / 100)) * Math.cos(rad);
            return `${x},${y}`;
        }).join(' ');

        radar.setAttribute('points', points);
    }
