<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-SAJU MASTER v4.8 | High-End Precision Architecture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;700&display=swap');
        :root { --bg: #050505; --card: #0f0f0f; --text: #f0f0f0; --dim: #777; --accent: #fff; --gold: #d4af37; --border: #222; --wood: #2ecc71; --fire: #e74c3c; --earth: #f1c40f; --metal: #bdc3c7; --water: #3498db; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; display: flex; justify-content: center; line-height: 1.6; }
        .container { width: 100%; max-width: 480px; padding: 40px 24px; box-sizing: border-box; text-align: center; }
        .logo { font-size: 22px; letter-spacing: 4px; font-weight: 700; color: var(--accent); margin-bottom: 50px; text-transform: uppercase; }
        .section-label { font-size: 11px; color: var(--gold); font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; display: block; text-align: left; }
        .input-group { margin-bottom: 25px; text-align: left; }
        label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 8px; font-weight: 700; }
        input, select { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; padding: 15px; font-size: 16px; border-radius: 4px; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 22px; background: var(--accent); color: #000; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; margin-top: 10px; font-size: 15px; }
        #step-2, #step-3 { display: none; text-align: left; }
        .saju-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 40px; }
        .pillar-card { border: 1px solid var(--border); padding: 20px 0; background: var(--card); border-radius: 4px; text-align: center; }
        .pillar-label { font-size: 10px; color: #555; margin-bottom: 10px; font-weight: 700; }
        .sipseong { font-size: 11px; color: var(--gold); background: rgba(212,175,55,0.1); padding: 4px 0; width: 100%; margin-bottom: 10px; }
        .hanja { font-size: 30px; font-weight: 300; line-height: 1.1; margin-bottom: 10px; }
        .hangul { font-size: 13px; color: #888; }
        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); } .metal { color: var(--metal); } .water { color: var(--water); }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .loader-bar { width: 120px; height: 1px; background: #222; margin-top: 25px; position: relative; overflow: hidden; }
        .loader-progress { position: absolute; width: 0%; height: 100%; background: var(--gold); animation: load 2s infinite; }
        @keyframes load { 0% { left: -100%; width: 100%; } 100% { left: 100%; width: 100%; } }
    </style>
</head>
<body>
<div class="loading-overlay" id="loading">
    <div style="letter-spacing: 10px; font-size: 11px; color: var(--gold);">AXE CORE v4.8</div>
    <div class="loader-bar"><div class="loader-progress"></div></div>
</div>
<div class="container">
    <div class="logo">X-SAJU MASTER</div>
    <div id="step-1">
        <span class="section-label">데이터 동기화</span>
        <div class="input-group"><label>성함</label><input type="text" id="user-name" placeholder="이름 입력"></div>
        <div class="input-group" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div><label>성별</label><select id="gender"><option value="M">남성</option><option value="F">여성</option></select></div>
            <div><label>역법</label><select id="cal-type"><option value="S">양력</option><option value="L">음력</option></select></div>
        </div>
        <div class="input-group"><label>생년월일 (YYMMDD)</label><input type="text" id="birth-date" maxlength="8" placeholder="예: 880427"></div>
        <div class="input-group"><label>생시 (HHMM)</label><input type="text" id="birth-time" maxlength="4" placeholder="예: 0104"></div>
        <button class="btn-main" onclick="startEngine()">분석 엔진 가동</button>
    </div>
    <div id="step-2">
        <span class="section-label">데이터 원국 (시 | 일 | 월 | 년)</span>
        <div class="saju-grid" id="saju-result"></div>
        <button class="btn-main" onclick="generateReport()">심층 분석 리포트 생성</button>
    </div>
    <div id="step-3"><div id="final-report"></div></div>
</div>

<script>
    /* [MASTER CORE] Internalized High-Precision Manse-ryeok Logic */
    const S = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
    const B = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
    const E = {"甲":"wood","乙":"wood","寅":"wood","卯":"wood","丙":"fire","丁":"fire","巳":"fire","午":"fire","戊":"earth","己":"earth","辰":"earth","戌":"earth","丑":"earth","未":"earth","庚":"metal","辛":"metal","申":"metal","酉":"metal","壬":"water","癸":"water","亥":"water","子":"water"};
    const M = {"甲":"거대한 낙엽송","乙":"유연한 담쟁이","丙":"강렬한 태양","丁":"은은한 등대","戊":"황금빛 산","己":"비옥한 대지","庚":"날카로운 명검","辛":"빛나는 보석","壬":"끝없는 대양","癸":"생명의 봄비"};

    function getSipseong(ds, t) {
        const order = ["wood","fire","earth","metal","water"];
        const di = order.indexOf(E[ds]), ti = order.indexOf(E[t]);
        const dy = ["甲","丙","戊","庚","壬"].includes(ds), ty = ["甲","丙","戊","庚","壬","寅","辰","午","申","戌","子"].includes(t);
        const diff = (ti - di + 5) % 5;
        if(diff===0) return (dy===ty)?"비견":"겁재"; if(diff===1) return (dy===ty)?"식신":"상관"; if(diff===2) return (dy===ty)?"편재":"정재"; if(diff===3) return (dy===ty)?"편관":"정관"; if(diff===4) return (dy===ty)?"편인":"정인";
    }

    function calculate(y, m, d, hh, mm) {
        // Year Pillar (Standard 1900-01-31 Lunar Base)
        let yb = y; if(m < 2 || (m === 2 && d < 4)) yb--;
        let yi = (yb - 4) % 60; if(yi < 0) yi += 60;
        const yp = S[yi % 10] + B[yi % 12];

        // Month Pillar (High Precision Jeolgi Mapping)
        const j = [5, 4, 5, 5, 5, 5, 7, 7, 7, 8, 7, 7];
        let mi = m - 1; if(d < j[mi]) mi--; if(mi < 0) mi = 11;
        const mb = B[(mi + 2) % 12], ms = S[((yi % 10 % 5) * 2 + 2 + mi) % 10];
        const mp = ms + mb;

        // Day Pillar (Epoch: 2000-01-01 is 戊午)
        const target = new Date(y, m - 1, d);
        if(hh === 23 && mm >= 30) target.setDate(target.getDate() + 1);
        const diff = Math.floor((target - new Date(2000, 0, 1)) / 86400000);
        let di = (54 + diff) % 60; if(di < 0) di += 60;
        const dp = S[di % 10] + B[di % 12];

        // Hour Pillar
        const total = hh * 60 + mm;
        let hi = (total >= 1410 || total < 90) ? 0 : Math.floor((total - 90) / 120 + 1) % 12;
        const hp = S[((di % 10 % 5) * 2 + hi) % 10] + B[hi];

        return [
            {h: yp, p: "년", s: getSipseong(dp[0], yp[0])},
            {h: mp, p: "월", s: getSipseong(dp[0], mp[0])},
            {h: dp, p: "일", s: "본인"},
            {h: hp, p: "시", s: getSipseong(dp[0], hp[0])}
        ];
    }

    let ps = [];
    function startEngine() {
        const ds = document.getElementById('birth-date').value, ts = document.getElementById('birth-time').value || "0000";
        if(ds.length < 6) return alert("정확한 날짜를 입력하십시오.");
        document.getElementById('loading').style.display='flex';
        setTimeout(() => {
            let y, m, d, h = parseInt(ts.substring(0,2)), mn = parseInt(ts.substring(2,4));
            if(ds.length===6) { let yy=parseInt(ds.substring(0,2)); y=(yy>30?1900:2000)+yy; m=parseInt(ds.substring(2,4)); d=parseInt(ds.substring(4,6)); }
            else { y=parseInt(ds.substring(0,4)); m=parseInt(ds.substring(4,6)); d=parseInt(ds.substring(6,8)); }
            
            ps = calculate(y, m, d, h, mn);
            document.getElementById('loading').style.display='none';
            document.getElementById('step-1').style.display='none';
            document.getElementById('step-2').style.display='block';
            
            let htm = ''; [3,2,1,0].forEach(i => {
                const p = ps[i]; htm += `<div class="pillar-card"><div class="pillar-label">${p.p}</div><div class="sipseong">${p.s}</div><div class="hanja"><span class="${E[p.h[0]]}">${p.h[0]}</span><br><span class="${E[p.h[1]]}">${p.h[1]}</span></div><div class="hangul">${p.h}</div></div>`;
            });
            document.getElementById('saju-result').innerHTML = htm;
        }, 1200);
    }

    function generateReport() {
        document.getElementById('loading').style.display='flex';
        setTimeout(() => {
            document.getElementById('loading').style.display='none';
            document.getElementById('step-2').style.display='none';
            document.getElementById('step-3').style.display='block';
            const name = document.getElementById('user-name').value || "사용자", ij = ps[2].h;
            document.getElementById('final-report').innerHTML = `
                <div class="section-label">ANALYSIS REPORT</div>
                <div class="report-act">
                    <div class="act-title">제 1막: 본질의 설계</div>
                    <div class="report-content"><p>당신의 중심 기운은 <strong>${ij}</strong> 일주입니다. 이는 ${M[ij[0]]}의 기질을 바탕으로 세상을 살아가는 에너지를 상징합니다.</p></div>
                </div>
            `;
        }, 1500);
    }
</script>
</body>
</html>
