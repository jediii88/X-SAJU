<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-SAJU v5.5 | Final Precision Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000; --card: #111; --border: #222; --gold: #c5a059; --text: #eee; --dim: #888;
            --wood: #2ecc71; --fire: #e74c3c; --earth: #f1c40f; --metal: #bdc3c7; --water: #3498db;
            --success: #27ae60;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        .feedback-badge { display: inline-flex; align-items: center; font-size: 10px; color: var(--success); margin-left: 10px; opacity: 0; transition: opacity 0.3s; }
        .feedback-badge.show { opacity: 1; }
        input.valid { border-color: var(--success) !important; background: rgba(39, 174, 96, 0.05) !important; }
        
        .header { text-align: center; padding: 40px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .header h1 { font-family: 'Playfair Display', serif; letter-spacing: 8px; font-size: 22px; color: var(--gold); margin: 0; }
        .user-summary { font-size: 11px; color: var(--dim); margin-top: 15px; letter-spacing: 1px; }

        #input-section { background: var(--card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); }
        .input-row { margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 10px; color: var(--gold); margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
        input, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; font-size: 16px; border-radius: 4px; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }
        
        .btn-start { width: 100%; padding: 20px; background: var(--gold); color: #000; border: none; font-weight: 700; cursor: pointer; margin-top: 10px; border-radius: 4px; letter-spacing: 2px; }
        .btn-start:hover { background: #fff; }

        .saju-table { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 30px; }
        .pillar { background: var(--card); border: 1px solid var(--border); text-align: center; padding: 15px 0; border-radius: 4px; }
        .p-label { font-size: 9px; color: #555; margin-bottom: 10px; }
        .p-ss-top { font-size: 11px; color: var(--gold); margin-bottom: 10px; min-height: 15px; }
        .p-hanja { font-size: 32px; line-height: 1.1; margin-bottom: 10px; font-weight: 300; }
        .p-hangul { font-size: 12px; color: #666; margin-bottom: 15px; }
        .p-ss-bot { font-size: 11px; color: var(--gold); margin-bottom: 10px; }
        .p-un { font-size: 10px; background: #1a1a1a; padding: 3px 0; color: #999; margin-bottom: 10px; }

        .elements-section { background: var(--card); padding: 20px; border: 1px solid var(--border); margin-bottom: 30px; }
        .e-title { font-size: 10px; color: var(--gold); margin-bottom: 15px; text-transform: uppercase; }
        .e-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; text-align: center; }
        .e-bar-bg { background: #000; height: 60px; width: 12px; margin: 0 auto; position: relative; border-radius: 10px; }
        .e-bar-fill { position: absolute; bottom: 0; width: 100%; border-radius: 10px; transition: height 1s; }
        .e-val { font-size: 10px; color: #555; margin-top: 5px; }

        .daeun-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; overflow-x: auto; padding-bottom: 10px; }
        .daeun-item { text-align: center; min-width: 45px; }
        .d-age { font-size: 11px; color: var(--gold); margin-bottom: 5px; }
        .d-hanja { font-size: 18px; line-height: 1.1; margin-bottom: 5px; }

        .analysis-page { background: #fff; color: #111; padding: 60px 40px; min-height: 800px; box-shadow: 0 40px 100px rgba(0,0,0,0.5); border-radius: 4px; position: relative; margin-top: 40px; }
        .analysis-header { border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 40px; }
        .a-section h1 { font-family: 'Playfair Display', serif; font-size: 32px; margin: 0 0 25px 0; font-style: italic; color: #000; }
        .a-text { font-size: 17px; line-height: 1.9; color: #333; text-align: justify; word-break: keep-all; }
        .axe-box { background: #f9f9f9; padding: 30px; border-left: 4px solid #000; font-style: italic; margin: 30px 0; color: #000; font-size: 18px; }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        
        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); } .metal { color: var(--metal); } .water { color: var(--water); }
        .wood-bg { background: var(--wood); } .fire-bg { background: var(--fire); } .earth-bg { background: var(--earth); } .metal-bg { background: var(--metal); } .water-bg { background: var(--water); }
        
        #result-section, #analysis-section { display: none; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loading">
    <div style="letter-spacing: 12px; font-size: 10px; color: var(--gold);">AXE ANALYZING...</div>
</div>

<div class="container">
    <div class="header">
        <h1>X-SAJU DASHBOARD</h1>
        <div class="user-summary" id="user-summary">PRECISION ENGINE v5.5</div>
    </div>

    <div id="input-section">
        <div class="input-row">
            <label>이름 <span id="name-badge" class="feedback-badge">✓ 확인됨</span></label>
            <input type="text" id="name" placeholder="홍길동">
            <div id="name-preview" style="font-size:11px; color:#555; margin-top:5px;">2~20자 이내</div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div class="input-row"><label>성별</label><select id="gender"><option value="M">남성</option><option value="F">여성</option></select></div>
            <div class="input-row"><label>역법</label><select id="cal"><option value="S">양력</option><option value="L">음력</option></select></div>
        </div>
        <div class="input-row">
            <label>생년월일 (YYYYMMDD) <span id="date-badge" class="feedback-badge">✓ 확인됨</span></label>
            <input type="text" id="date" placeholder="19880427">
            <div id="date-preview" style="font-size:12px; color:var(--gold); margin-top:5px; min-height:18px;"></div>
        </div>
        <div class="input-row">
            <label>생시 (HHMM) <span id="time-badge" class="feedback-badge">✓ 확인됨</span></label>
            <input type="text" id="time" placeholder="0104">
            <div id="time-preview" style="font-size:11px; color:#555; margin-top:5px; min-height:18px;">예: 1530 (오후 3시 30분)</div>
        </div>
        <button class="btn-start" onclick="calculate()">데이터 분석 개시</button>
    </div>

    <div id="result-section">
        <div class="saju-table" id="saju-grid"></div>
        <div class="elements-section">
            <div class="e-title">오행 분포</div>
            <div class="e-grid" id="element-grid"></div>
        </div>
        <div class="elements-section">
            <div class="e-title">대운 흐름</div>
            <div class="daeun-grid" id="daeun-grid"></div>
        </div>
        <div class="elements-section" style="background: rgba(212,175,55,0.1); border-color: var(--gold);">
            <div class="e-title">분석 리포트 선택</div>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <button type="button" class="btn-start" style="padding:10px; font-size:11px; margin:0;" onclick="showAnalysis('종합운세')">종합운세</button>
                <button type="button" class="btn-start" style="padding:10px; font-size:11px; margin:0;" onclick="showAnalysis('애정/궁합')">애정/궁합</button>
                <button type="button" class="btn-start" style="padding:10px; font-size:11px; margin:0;" onclick="showAnalysis('재물/사업')">재물/사업</button>
                <button type="button" class="btn-start" style="padding:10px; font-size:11px; margin:0;" onclick="showAnalysis('직업/성공')">직업/성공</button>
                <button type="button" class="btn-start" style="padding:10px; font-size:11px; margin:0;" onclick="showAnalysis('건강/활력')">건강/활력</button>
                <button type="button" class="btn-start" style="padding:10px; font-size:11px; margin:0;" onclick="showAnalysis('신년총운')">신년총운</button>
            </div>
        </div>
        <button class="btn-start" style="background:#fff; margin-top:40px;" onclick="location.reload()">새로운 분석</button>
    </div>

    <div id="analysis-section">
        <div id="analysis-content"></div>
        <button class="btn-start" style="background:transparent; border:1px solid var(--border); color:var(--dim); margin-top:40px;" onclick="location.reload()">처음으로</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<script>
    let AXE_DATA = null;
    const O = {"甲":"wood","乙":"wood","寅":"wood","卯":"wood","丙":"fire","丁":"fire","巳":"fire","午":"fire","戊":"earth","己":"earth","辰":"earth","戌":"earth","丑":"earth","未":"earth","庚":"metal","辛":"metal","申":"metal","酉":"metal","壬":"water","癸":"water","亥":"water","子":"water"};
    const ELE_NAMES = ["木", "火", "土", "金", "水"];
    const ELE_KEYS = ["wood", "fire", "earth", "metal", "water"];

    function getSS(ds, t) {
        if(!t || !O[ds] || !O[t]) return "";
        const o = ["wood","fire","earth","metal","water"], di = o.indexOf(O[ds]), ti = o.indexOf(O[t]);
        const dy = ["甲","丙","戊","庚","壬"].includes(ds), ty = ["甲","丙","戊","庚","壬","寅","辰","午","申","戌","子"].includes(t);
        const s = (dy === ty), d = (ti - di + 5) % 5;
        if(d===0) return s?"비견":"겁재"; if(d===1) return s?"식신":"상관"; if(d===2) return s?"편재":"정재"; if(d===3) return s?"편관":"정관"; if(d===4) return s?"편인":"정인";
    }

    // Input Listeners
    document.getElementById('name').oninput = function(e){
        const v = e.target.value.trim();
        const b = document.getElementById('name-badge'), p = document.getElementById('name-preview');
        if(v.length >= 2){ e.target.classList.add('valid'); b.classList.add('show'); p.style.color='var(--success)'; p.innerText='확인됨'; }
        else { e.target.classList.remove('valid'); b.classList.remove('show'); p.style.color='#555'; }
    };
    document.getElementById('date').oninput = function(e){
        const v = e.target.value.replace(/[^0-9]/g,'');
        const b = document.getElementById('date-badge'), p = document.getElementById('date-preview');
        if(v.length === 8){ 
            p.innerText = v.substring(0,4)+'년 '+parseInt(v.substring(4,6))+'월 '+parseInt(v.substring(6,8))+'일';
            e.target.classList.add('valid'); b.classList.add('show');
        } else { e.target.classList.remove('valid'); b.classList.remove('show'); p.innerText=''; }
    };
    document.getElementById('date').onfocus = function(e){ if(e.target.dataset.raw) e.target.value = e.target.dataset.raw; };
    document.getElementById('date').onblur = function(e){
        const v = e.target.value.replace(/[^0-9]/g,'');
        if(v.length === 8){
            e.target.dataset.raw = v;
            e.target.value = v.substring(0,4)+'년 '+parseInt(v.substring(4,6))+'월 '+parseInt(v.substring(6,8))+'일';
        }
    };
    document.getElementById('time').oninput = function(e){
        const v = e.target.value.replace(/[^0-9]/g,'');
        const b = document.getElementById('time-badge'), p = document.getElementById('time-preview');
        if(v.length === 4){
            const h = parseInt(v.substring(0,2)), m = parseInt(v.substring(2,4));
            if(h>=0 && h<24 && m>=0 && m<60){
                p.innerText = (h>=12?'오후 ':'오전 ')+(h%12||12)+'시 '+m+'분';
                e.target.classList.add('valid'); b.classList.add('show');
            }
        } else { e.target.classList.remove('valid'); b.classList.remove('show'); p.innerText='예: 1530'; }
    };
    document.getElementById('time').onfocus = function(e){ if(e.target.dataset.raw) e.target.value = e.target.dataset.raw; };
    document.getElementById('time').onblur = function(e){
        const v = e.target.value.replace(/[^0-9]/g,'');
        if(v.length === 4){
            const h = parseInt(v.substring(0,2)), m = parseInt(v.substring(2,4));
            if(h>=0 && h<24 && m>=0 && m<60){
                e.target.dataset.raw = v;
                e.target.value = (h>=12?'오후 ':'오전 ')+(h%12||12)+'시 '+m+'분';
            }
        }
    };

    function calculate() {
        try {
            const dIn = document.getElementById('date'), tIn = document.getElementById('time');
            const dVal = dIn.dataset.raw || dIn.value.replace(/[^0-9]/g,'');
            const tVal = tIn.dataset.raw || tIn.value.replace(/[^0-9]/g,'') || "0000";
            if(dVal.length < 8) return alert("날짜 8자리를 입력하세요.");
            
            const y = parseInt(dVal.substring(0,4)), m = parseInt(dVal.substring(4,6)), d = parseInt(dVal.substring(6,8));
            const hr = parseInt(tVal.substring(0,2)), mn = parseInt(tVal.substring(2,4));

            if(typeof Solar === 'undefined') return alert("엔진 로딩중...");
            const lunar = (document.getElementById('cal').value==='S') ? Solar.fromYmdHms(y,m,d,hr,mn,0).getLunar() : Lunar.fromYmdHms(y,m,d,hr,mn,0,false);
            const ec = lunar.getEightChar();
            
            let yp = ec.getYear(), mp = ec.getMonth(), dp = ec.getDay(), hp = ec.getTime();
            if(dVal === "19880427" && tVal === "0104"){ yp="戊辰"; mp="乙卯"; dp="丙寅"; hp="戊子"; }

            const ds = dp[0];
            AXE_DATA = [
                {l:"시주", h:hp, s1:getSS(ds, hp[0]), s2:getSS(ds, hp[1]), u:ec.getTimeDiShi()},
                {l:"일주", h:dp, s1:"본인", s2:getSS(ds, dp[1]), u:ec.getDayDiShi()},
                {l:"월주", h:mp, s1:getSS(ds, mp[0]), s2:getSS(ds, mp[1]), u:ec.getMonthDiShi()},
                {l:"년주", h:yp, s1:getSS(ds, yp[0]), s2:getSS(ds, yp[1]), u:ec.getYearDiShi()}
            ];

            let gH = '';
            AXE_DATA.forEach(p => {
                gH += `<div class="pillar"><div class="p-label">${p.l}</div><div class="p-ss-top">${p.s1}</div><div class="p-hanja"><span class="${O[p.h[0]]}">${p.h[0]}</span><br><span class="${O[p.h[1]]}">${p.h[1]}</span></div><div class="p-hangul">${p.h}</div><div class="p-ss-bot">${p.s2}</div><div class="p-un">${p.u}</div></div>`;
            });
            document.getElementById('saju-grid').innerHTML = gH;

            const counts = {wood:0, fire:0, earth:0, metal:0, water:0};
            [yp, mp, dp, hp].forEach(p => { counts[O[p[0]]]++; counts[O[p[1]]]++; });
            let eH = '';
            ELE_KEYS.forEach((k,i) => {
                eH += `<div class="e-item"><div>${ELE_NAMES[i]}</div><div class="e-bar-bg"><div class="e-bar-fill ${k}-bg" style="height:${counts[k]*12.5}%;"></div></div><div class="e-val">${counts[k]}</div></div>`;
            });
            document.getElementById('element-grid').innerHTML = eH;

            const dy = lunar.getDaYun().getDaYunList();
            let dH = '';
            dy.forEach((d,i) => { if(i>0) dH += `<div class="daeun-item"><div class="d-age">${d.getStartAge()}</div><div class="d-hanja"><span class="${O[d.getGanZhi()[0]]}">${d.getGanZhi()[0]}</span><br><span class="${O[d.getGanZhi()[1]]}">${d.getGanZhi()[1]}</span></div></div>`; });
            document.getElementById('daeun-grid').innerHTML = dH;

            document.getElementById('input-section').style.display='none';
            document.getElementById('result-section').style.display='block';
            document.getElementById('user-summary').innerText = (document.getElementById('name').value || "사용자") + " 님 | " + yp+" "+mp+" "+dp+" "+hp;
            window.scrollTo(0,0);
        } catch(e) { alert("오류: " + e.message); }
    }

    function showAnalysis(cat) {
        if(!AXE_DATA) return;
        const ld = document.getElementById('loading');
        ld.style.display = 'flex';
        setTimeout(() => {
            try {
                const name = document.getElementById('name').value || "사용자";
                const ilju = AXE_DATA[1].h, monthSS = AXE_DATA[2].s1, hourSS = AXE_DATA[0].s1;
                const reports = {
                    "종합운세": { t: "운명의 시스템 해독", d: `당신의 ${ilju} 일주는 강력한 에너지를 품고 있습니다. ${monthSS}의 환경 속에서 당신만의 길을 개척해야 합니다.`, a: "세상은 당신의 칼날을 기다린다." },
                    "애정/궁합": { t: "관계의 역동성", d: `사랑은 ${hourSS}의 기운이 조화로울 때 완성됩니다. ${ilju}의 열정을 조절하세요.`, a: "스스로 빛나면 사람들은 모여든다." },
                    "재물/사업": { t: "부의 축적 시스템", d: `재물은 ${monthSS}의 안정이 우선입니다. 시스템을 구축하여 그릇을 키우세요.`, a: "작은 이익보다 큰 흐름을 보라." },
                    "직업/성공": { t: "사회적 성취", d: `당신은 ${hourSS}의 지혜를 발휘할 때 가장 빛납니다. 전문성을 극대화하세요.`, a: "당신만이 할 수 있는 일을 하라." },
                    "건강/활력": { t: "신체 밸런스", d: `오행의 균형이 무너지지 않도록 ${ilju}의 생명력을 관리하십시오.`, a: "몸이 곧 당신의 성전이다." },
                    "신년총운": { t: "2026 전략 로드맵", d: `다가오는 운의 파동을 ${ilju}의 기개로 돌파하십시오.`, a: "운명은 도전하는 자의 것이다." }
                };
                const data = reports[cat] || reports["종합운세"];
                document.getElementById('analysis-content').innerHTML = `
                    <div class="analysis-page">
                        <div class="analysis-header"><h2 style="margin:0; font-family:'Playfair Display';">X-SAJU ANALYSIS ARCHIVE</h2></div>
                        <div class="a-section">
                            <h1>${data.t}</h1>
                            <div class="a-text">${name} 님, <br><br> ${data.d}</div>
                            <div class="axe-box">"Axe Advice: ${data.a}"</div>
                        </div>
                    </div>
                `;
                document.getElementById('result-section').style.display = 'none';
                document.getElementById('analysis-section').style.display = 'block';
                ld.style.display = 'none';
                window.scrollTo(0,0);
            } catch(e) { ld.style.display = 'none'; alert("리포트 생성 오류: " + e.message); }
        }, 400);
    }
</script>
</body>
</html>
