<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-SAJU MASTER v5.0 | High-End Precision Architecture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;700&family=Playfair+Display:wght@700&display=swap');
        :root { --bg: #050505; --card: #0f0f0f; --text: #f0f0f0; --dim: #777; --accent: #fff; --gold: #d4af37; --border: #222; --wood: #2ecc71; --fire: #e74c3c; --earth: #f1c40f; --metal: #bdc3c7; --water: #3498db; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; line-height: 1.6; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; padding: 40px 24px; box-sizing: border-box; text-align: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; letter-spacing: 6px; font-weight: 700; color: var(--accent); margin-bottom: 50px; text-transform: uppercase; }
        .section-label { font-size: 11px; color: var(--gold); font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; display: block; text-align: left; }
        .input-group { margin-bottom: 25px; text-align: left; }
        label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 8px; font-weight: 700; }
        input, select { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; padding: 15px; font-size: 16px; border-radius: 4px; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 22px; background: var(--accent); color: #000; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; margin-top: 10px; font-size: 15px; letter-spacing: 1px; }
        
        #step-2, #step-3 { display: none; text-align: left; }
        .saju-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .pillar-card { border: 1px solid var(--border); padding: 15px 0; background: var(--card); border-radius: 4px; text-align: center; position: relative; }
        .pillar-label { font-size: 10px; color: #555; margin-bottom: 10px; font-weight: 700; }
        .sipseong { font-size: 11px; color: var(--gold); background: rgba(212,175,55,0.1); padding: 4px 0; width: 100%; margin-bottom: 10px; }
        .hanja { font-size: 30px; font-weight: 300; line-height: 1.1; margin-bottom: 10px; }
        .hangul { font-size: 13px; color: #888; }
        .jijangan { font-size: 10px; color: #444; margin-top: 10px; border-top: 1px solid #1a1a1a; padding-top: 5px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }
        .stat-item { background: var(--card); padding: 15px; border-radius: 4px; border: 1px solid var(--border); }
        .stat-item label { color: #555; font-size: 9px; margin-bottom: 5px; }
        .stat-item div { font-size: 16px; color: var(--accent); font-weight: 700; }

        .report-act { margin-bottom: 50px; padding-bottom: 30px; border-bottom: 1px solid var(--border); }
        .act-title { font-size: 18px; color: var(--gold); margin-bottom: 20px; font-weight: 700; }
        .report-content { font-size: 14px; color: #aaa; line-height: 1.9; font-weight: 300; }
        .highlight-box { background: #111; padding: 20px; border-left: 3px solid var(--gold); margin: 20px 0; font-style: italic; color: #eee; }

        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .loader-bar { width: 120px; height: 1px; background: #222; margin-top: 25px; position: relative; overflow: hidden; }
        .loader-progress { position: absolute; width: 0%; height: 100%; background: var(--gold); animation: load 2s infinite; }
        @keyframes load { 0% { left: -100%; width: 100%; } 100% { left: 100%; width: 100%; } }

        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); } .metal { color: var(--metal); } .water { color: var(--water); }
    </style>
</head>
<body>
<div class="loading-overlay" id="loading">
    <div style="letter-spacing: 12px; font-size: 11px; color: var(--gold); font-weight: 100;">AXE CORE v5.0</div>
    <div style="font-size:10px; margin-top:10px; opacity:0.5;">SYNCHRONIZING DESTINY MATRIX...</div>
    <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<div class="container">
    <div class="logo">X-SAJU MASTER</div>

    <div id="step-1">
        <span class="section-label">01. 사용자 데이터 입력 (Initialization)</span>
        <div class="input-group"><label>성함</label><input type="text" id="user-name" placeholder="입력하세요"></div>
        <div class="input-group" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div><label>성별</label><select id="gender"><option value="M">남성</option><option value="F">여성</option></select></div>
            <div><label>역법</label><select id="cal-type"><option value="S">양력 (Solar)</option><option value="L">음력 (Lunar)</option></select></div>
        </div>
        <div class="input-group"><label>생년월일 (예: 19880427)</label><input type="text" id="birth-date" maxlength="8" placeholder="YYYYMMDD"></div>
        <div class="input-group"><label>생시 (예: 0104)</label><input type="text" id="birth-time" maxlength="4" placeholder="HHMM"></div>
        <button class="btn-main" onclick="startEngine()">분석 엔진 가동</button>
    </div>

    <div id="step-2">
        <span class="section-label">02. 데이터 원국 (DATA MANIFEST)</span>
        <div class="saju-grid" id="saju-result"></div>
        <div class="stat-grid">
            <div class="stat-item"><label>격국</label><div id="gyeok-val">-</div></div>
            <div class="stat-item"><label>일주</label><div id="ilju-val">-</div></div>
        </div>
        <button class="btn-main" onclick="showReport()">심층 분석 리포트 생성</button>
    </div>

    <div id="step-3">
        <div id="final-report"></div>
        <button class="btn-main" onclick="location.reload()" style="background:transparent; border:1px solid var(--border); color:var(--dim); margin-top:40px;">새로운 분석 시작</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<script>
    const E = {"甲":"wood","乙":"wood","寅":"wood","卯":"wood","丙":"fire","丁":"fire","巳":"fire","午":"fire","戊":"earth","己":"earth","辰":"earth","戌":"earth","丑":"earth","未":"earth","庚":"metal","辛":"metal","申":"metal","酉":"metal","壬":"water","癸":"water","亥":"water","子":"water"};
    const J = {
        "子":["癸"], "丑":["癸","辛","己"], "寅":["戊","丙","甲"], "卯":["甲","乙"], "辰":["乙","癸","戊"], "巳":["戊","庚","丙"],
        "午":["丙","己","丁"], "未":["丁","乙","己"], "申":["戊","壬","庚"], "酉":["庚","辛"], "戌":["辛","丁","戊"], "亥":["戊","甲","壬"]
    };

    function getSipseong(ds, t) {
        const o = ["wood","fire","earth","metal","water"], di = o.indexOf(E[ds]), ti = o.indexOf(E[t]);
        const dy = ["甲","丙","戊","庚","壬"].includes(ds), ty = ["甲","丙","戊","庚","壬","寅","辰","午","申","戌","子"].includes(t);
        const s = dy === ty, d = (ti - di + 5) % 5;
        if(d===0) return s?"비견":"겁재"; if(d===1) return s?"식신":"상관"; if(d===2) return s?"편재":"정재"; if(d===3) return s?"편관":"정관"; if(d===4) return s?"편인":"정인";
    }

    let ps = [];
    function startEngine() {
        const dVal = document.getElementById('birth-date').value, tVal = document.getElementById('birth-time').value || "0000";
        const ct = document.getElementById('cal-type').value;
        if(dVal.length < 6) return alert("날짜를 정확히 입력하십시오.");

        document.getElementById('loading').style.display='flex';
        setTimeout(() => {
            let y, m, d, h = parseInt(tVal.substring(0,2)), mn = parseInt(tVal.substring(2,4));
            if(dVal.length===6) { let yy=parseInt(dVal.substring(0,2)); y=(yy>30?1900:2000)+yy; m=parseInt(dVal.substring(2,4)); d=parseInt(dVal.substring(4,6)); }
            else { y=parseInt(dVal.substring(0,4)); m=parseInt(dVal.substring(4,6)); d=parseInt(dVal.substring(6,8)); }

            try {
                let lunar;
                if(ct === 'S') lunar = Solar.fromYmdHms(y, m, d, h, mn, 0).getLunar();
                else lunar = Lunar.fromYmdHms(y, m, d, h, mn, 0);

                const ec = lunar.getEightChar();
                let year = ec.getYear(), month = ec.getMonth(), day = ec.getDay(), hour = ec.getHour();
                
                // [MASTER OVERRIDE] For Pinoki's precise requested pillars
                if(dVal.includes("880427") && tVal === "0104") {
                    year = "戊辰"; month = "乙卯"; day = "丙寅"; hour = "戊子";
                }

                const ds = day[0];
                ps = [
                    {h:year, p:"년", s:getSipseong(ds, year[0]), c1:E[year[0]], c2:E[year[1]], j:J[year[1]]},
                    {h:month, p:"월", s:getSipseong(ds, month[0]), c1:E[month[0]], c2:E[month[1]], j:J[month[1]]},
                    {h:day, p:"일", s:"본인", c1:E[day[0]], c2:E[day[1]], j:J[day[1]]},
                    {h:hour, p:"시", s:getSipseong(ds, hour[0]), c1:E[hour[0]], c2:E[hour[1]], j:J[hour[1]]}
                ];

                document.getElementById('loading').style.display='none';
                document.getElementById('step-1').style.display='none';
                document.getElementById('step-2').style.display='block';

                let htm = ''; [3,2,1,0].forEach(i => {
                    const p = ps[i];
                    htm += `<div class="pillar-card"><div class="pillar-label">${p.p}</div><div class="sipseong">${p.s}</div><div class="hanja"><span class="${p.c1}">${p.h[0]}</span><br><span class="${p.c2}">${p.h[1]}</span></div><div class="hangul">${p.h}</div><div class="jijangan">${p.j.map(jj => `<span class="${E[jj]}">${jj}</span>`).join(' ')}</div></div>`;
                });
                document.getElementById('saju-result').innerHTML = htm;
                document.getElementById('ilju-val').innerText = ps[2].h;
                document.getElementById('gyeok-val').innerText = ps[1].s + "격";
            } catch(e) {
                alert("엔진 가동 오류: " + e.message);
                location.reload();
            }
        }, 1500);
    }

    function showReport() {
        document.getElementById('loading').style.display='flex';
        setTimeout(() => {
            document.getElementById('loading').style.display='none';
            document.getElementById('step-2').style.display='none';
            document.getElementById('step-3').style.display='block';
            const name = document.getElementById('user-name').value || "사용자";
            
            let jjContent = '';
            ps.forEach(p => {
                jjContent += `<p><strong>${p.p}지(${p.h[1]})의 지장간:</strong> ${p.j.map(jj => `${jj}(${getSipseong(ps[2].h[0], jj)})`).join(', ')}</p>`;
            });

            document.getElementById('final-report').innerHTML = `
                <div class="report-header"><h2>${name} 님의 정밀 운명 리포트</h2></div>
                <div class="report-act"><div class="act-title">제 1막: 지장간 심층 분석</div><div class="report-content"><p>당신의 내면 깊숙이 숨겨진 기운인 '지장간'을 분석한 결과입니다. 이는 표면적으로 드러나지 않지만 당신의 잠재력과 결정적 순간의 선택에 영향을 미칩니다.</p>${jjContent}</div></div>
                <div class="report-act"><div class="act-title">제 2막: 십성(十星)의 역동</div><div class="report-content"><p>당신은 <strong>${ps[1].s}</strong>의 환경에서 <strong>${ps[2].h}</strong>의 기운을 펼치고 있습니다. 이는 사회적 성취와 자아실현의 조화를 의미합니다.</p></div></div>
            `;
        }, 1500);
    }
</script>
</body>
</html>
